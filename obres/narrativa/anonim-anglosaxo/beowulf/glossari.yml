# Glossari de Beowulf
# Termes clau en anglès antic (Old English) amb traducció al català
# Font: Harrison & Sharp, 4a edició (Project Gutenberg #9701)

termes:
  - original: "Bēowulf"
    transliteracio: "Beowulf"
    traduccio: "Beowulf"
    nota: "Heroi protagonista del poema; el nom podria significar 'llop de les abelles' (és a dir, os)"
    categoria: "nom propi"

  - original: "Grendel"
    transliteracio: "Grendel"
    traduccio: "Grendel"
    nota: "Esperit maligne dels aiguamolls, descendent de Caín; antagonista principal"
    categoria: "nom propi"

  - original: "Hrōðgār"
    transliteracio: "Hròdgar"
    traduccio: "Hròdgar"
    nota: "Rei dels danesos (Scyldings), constructor de Heorot"
    categoria: "nom propi"

  - original: "Wīglāf"
    transliteracio: "Wiglaf"
    traduccio: "Wiglaf"
    nota: "Guerrer lleial que ajuda Beowulf en la lluita final contra el drac"
    categoria: "nom propi"

  - original: "Heorot"
    transliteracio: "Heorot"
    traduccio: "Heorot (Sala del Cérvol)"
    nota: "Gran sala de festes de Hròdgar; del mot 'heorot' = cérvol"
    categoria: "topònim"

  - original: "Gār-Dene"
    transliteracio: "Gar-Dene"
    traduccio: "Danesos de la Llança"
    nota: "Epítet dels danesos; 'gār' = llança, 'Dene' = danesos"
    categoria: "gentilici"

  - original: "Scyldingas"
    transliteracio: "Scyldings"
    traduccio: "Escíldings (fills d'Escild)"
    nota: "Dinastia reial danesa, descendents d'Escild Escèfing"
    categoria: "gentilici"

  - original: "þēoden"
    transliteracio: "þeoden"
    traduccio: "senyor, rei, cabdill"
    nota: "Títol de respecte per a un governant o líder guerrer"
    categoria: "substantiu"

  - original: "eorl"
    transliteracio: "eorl"
    traduccio: "noble, guerrer"
    nota: "Home de rang elevat; guerrer aristocràtic"
    categoria: "substantiu"

  - original: "beorn"
    transliteracio: "beorn"
    traduccio: "heroi, guerrer noble"
    nota: "Terme poètic per a un home valent o de llinatge noble"
    categoria: "substantiu"

  - original: "draca"
    transliteracio: "draca"
    traduccio: "drac"
    nota: "El drac custodi del tresor que Beowulf combat al final del poema"
    categoria: "substantiu"

  - original: "mēce"
    transliteracio: "mece"
    traduccio: "espasa"
    nota: "Espasa llarga, arma principal dels guerrers"
    categoria: "substantiu"

  - original: "sweord"
    transliteracio: "sweord"
    traduccio: "espasa"
    nota: "Sinònim de 'mēce'; arma de tall"
    categoria: "substantiu"

  - original: "helm"
    transliteracio: "helm"
    traduccio: "elm, casc"
    nota: "Casc de guerra, sovint decorat amb figures de senglar"
    categoria: "substantiu"

  - original: "byrne"
    transliteracio: "byrne"
    traduccio: "cota de malla"
    nota: "Armadura de malla feta d'anelles entrellaçades ('hringed byrne')"
    categoria: "substantiu"

  - original: "hring"
    transliteracio: "hring"
    traduccio: "anell, cercle"
    nota: "Objecte de valor; símbol de lleialtat entre senyor i vassall"
    categoria: "substantiu"

  - original: "gūð"
    transliteracio: "guð"
    traduccio: "combat, batalla"
    nota: "Freqüent en compostos: gūð-cyning (rei de guerra), gūð-rinc (guerrer)"
    categoria: "substantiu"

  - original: "heall"
    transliteracio: "heall"
    traduccio: "sala, gran sala"
    nota: "Edifici central de la comunitat; espai de banquets i juraments"
    categoria: "substantiu"

  - original: "mere"
    transliteracio: "mere"
    traduccio: "llac, aiguamoll"
    nota: "L'estany on habiten Grendel i la seva mare"
    categoria: "substantiu"

  - original: "wyrd"
    transliteracio: "wyrd"
    traduccio: "destí, fat"
    nota: "Força impersonal del destí; concepte central en la cosmovisió germànica"
    categoria: "substantiu"

  - original: "āglǣca"
    transliteracio: "aglæca"
    traduccio: "monstre, adversari temible"
    nota: "Terme ambigu: aplicat tant a Grendel com a Beowulf ('gran lluitador')"
    categoria: "substantiu"

  - original: "ealdor"
    transliteracio: "ealdor"
    traduccio: "cabdill, senyor; vida"
    nota: "Doble significat: 1) líder, príncep; 2) vida (ealdor-lēas = sense vida)"
    categoria: "substantiu"

  - original: "wǣpen"
    transliteracio: "wæpen"
    traduccio: "arma"
    nota: "Terme genèric per a qualsevol arma de guerra"
    categoria: "substantiu"

  - original: "mǣg"
    transliteracio: "mæg"
    traduccio: "parent, familiar"
    nota: "Relació de parentiu; els vincles de sang són centrals en el poema"
    categoria: "substantiu"

  - original: "bēag"
    transliteracio: "beag"
    traduccio: "braçalet, anell (de tresor)"
    nota: "Objecte preciós atorgat pel senyor als seus guerrers com a recompensa"
    categoria: "substantiu"

  - original: "scyld"
    transliteracio: "scyld"
    traduccio: "escut"
    nota: "També nom propi: Scyld Scēfing, fundador de la dinastia danesa"
    categoria: "substantiu"

  - original: "wīg"
    transliteracio: "wig"
    traduccio: "guerra, combat"
    nota: "Terme freqüent en compostos: wīg-fruma (cabdill de guerra)"
    categoria: "substantiu"

  - original: "Hwæt!"
    transliteracio: "Hwæt!"
    traduccio: "Escolteu! / Heus ací!"
    nota: "Interjecció inicial del poema; fórmula per captar l'atenció de l'audiència"
    categoria: "interjecció"

  - original: "frōfre"
    transliteracio: "frofre"
    traduccio: "consol, alleujament"
    nota: "Concepte important; sovint associat a la gràcia divina"
    categoria: "substantiu"

  - original: "līf-frēa"
    transliteracio: "lif-frea"
    traduccio: "Senyor de la vida (Déu)"
    nota: "Kenning per a Déu; 'līf' = vida, 'frēa' = senyor"
    categoria: "kenning"

  - original: "hron-rād"
    transliteracio: "hron-rad"
    traduccio: "camí de la balena (el mar)"
    nota: "Kenning clàssic per al mar; 'hron' = balena, 'rād' = camí"
    categoria: "kenning"

  - original: "bān-hūs"
    transliteracio: "ban-hus"
    traduccio: "casa dels ossos (el cos)"
    nota: "Kenning per al cos humà; 'bān' = os, 'hūs' = casa"
    categoria: "kenning"

  - original: "beado-lēoma"
    transliteracio: "beado-leoma"
    traduccio: "llum de batalla (espasa)"
    nota: "Kenning per a l'espasa; 'beado' = batalla, 'lēoma' = llum"
    categoria: "kenning"
