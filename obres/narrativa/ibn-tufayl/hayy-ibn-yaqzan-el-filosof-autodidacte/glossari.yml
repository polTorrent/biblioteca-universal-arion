termes:
  - original: "حي بن يقظان"
    transliteracio: "Hayy ibn Yaqzan"
    traduccio: "El Vivent, fill del Despert"
    nota: "Protagonista de l'obra. Nom simbòlic que representa l'ànima humana desperta al coneixement."

  - original: "ابن طفيل"
    transliteracio: "Ibn Tufayl"
    traduccio: "Ibn Tufayl"
    nota: "Abu Bakr Muhammad ibn Abd al-Malik ibn Tufayl al-Qaysi (c. 1105–1185). Filòsof andalusí, metge i visir almohade."

  - original: "ابن سينا"
    transliteracio: "Avicenna / Ibn Sina"
    traduccio: "Avicenna"
    nota: "Abu Ali al-Husayn ibn Sina (980–1037). Filòsof i metge persa, autor d'una versió anterior de Hayy ibn Yaqzan."

  - original: "الغزالي"
    transliteracio: "al-Ghazali / Algazâlî"
    traduccio: "al-Ghazâlî"
    nota: "Abu Hamid al-Ghazali (1058–1111). Teòleg i filòsof persa, autor del Tahâfut al-falâsifa."

  - original: "ابن باجة"
    transliteracio: "Avempace / Ibn Bâjja"
    traduccio: "Avempace"
    nota: "Abu Bakr ibn Yahya ibn al-Sa'igh (c. 1085–1138). Filòsof andalusí de Saragossa."

  - original: "الفارابي"
    transliteracio: "al-Farabi / Alpharabius"
    traduccio: "al-Fàrâbî"
    nota: "Abu Nasr al-Farabi (c. 870–950). Filòsof turc, considerat el Segon Mestre després d'Aristòtil."

  - original: "أسال"
    transliteracio: "Asâl"
    traduccio: "Asâl"
    nota: "Personatge que representa el creient contemplatiu que busca la solitud per trobar Déu."

  - original: "سلامان"
    transliteracio: "Salâman"
    traduccio: "Salâman"
    nota: "Personatge que representa el creient convencional que prefereix la vida en societat i la lletra de la llei."

  - original: "الروح الحيواني"
    transliteracio: "al-ruh al-hayawani"
    traduccio: "Esperit animal"
    nota: "Concepte de la filosofia medieval: substància subtil que resideix al cor i dóna vida al cos."

  - original: "النفس النباتية"
    transliteracio: "al-nafs al-nabatiyya"
    traduccio: "Ànima vegetativa"
    nota: "Facultat responsable de la nutrició i el creixement, compartida per plantes i animals."

  - original: "النفس الحساسة"
    transliteracio: "al-nafs al-hassasa"
    traduccio: "Ànima sensitiva"
    nota: "Facultat responsable de la sensació i el moviment local, pròpia dels animals."

  - original: "الواجب الوجود"
    transliteracio: "al-wajib al-wujud"
    traduccio: "L'Ésser necessàriament autoexistent"
    nota: "Déu com a Ésser la existència del qual és necessària per si mateixa, concepte central d'Avicenna."

  - original: "الاتصال"
    transliteracio: "al-ittisal"
    traduccio: "Unió (amb Déu)"
    nota: "Estat místic d'unió contemplativa amb l'Ésser diví, objectiu últim del filòsof autodidacte."

  - original: "الهيولى"
    transliteracio: "al-hayula / Hylé"
    traduccio: "Matèria primera (Hylé)"
    nota: "Concepte aristotèlic: substrat material despullat de tota forma, potencialitat pura."

  - original: "الصورة"
    transliteracio: "al-sura"
    traduccio: "Forma"
    nota: "Principi actiu que determina la naturalesa d'un cos, oposat a la matèria."

  - original: "الصوفية"
    transliteracio: "al-sufiyya"
    traduccio: "Sufís / Sufians"
    nota: "Corrents místics de l'islam que busquen la unió directa amb Déu mitjançant l'ascesi i la contemplació."

  - original: "القرآن"
    transliteracio: "al-Qur'an"
    traduccio: "Alcorà"
    nota: "Llibre sagrat de l'islam, revelat al profeta Mahoma."

  - original: "الحنفية"
    transliteracio: "al-hanafiyya"
    traduccio: "Secta hanafita"
    nota: "Una de les quatre escoles jurídiques de l'islam sunita, fundada per Abu Hanifa (699–767)."
