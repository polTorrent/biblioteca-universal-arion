termes:
  - original: "chateau"
    traduccio: "castell"
    nota: "Poe usa el mot francès per evocar l'ambient gòtic europeu"

  - original: "valet"
    traduccio: "criat"
    nota: "Servent personal del narrador"

  - original: "candelabrum"
    traduccio: "canelobre"
    nota: "Canelobre alt amb múltiples espelmes"

  - original: "tapestry"
    traduccio: "tapissos"
    nota: "Teixits decoratius que cobrien les parets del castell"

  - original: "armorial trophies"
    traduccio: "trofeus heràldics"
    nota: "Ornaments amb escuts d'armes i símbols nobiliaris"

  - original: "arabesque"
    traduccio: "arabesc"
    nota: "Ornamentació decorativa d'influència àrab"

  - original: "vignette manner"
    traduccio: "manera de vinyeta"
    nota: "Tècnica pictòrica on els contorns es difuminen cap al fons"

  - original: "Moresque"
    traduccio: "a la morisca"
    nota: "Estil decoratiu d'influència morisca/islàmica"

  - original: "filigreed"
    traduccio: "filigranat"
    nota: "Treball ornamental en fil metàl·lic prim"

  - original: "countenance"
    traduccio: "rostre"
    nota: "Expressió facial, semblant; terme recurrent al text"

  - original: "pallet"
    traduccio: "paleta"
    nota: "Paleta de pintor; ortografia arcaica de Poe (pallet per palette)"

  - original: "reveries"
    traduccio: "somieigs"
    nota: "Ensomniments, fantasia abstracta"

  - original: "maiden"
    traduccio: "donzella"
    nota: "Noia jove; registre elevat i arcaic"

  - original: "glee"
    traduccio: "alegria"
    nota: "Joia espontània, vivacitat"

  - original: "fawn"
    traduccio: "cérvol"
    nota: "Cervató jove; símil de la joventut i la innocència"

  - original: "turret"
    traduccio: "torre"
    nota: "Torre petita; espai on es desenvolupa la tragèdia"

  - original: "canvas"
    traduccio: "tela"
    nota: "Tela de pintor; element central de la narració"

  - original: "tints"
    traduccio: "tintes"
    nota: "Colors aplicats a la tela; metàfora de la vida extreta de l'esposa"

  - original: "stupor"
    traduccio: "estupor"
    nota: "Estat de letargia i confusió del narrador"

  - original: "Mrs. Radcliffe"
    traduccio: "la senyora Radcliffe"
    nota: "Ann Radcliffe (1764-1823), novel·lista gòtica anglesa"

  - original: "Sully"
    traduccio: "Sully"
    nota: "Thomas Sully (1783-1872), retratista anglo-americà"
