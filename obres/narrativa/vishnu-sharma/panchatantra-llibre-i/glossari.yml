termes:
  - original: Panchatantra
    transliteracio: पञ्चतन्त्र
    traduccio: Cinc tractats
    nota: "Obra clàssica de faules índies atribuïda a Vishnu Sharma; 'pancha' (cinc) + 'tantra' (tractat, sistema)."

  - original: Mitrabheda
    transliteracio: मित्रभेद
    traduccio: La pèrdua dels amics
    nota: "Títol del Llibre I; 'mitra' (amic) + 'bheda' (separació, trencament)."

  - original: Vishnu Sharma
    transliteracio: विष्णुशर्मन्
    traduccio: Vishnu Sharma
    nota: "Braman llegendari, autor del Panchatantra, que l'escriu per instruir tres prínceps ignorants."

  - original: Rusty
    transliteracio: Piṅgalaka (पिङ्गलक)
    traduccio: Lleonat
    nota: "Lleó, rei de la selva. En sànscrit Piṅgalaka ('el rogenc'). Ryder el tradueix com 'Rusty'."

  - original: Lively
    transliteracio: Sañjīvaka (सञ्जीवक)
    traduccio: Vivaç
    nota: "Bou que es fa amic del lleó. En sànscrit Sañjīvaka ('el que dona vida'). Ryder el tradueix com 'Lively'."

  - original: Victor
    transliteracio: Damanaka (दमनक)
    traduccio: Víctor
    nota: "Xacal intrigant que destrueix l'amistat entre Rusty i Lively. En sànscrit Damanaka ('el domador')."

  - original: Cheek
    transliteracio: Karaṭaka (करटक)
    traduccio: Descarat
    nota: "Xacal company de Victor, més prudent i menys ambiciós. En sànscrit Karaṭaka."

  - original: Increase
    transliteracio: Vardhamāna (वर्धमान)
    traduccio: Creixença
    nota: "Mercader propietari dels bous Joyful i Lively. En sànscrit Vardhamāna ('el qui prospera')."

  - original: Joyful
    transliteracio: Nandaka (नन्दक)
    traduccio: Joiós
    nota: "Bou company de Lively, que segueix el viatge sense problemes."

  - original: Circle of Four
    transliteracio: Maṇḍala
    traduccio: Cercle dels Quatre
    nota: "Formació política amb quatre divisions: el lleó (rei), la guàrdia, els subalterns i els servents."

  - original: nīti
    transliteracio: नीति
    traduccio: política / conducta prudent
    nota: "Concepte central del Panchatantra: l'art de governar i viure amb saviesa pràctica."

  - original: dharma
    transliteracio: धर्म
    traduccio: deure / llei moral
    nota: "Llei còsmica, deure moral i religiós. Un dels quatre objectius de la vida (puruṣārtha)."

  - original: artha
    transliteracio: अर्थ
    traduccio: riquesa / profit
    nota: "Prosperitat material, un dels quatre objectius de la vida. El Panchatantra és essencialment un tractat d'artha-śāstra."

  - original: kāma
    transliteracio: काम
    traduccio: desig / plaer
    nota: "Plaer sensorial, un dels quatre objectius de la vida."

  - original: karma
    transliteracio: कर्म
    traduccio: acció / conseqüència
    nota: "Llei de causa i efecte moral; les accions determinen el destí futur."

  - original: Shiva
    transliteracio: शिव
    traduccio: Xiva
    nota: "Divinitat hindú; Lively és comparat amb el bou Nandi, muntura de Shiva."

  - original: Indra
    transliteracio: इन्द्र
    traduccio: Indra
    nota: "Rei dels déus en la mitologia vèdica."

  - original: Kailasa
    transliteracio: कैलास
    traduccio: Kailasa
    nota: "Muntanya sagrada, residència de Shiva."

  - original: Jumna
    transliteracio: यमुना (Yamunā)
    traduccio: Yamuna
    nota: "Riu sagrat de l'Índia on Lively es recupera i pasta."

  - original: Mathura
    transliteracio: मथुरा
    traduccio: Mathura
    nota: "Ciutat sagrada on es dirigeix el mercader Increase."

  - original: banyan
    transliteracio: vaṭa (वट)
    traduccio: banià
    nota: "Ficus benghalensis, arbre sagrat sota el qual Rusty estableix la seva cort."

  - original: śāstra
    transliteracio: शास्त्र
    traduccio: tractat / ensenyament
    nota: "Text autoritatiu; Lively ha estudiat nombrosos śāstres, cosa que l'eleva intel·lectualment."

  - original: safe-conduct
    transliteracio: abhaya (अभय)
    traduccio: salconduit / garantia de seguretat
    nota: "Promesa de no-agressió que Lively demana a Rusty abans de presentar-s'hi."

  - original: The Wedge-pulling Monkey
    transliteracio: ""
    traduccio: El mico que arrencava la falca
    nota: "Primera faula intercalada del Llibre I; moralitza contra la intromissió imprudent."
