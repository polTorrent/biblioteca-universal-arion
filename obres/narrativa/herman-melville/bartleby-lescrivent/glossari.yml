termes:
  - original: scrivener
    traduccio: escrivent / escrivà
    nota: >
      Copista professional de documents legals al segle XIX.
      En català s'alterna entre "escrivent" (títol) i "escrivà" (text).
      Caldria unificar.

  - original: I would prefer not to
    traduccio: Preferiria no fer-ho
    nota: >
      Frase icònica de Bartleby. El condicional "preferiria" captura
      el matís de l'original "would prefer". En alguns passatges apareix
      com "Prefereixo no fer-ho" (present indicatiu), seguint la variació
      de l'original ("I prefer not to").

  - original: chambers
    traduccio: despatx
    nota: >
      Bufet d'advocat a la zona financera de Nova York al s. XIX.
      No és simplement una "oficina", sinó un local professional.

  - original: Master in Chancery
    traduccio: Mestre de la Cancelleria
    nota: >
      Càrrec judicial de Nova York abolit el 1846 amb la nova constitució.
      S'ocupava de justícia equitativa i propietats.

  - original: Turkey
    traduccio: Turkey / Gall Dindi
    nota: >
      Sobrenom del primer copista. PROBLEMA: la traducció alterna
      entre "Turkey" (sense traduir) i "Gall Dindi" (traduït).
      Cal unificar a una sola forma.

  - original: Nippers
    traduccio: Nippers / Pinces / Tenalles
    nota: >
      Sobrenom del segon copista. PROBLEMA: apareix com a "Nippers",
      "Pinces" i "Tenalles" indistintament. Cal unificar.

  - original: Ginger Nut
    traduccio: Ginger Nut / Galeta de Gingebre / Gallet
    nota: >
      Sobrenom del noi d'oficina. PROBLEMA: apareix amb tres formes
      diferents. Cal unificar.

  - original: screen / folding screen
    traduccio: biombo / paravent / para-vent
    nota: >
      Biombo verd que separa Bartleby del narrador. PROBLEMA: tres
      formes diferents al text. Cal unificar a "biombo" o "paravent".

  - original: hermitage
    traduccio: ermitatge / ermitori
    nota: >
      Espai de Bartleby darrere el biombo. L'original usa sempre
      "hermitage". Cal unificar a "ermitatge".

  - original: Wall Street
    traduccio: Wall Street
    nota: >
      Carrer del Lower Manhattan, centre financer de Nova York des del s. XIX.
      Es manté sense traduir.

  - original: the Tombs
    traduccio: les Tombes
    nota: >
      Nom popular de la presó municipal de Nova York (The Halls of Justice),
      anomenada així pel seu estil arquitectònic egipci.

  - original: Dead Letter Office
    traduccio: Oficina de Cartes Mortes
    nota: >
      Departament de correus que gestionava cartes que no es podien lliurar.
      Element clau del final de la narració.

  - original: John Jacob Astor
    traduccio: John Jacob Astor
    nota: >
      Magnat novaiorquès (1763-1848), l'home més ric d'Amèrica en la seva
      època. PROBLEMA: el paràgraf on apareix (Imprimis) està omès
      a la traducció.

  - original: ginger-nuts / ginger-cakes
    traduccio: galetes de gingebre
    nota: >
      Pastissets petits, plans, rodons i especiats. Element recurrent
      que simbolitza la dieta espartana de Bartleby.

  - original: with submission, sir
    traduccio: amb el degut respecte, senyor
    nota: >
      Fórmula de cortesia de Turkey. Correctament traduïda.

  - original: folio
    traduccio: foli
    nota: >
      Unitat de mesura per pagar els copistes (100 paraules = 1 foli).

  - original: sand-box
    traduccio: caixa de sorra
    nota: >
      Recipient amb sorra fina per assecar la tinta, usat abans
      del paper secant.

  - original: red tape
    traduccio: cinta vermella
    nota: >
      Cinta per lligar documents legals, origen de l'expressió
      anglesa "red tape" (burocràcia).
