termes:
  - original: triclinium
    traduccio: triclini
    definicio: Menjador romà amb tres llits inclinats on els comensals sopaven reclinats.

  - original: pater familiae
    traduccio: pare de família
    definicio: Cap de la família romana, amb autoritat absoluta sobre la casa i els seus membres.

  - original: spado
    traduccio: eunuc
    definicio: Home castrat, sovint esclau, encarregat de tasques domèstiques delicades.

  - original: Falernum
    traduccio: Falern
    definicio: Vi de gran prestigi de la regió de Falern (Campània), considerat el millor de Roma.

  - original: sevir Augustalis
    traduccio: sevir augustal
    definicio: Càrrec religiós honorífic atorgat als lliberts rics per al culte imperial.

  - original: libertus
    traduccio: llibert
    definicio: Esclau alliberat que obtenia la ciutadania romana, però amb certes restriccions socials.

  - original: dispensator
    traduccio: administrador
    definicio: Esclau o llibert encarregat de la comptabilitat i finances de la casa.

  - original: iatraliptae
    traduccio: massatgistes
    definicio: Esclaus especialitzats en massatges i tractaments corporals als banys.

  - original: gausapa
    traduccio: capa (de llana peluda)
    definicio: Teixit de llana gruixut i pelut, usat com a mantell o estovalles.

  - original: ostiarius
    traduccio: porter
    definicio: Esclau encarregat de vigilar l'entrada de la casa.

  - original: Cave canem
    traduccio: Compte amb el gos
    definicio: Inscripció d'advertència a les entrades de les cases romanes, documentada a Pompeia.

  - original: Lares
    traduccio: Lares
    definicio: Divinitats protectores de la llar romana, representades en petits sagraris domèstics.

  - original: nomenculator
    traduccio: nomenclàtor
    definicio: Esclau encarregat de recordar noms i presentar convidats o plats.

  - original: repositorium
    traduccio: safata (de servei)
    definicio: Gran safata o plataforma on es presentaven els plats al banquet romà.

  - original: gustatio / promulsidare
    traduccio: entrants / entremesos
    definicio: Primer plat del banquet romà, equivalent als aperitius.

  - original: garum
    traduccio: salsa de peix (garum)
    definicio: Condiment fermentat de peix, omnipresent a la cuina romana.

  - original: scissor
    traduccio: trinxador
    definicio: Esclau especialitzat a trinxar la carn durant el banquet.

  - original: mulsum
    traduccio: vi dolç (mulsum)
    definicio: Vi barrejat amb mel, servit habitualment als entrants.

  - original: petauristarii
    traduccio: acròbates
    definicio: Artistes d'espectacle que feien equilibris, salts i proves de destresa.

  - original: actuarius
    traduccio: actuari / escrivà
    definicio: Secretari encarregat de registrar i llegir les actes o notícies oficials.

  - original: Saturnalia
    traduccio: Saturnals
    definicio: Festes romanes de desembre en honor de Saturn, amb banquets i intercanvi de regals.

  - original: Atellana
    traduccio: atel·lana
    definicio: Farsa popular romana d'origen osc, amb personatges estereotipats i humor groller.

  - original: cordax
    traduccio: còrdax
    definicio: Dansa obscena associada a la comèdia grega antiga.

  - original: modius
    traduccio: modi
    definicio: Mesura de capacitat romana per a gra, equivalent a uns 8,75 litres.

  - original: sestertium
    traduccio: sesterci
    definicio: Moneda romana de plata, unitat de compte estàndard.

  - original: manumissio
    traduccio: manumissió
    definicio: Acte jurídic d'alliberament d'un esclau a la Roma antiga.

  - original: Corintheum (aes)
    traduccio: bronze de Corint
    definicio: Aliatge de bronze, or i plata suposadament creat a la destrucció de Corint (146 aC), molt preuat.

  - original: Liber Pater
    traduccio: Liber Pater (Bacus)
    definicio: Epítet del déu Bacus/Dionís; 'liber' significa també 'lliure', cosa que permet jocs de paraules.
