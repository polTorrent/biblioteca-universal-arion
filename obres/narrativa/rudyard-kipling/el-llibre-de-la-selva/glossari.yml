# Glossari de termes clau - El Llibre de la Selva
# Rudyard Kipling

obra: "The Jungle Book"
autor: "Rudyard Kipling"
traduccio_titol: "El Llibre de la Selva"

personatges:
  - original: "Mowgli"
    traduccio: "Mowgli"
    descripcio: "Nen humà criat pels llops a la selva"
  - original: "Bagheera"
    traduccio: "Bagheera"
    descripcio: "Pantera negra, mentor i protector de Mowgli"
  - original: "Baloo"
    traduccio: "Baloo"
    descripcio: "Os bru, mestre de la Llei de la Selva"
  - original: "Shere Khan"
    traduccio: "Shere Khan"
    descripcio: "Tigre de Bengala, antagonista principal"
  - original: "Kaa"
    traduccio: "Kaa"
    descripcio: "Pitó de roca, savi i ancià"
  - original: "Akela"
    traduccio: "Akela"
    descripcio: "Llop solitari, líder de la Manada de Seeonee"
  - original: "Raksha"
    traduccio: "Raksha"
    descripcio: "Lloba mare adoptiva de Mowgli, anomenada 'el Dimoni'"
  - original: "Tabaqui"
    traduccio: "Tabaqui"
    descripcio: "Xacal llepaculs de Shere Khan"
  - original: "Hathi"
    traduccio: "Hathi"
    descripcio: "Elefant savi, senyor de la selva"
  - original: "Bandar-log"
    traduccio: "Bandar-log"
    descripcio: "Poble dels Micos, sense llei ni líder"
  - original: "Rikki-tikki-tavi"
    traduccio: "Rikki-tikki-tavi"
    descripcio: "Mangosta protagonista d'un dels contes"
  - original: "Nag"
    traduccio: "Nag"
    descripcio: "Cobra negra, enemic de Rikki-tikki"
  - original: "Nagaina"
    traduccio: "Nagaina"
    descripcio: "Cobra femella, parella de Nag"

llocs:
  - original: "Seeonee Hills"
    traduccio: "Turons de Seeonee"
    descripcio: "Territori de la Manada de Llops"
  - original: "Council Rock"
    traduccio: "Roca del Consell"
    descripcio: "Lloc de reunió de la Manada"
  - original: "Cold Lairs"
    traduccio: "Caus Freds"
    descripcio: "Ciutat en ruïnes habitada pels Bandar-log"
  - original: "Waingunga"
    traduccio: "Waingunga"
    descripcio: "Riu principal de la selva"

conceptes:
  - original: "Law of the Jungle"
    traduccio: "Llei de la Selva"
    descripcio: "Codi de conducta que regeix els animals"
  - original: "Master Words"
    traduccio: "Paraules Mestres"
    descripcio: "Frases màgiques per comunicar-se entre espècies"
  - original: "Red Flower"
    traduccio: "Flor Roja"
    descripcio: "Nom que els animals donen al foc"
  - original: "Free People"
    traduccio: "Poble Lliure"
    descripcio: "Com s'autoanomenen els llops"
  - original: "Man-cub"
    traduccio: "Cadell d'home"
    descripcio: "Mowgli, segons els animals"
  - original: "Pack"
    traduccio: "Manada"
    descripcio: "Grup de llops organitzat"

notes_traduccio:
  - "Els noms propis dels animals es mantenen en l'original hindi/anglès"
  - "Els termes 'Bandar-log' i 'Waingunga' provenen de l'hindi i es conserven"
  - "Expressions com 'Good hunting!' es tradueixen per 'Bona caça!'"
