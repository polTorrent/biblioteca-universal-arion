# Glossari — Diàlegs dels Morts (Νεκρικοὶ Διάλογοι)
# Lucià de Samòsata (Λουκιανός ὁ Σαμοσατεύς)

termes:
  - original: "ᾄδης"
    transliteracio: "Hades"
    traduccio: "Hades, l'inframón"
    nota: "Món dels morts en la mitologia grega; escenari principal dels diàlegs."

  - original: "ὀβολός"
    transliteracio: "obolós"
    traduccio: "òbol"
    nota: "Moneda que es posava a la boca dels difunts per pagar Caront."

  - original: "πορθμεῖα"
    transliteracio: "porthmeîa"
    traduccio: "passatge, preu del transport"
    nota: "Tarifa que Caront cobrava per travessar l'Estígia."

  - original: "Χάρων"
    transliteracio: "Chárōn"
    traduccio: "Caront"
    nota: "Barquer que transporta les ànimes dels morts a través del riu."

  - original: "Αἰακός"
    transliteracio: "Aiakós"
    traduccio: "Èac"
    nota: "Un dels tres jutges dels morts, juntament amb Minos i Radamant."

  - original: "Κέρβερος"
    transliteracio: "Kérberos"
    traduccio: "Cèrber"
    nota: "Gos de tres caps que guarda l'entrada de l'Hades."

  - original: "Λήθη"
    transliteracio: "Léthē"
    traduccio: "Leteu, oblit"
    nota: "Riu de l'oblit; els morts en bevien per oblidar la vida terrenal."

  - original: "ἐλλέβορος"
    transliteracio: "elléboros"
    traduccio: "el·lèbor"
    nota: "Planta medicinal usada com a remei per a la bogeria."

  - original: "Ἄμμων"
    transliteracio: "Ámmōn"
    traduccio: "Ammon"
    nota: "Déu egipci; Alexandre pretenia ser-ne fill."

  - original: "σατράπης"
    transliteracio: "satrápēs"
    traduccio: "sàtrapa"
    nota: "Governador provincial a l'Imperi Persa."

  - original: "πήρα"
    transliteracio: "pḗra"
    traduccio: "sarró, bossa"
    nota: "Bossa característica dels filòsofs cínics, com Diògenes i Menip."

  - original: "κύων"
    transliteracio: "kýōn"
    traduccio: "gos, cínic"
    nota: "Apel·latiu dels filòsofs cínics; Menip és anomenat 'el gos'."

  - original: "ἰσοτιμία"
    transliteracio: "isotimía"
    traduccio: "igualtat, equitat"
    nota: "Tema central: a l'Hades tots són iguals, rics i pobres."

  - original: "ἰσηγορία"
    transliteracio: "isēgoría"
    traduccio: "igualtat de paraula"
    nota: "Dret a parlar en igualtat; a l'Hades ningú no té privilegi."

  - original: "μνῆμα"
    transliteracio: "mnêma"
    traduccio: "monument funerari, tomba"
    nota: "Referit especialment al Mausoleu d'Halicarnàs de Mausol."

  - original: "τριβώνιον"
    transliteracio: "tribṓnion"
    traduccio: "mantell bast"
    nota: "Vestimenta simple dels filòsofs cínics, símbol d'austeritat."

  - original: "δοξάριον"
    transliteracio: "doxárion"
    traduccio: "glorieta, fama buida"
    nota: "Diminutiu despectiu de δόξα (glòria); usat per Aquil·les per referir-se a la seva fama."

  - original: "προσκυνεῖσθαι"
    transliteracio: "proskýneisthai"
    traduccio: "ser adorat, prostració"
    nota: "Gest d'adoració persa que Alexandre va imposar als seus súbdits."

  - original: "μάντις"
    transliteracio: "mántis"
    traduccio: "endeví, profeta"
    nota: "Referit a Tirèsias, que va viure com a home i com a dona."

  - original: "Ἑκάτη"
    transliteracio: "Hekátē"
    traduccio: "Hècate"
    nota: "Deessa associada amb la màgia, les cruïlles i el món dels morts."
