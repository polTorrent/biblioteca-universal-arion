termes:
  - terme: Providència
    original: Providence
    definicio: >
      Govern diví del món en la teologia cristiana. Sade l'invoca irònicament
      per qüestionar la idea que un Déu just governa els destins humans, quan
      l'experiència mostra el vici premiat i la virtut castigada.
    categoria: filosofia

  - terme: Virtut
    original: Vertu
    definicio: >
      Concepte central de l'obra. En la tradició clàssica i cristiana, la pràctica
      del bé moral. Sade explora la tesi provocadora que la virtut pot ser
      contraproduent en un món corromput, i que la seva practica només porta
      desgràcies a qui la segueix.
    categoria: filosofia

  - terme: Natura
    original: Nature
    definicio: >
      Força amoral en el materialisme sadià que no distingeix entre bé i mal.
      Sade l'oposa a la moral convencional per argumentar que el crim és tan
      «natural» com la virtut.
    categoria: filosofia

  - terme: llibertinatje
    original: libertinage
    definicio: >
      Doctrina i pràctica de la llibertat moral absoluta, especialment en matèria
      sexual i religiosa. En el context del segle XVIII, designa tant el
      lliurepensament filosòfic com la conducta dissoluta.
    categoria: filosofia

  - terme: sacerdotesses de Venus
    original: Prêtresses de Vénus
    definicio: >
      Eufemisme culte per referir-se a les prostitutes. Venus era la deessa
      romana de l'amor, i les seves «sacerdotesses» les dones dedicades a
      l'amor venal.
    categoria: cultura

  - terme: arxius de Citera
    original: archives de Cythère
    definicio: >
      Expressió irònica. Citera era l'illa grega consagrada a Afrodita (Venus).
      «Arxius de Citera» indica que els títols nobiliaris de certes dones són
      ficticis, basats en els seus èxits amorosos.
    categoria: cultura

  - terme: arrendataris generals
    original: Fermiers-généraux
    definicio: >
      Financers que, sota l'Antic Règim, compraven a la corona el dret de
      recaptar impostos. Figures d'enorme riquesa i ressentiment popular,
      molts van ser guillotinats durant la Revolució.
    categoria: historia

  - terme: àngel Jesrad
    original: ange Jesrad
    definicio: >
      Personatge del conte filosòfic «Zadig ou la Destinée» (1747) de Voltaire.
      Explica a Zadig que tots els mals aparents són necessaris en el pla
      providencial, tesi que Sade utilitza irònicament.
    categoria: intertextualitat

  - terme: Conciergerie
    original: Conciergerie
    definicio: >
      Antiga presó de París situada a l'Île de la Cité, annexa al Palau de
      Justícia. Durant la Revolució Francesa hi van ser empresonats molts
      condemnats a mort, inclosa Maria Antonieta.
    categoria: historia

  - terme: Lorsange
    original: Lorsange
    definicio: >
      Nom adoptat per Juliette després del seu matrimoni. Possible joc de
      paraules amb «lors» (llavors) i «ange» (àngel), suggerint una caiguda
      de la innocència.
    categoria: personatges

  - terme: Justine
    original: Justine
    definicio: >
      Protagonista de l'obra, personatge al·legòric que encarna la virtut
      perseguida. El nom evoca directament la justícia (iustitia), virtut
      cardinal que Sade mostra com a impotent davant la maldat del món.
    categoria: personatges

  - terme: Dubois
    original: Dubois
    definicio: >
      Criminal astuta i implacable que salva Justine de la presó. Representa
      el vici pragmàtic que sobreviu i prospera, contrapunt de la virtut
      ingènua de la protagonista.
    categoria: personatges

  - terme: Dubourg
    original: Dubourg
    definicio: >
      Ric financer que intenta seduir Justine amb discursos materialistes.
      Encarna la filosofia del vici recompensat i la indiferència moral
      de les classes privilegiades.
    categoria: personatges

  - terme: du Harpin
    original: du Harpin
    definicio: >
      Usurer avar que acusa falsament Justine de robatori. El seu nom suggereix
      «harpin» (garfi), evocant l'avaricia rapinyaire. Representa la hipocresia
      de qui exigeix probitat mentre practica el crim.
    categoria: personatges

  - terme: himen
    original: hymen
    definicio: >
      Referència mitològica al déu grec del matrimoni (Himeneu). En el text,
      «les lleis de l'himen» significa les obligacions del matrimoni.
    categoria: cultura

  - terme: Tartuf
    original: Tartufe
    definicio: >
      Personatge de la comèdia homònima de Molière (1664), arquetip de
      l'hipòcrita religiós. Sade estableix un paral·lelisme entre la polèmica
      que va generar el Tartuf i la que anticipa per a Justine.
    categoria: intertextualitat
