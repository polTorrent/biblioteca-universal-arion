obra:
  titol: Diàlegs dels morts (selecció de 10 diàlegs)
  titol_original: Νεκρικοὶ Διάλογοι
  autor: Luci de Samòsata
  autor_original: Λουκιανὸς ὁ Σαμοσατεύς
  traductor: Biblioteca Arion (IA + comunitat)
