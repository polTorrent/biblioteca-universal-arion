# Glossari — Diàlegs dels morts (Νεκρικοὶ Διάλογοι)
# Luci de Samòsata (Λουκιανὸς ὁ Σαμοσατεύς)

termes:
  - grec: Ἅιδης
    transliteracio: Haidēs
    catala: Hades
    definicio: >
      El món subterrani dels morts en la mitologia grega; també el déu que el governa.
      Escenari principal de tots els diàlegs.

  - grec: πορθμεῖον
    transliteracio: porthmeion
    catala: passatge / preu del passatge
    definicio: >
      L'òbol que els morts havien de pagar a Caront per travessar l'Estix.
      Motiu recurrent: Menip es nega a pagar.

  - grec: ὀβολός
    transliteracio: obolos
    catala: òbol
    definicio: >
      Moneda grega de poc valor col·locada a la boca del difunt per pagar Caront.

  - grec: Χάρων
    transliteracio: Charōn
    catala: Caront
    definicio: >
      Barquer de l'Hades que transporta les ànimes dels morts a través del riu.

  - grec: Ἑρμῆς
    transliteracio: Hermēs
    catala: Hermes
    definicio: >
      Déu missatger i psicopomp (conductor d'ànimes cap a l'Hades).

  - grec: Πλούτων
    transliteracio: Ploutōn
    catala: Plutó
    definicio: >
      Déu sobirà del món subterrani, senyor dels morts.

  - grec: Αἰακός
    transliteracio: Aiakos
    catala: Èac
    definicio: >
      Un dels tres jutges dels morts a l'Hades (amb Minos i Radamant); també porter.

  - grec: Κέρβερος
    transliteracio: Kerberos
    catala: Cèrber
    definicio: >
      Gos de tres caps que custodia l'entrada de l'Hades.

  - grec: Πυριφλεγέθων
    transliteracio: Pyriphlegethōn
    catala: Piriflegètont
    definicio: >
      Riu de foc de l'Hades.

  - grec: Λήθη
    transliteracio: Lēthē
    catala: Leteu / Oblit
    definicio: >
      Riu de l'oblit; qui en beu perd la memòria de la vida terrenal.

  - grec: Μένιππος
    transliteracio: Menippos
    catala: Menip
    definicio: >
      Filòsof cínic (s. III aC) que fa de protagonista-narrador satíric en diversos diàlegs.
      Ridiculitza els poderosos i els filòsofs des d'una perspectiva igualitària.

  - grec: Διογένης
    transliteracio: Diogenēs
    catala: Diògenes
    definicio: >
      Diògenes de Sinope, fundador del cinisme pràctic. Interlocutor irònic als diàlegs 1 i 13.

  - grec: Πολυδεύκης
    transliteracio: Polydeukēs
    catala: Pòl·lux
    definicio: >
      Germà bessó immortal de Càstor; alterna entre l'Olimp i l'Hades.

  - grec: Χείρων
    transliteracio: Cheirōn
    catala: Quiró
    definicio: >
      Centaure immortal, mestre d'herois, que va renunciar a la immortalitat per tedi existencial.

  - grec: Τειρεσίας
    transliteracio: Teiresias
    catala: Tirèsias
    definicio: >
      Endeví cec de Tebes; va viure com a home i com a dona.

  - grec: κύων / κυνικός
    transliteracio: kyōn / kynikos
    catala: gos / cínic
    definicio: >
      Epítet dels filòsofs cínics (lit. «gossos»), que rebutjaven les convencions socials.

  - grec: τριβώνιον
    transliteracio: tribōnion
    catala: tribó
    definicio: >
      Mantell curt i gastat, vestimenta típica dels filòsofs cínics.

  - grec: πήρα
    transliteracio: pēra
    catala: sarró / bossa
    definicio: >
      Bossa de cuir dels cínics per portar el mínim necessari.

  - grec: κολακεία
    transliteracio: kolakeia
    catala: adulació
    definicio: >
      Tema central de diversos diàlegs; crítica als aduladors dels rics i poderosos.

  - grec: σατράπης
    transliteracio: satrapēs
    catala: sàtrapa
    definicio: >
      Governador provincial de l'Imperi Persa; per extensió, qualsevol poderós.

  - grec: Ἄμμων
    transliteracio: Ammōn
    catala: Ammon
    definicio: >
      Déu egipci-grec; l'oracle de Siwa va declarar Alexandre fill d'Ammon.

  - grec: ἀθανασία
    transliteracio: athanasia
    catala: immortalitat
    definicio: >
      Concepte central del diàleg 26 (Quiró renuncia a la immortalitat) i tema irònic recurrent.

  - grec: ἰσοτιμία
    transliteracio: isotimia
    catala: igualtat de condició
    definicio: >
      La igualtat universal dels morts a l'Hades, independentment del rang en vida.
      Tesi filosòfica central de l'obra.

  - grec: κύαμοι
    transliteracio: kyamoi
    catala: faves
    definicio: >
      Aliment prohibit segons Pitàgores; objecte de burla al diàleg 20.
