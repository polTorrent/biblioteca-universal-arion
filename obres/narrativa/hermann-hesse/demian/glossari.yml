termes:
  - original: "Abraxas"
    traduccio: "Abraxas"
    definicio: |
      Déu gnòstic que uneix els contraris: bé i mal, llum i foscor,
      masculí i femení. Per als gnòstics, Abraxas representava la totalitat
      divina, més enllà de la dualitat moral convencional. El nom apareix
      en gemmes i amulets gnòstics dels segles II-IV dC. Hesse el pren
      com a símbol de la integració psíquica que Sinclair busca.
    notes: "Concepte central de la novel·la"

  - original: "Bildungsroman"
    traduccio: "novel·la de formació"
    definicio: |
      Gènere literari alemany que narra el desenvolupament espiritual,
      moral i intel·lectual d'un protagonista des de la joventut fins a
      la maduresa. Demian n'és un exemple paradigmàtic.
    notes: "Gènere al qual pertany l'obra"

  - original: "Kain / Kainszeichen"
    traduccio: "Caín / signe de Caín"
    definicio: |
      Segons el Gènesi, Déu va marcar Caín després que matés Abel.
      Demian reinterpreta el signe no com a estigma sinó com a distinció:
      marca dels éssers humans singulars, els que pensen per si mateixos
      i fan por al «ramat» (die Herde).
    notes: "Reinterpretació gnòstica del relat bíblic"

  - original: "die Herde"
    traduccio: "el ramat"
    definicio: |
      Terme usat per Demian per designar la massa de persones que no
      pensen per si mateixes i que temen els individus singulars.
      Ressonàncies evidents de Nietzsche (Herdenmoral).
    notes: "Influència nietzscheana"

  - original: "Zwei Welten"
    traduccio: "dos mons"
    definicio: |
      Dualitat central del capítol 1: el món lluminós (lichte Welt)
      de la família, l'ordre i la pietat, versus el món fosc (finstere Welt)
      dels instints, el pecat i la transgressió. La novel·la narra la
      superació d'aquesta dualitat.
    notes: "Estructura temàtica fonamental"

  - original: "der Schächer"
    traduccio: "el lladre (a la creu)"
    definicio: |
      Un dels dos lladres crucificats al costat de Jesús. Demian
      reinterpreta la figura del lladre impenitent com a model de
      caràcter i autenticitat, en contrast amb el penediment conformista.
    notes: "Cap. 3 — altra reinterpretació bíblica de Demian"

  - original: "Der Vogel kämpft sich aus dem Ei"
    traduccio: "L'ocell lluita per sortir de l'ou"
    definicio: |
      Frase simbòlica central: «L'ocell lluita per sortir de l'ou. L'ou
      és el món. Qui vol néixer ha de destruir un món. L'ocell vola cap
      a Déu. El déu es diu Abraxas.» Metàfora del procés d'individuació:
      trencar la closca del món convencional per néixer com a persona autèntica.
    notes: "Motiu recurrent — capítols 4 i 5"

  - original: "Frau Eva"
    traduccio: "la senyora Eva"
    definicio: |
      Mare de Demian, figura arquetípica que encarna l'anima junguiana:
      mare, amant, deessa, dona sàvia. El seu nom evoca la primera dona
      bíblica i la «mare universal». Representa la totalitat i la
      integració dels contraris que Sinclair cerca.
    notes: "Figura central dels capítols 6-8"

  - original: "Jakobs Kampf"
    traduccio: "la lluita de Jacob"
    definicio: |
      Referència a Gènesi 32:22-32, on Jacob lluita tota la nit amb
      un àngel (o amb Déu). Hesse l'usa com a metàfora de la lluita
      interior de Sinclair per integrar les dues meitats del seu ésser.
    notes: "Cap. 6"

  - original: "Konfirmandenunterricht"
    traduccio: "catequesi de confirmació"
    definicio: |
      Classes de preparació per al sagrament de la confirmació en
      l'Església protestant. Context on Demian ofereix les seves
      reinterpretacions bíbliques heterodoxes.

  - original: "Pistorius"
    traduccio: "Pistorius"
    definicio: |
      Antic estudiant de teologia i organista que guia Sinclair en
      el coneixement de les religions gnòstiques i del simbolisme.
      Representa un estadi intermedi en el camí de Sinclair: mestre
      valuós però limitat perquè mira enrere, no endavant.
    notes: "Cap. 4-5"

  - original: "Lateinschule"
    traduccio: "escola de llatí"
    definicio: |
      Escola secundària on s'ensenyava llatí com a matèria principal,
      típica del sistema educatiu alemany de principis del s. XX.

  - original: "Sperber"
    traduccio: "esparver"
    definicio: |
      Aus rapinyaire que Sinclair pinta com a símbol de l'ocell que
      surt de l'ou. L'esparver (Accipiter nisus) representa la força,
      la llibertat i la voluntat de transcendència.
