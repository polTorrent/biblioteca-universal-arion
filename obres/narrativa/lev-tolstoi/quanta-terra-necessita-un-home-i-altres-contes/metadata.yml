obra:
  titol: "Quanta terra necessita un home? i altres contes breus"
  titol_original: "Много ли человеку земли нужно? и другие рассказы"
  autor: "Lev Tolstoi"
  autor_original: "Лев Николаевич Толстой"
  traductor: "Editorial Clàssica"
  any_original: "1858-1886"
  any_traduccio: 2026
  llengua_original: "rus"
  descripcio: >
    Selecció de cinc contes breus morals de Lev Tolstoi: «Quanta terra necessita un home?» (1886),
    «Tres morts» (1858), «Dos vells» (1885), «De què viuen els homes» (1881) i «La candela» (1885).
    Contes de gran profunditat espiritual que exploren la cobdícia, la mort, la fe, l'amor i la justícia.
  font: "Wikisource (ru.wikisource.org)"
  llicencia_original: "Domini públic"
