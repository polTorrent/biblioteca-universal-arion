obra:
  titol: Els sofriments del jove Werther
  titol_original: Die Leiden des jungen Werthers
  autor: Johann Wolfgang von Goethe
  autor_original: Johann Wolfgang von Goethe
  traductor: Biblioteca Arion (IA + comunitat)
  any_original: 1774
  any_traduccio: 2026
  llengua_original: alemany
  genere: narrativa
  subgenere: novel·la epistolar
  descripcio: >
    Novel·la epistolar que va sacsejar l'Europa del segle XVIII. El jove Werther
    escriu cartes al seu amic Wilhelm narrant la seva passió impossible per Lotte,
    una dona compromesa amb Albert. L'obra, pedra angular del Sturm und Drang,
    explora l'amor no correspost, la natura, l'art i el conflicte entre sensibilitat
    i raó, fins a un desenllaç tràgic que va commocionar tota una generació.
