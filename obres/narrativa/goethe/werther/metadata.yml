  descripcio: 'Novel·la epistolar que va sacsejar l''Europa del segle XVIII. El jove
    Werther escriu cartes al seu amic Wilhelm narrant la seva passió impossible per
    Lotte, una dona compromesa amb Albert. L''obra, pedra angular del Sturm und Drang,
    explora l''amor no correspost, la natura, l''art i el conflicte entre sensibilitat
    i raó, fins a un desenllaç tràgic que va commocionar tota una generació.

