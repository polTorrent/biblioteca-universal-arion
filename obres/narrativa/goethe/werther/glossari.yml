termes:
  - original: "Sturm und Drang"
    traduccio: "Tempesta i ímpetu"
    nota: >
      Moviment literari i filosòfic alemany (c. 1765-1785) que reaccionava contra
      el racionalisme il·lustrat, exaltant l'emoció, la natura i la llibertat individual.
      Werther n'és l'obra emblemàtica.

  - original: "Klopstock"
    traduccio: "Klopstock"
    nota: >
      Friedrich Gottlieb Klopstock (1724-1803), poeta alemany admirat per Werther i Lotte.
      L'escena on Lotte pronuncia el seu nom durant la tempesta és un moment clau de
      comunió espiritual. Es refereix a l'oda «Die Frühlingsfeier» (La festa de la primavera).

  - original: "Homer"
    traduccio: "Homer"
    nota: >
      Werther llegeix l'Odissea d'Homer amb passió, especialment els passatges sobre
      la vida patriarcal i senzilla. Al final de la novel·la, Homer és substituït per
      Ossian, marcant el descens emocional del protagonista.

  - original: "Ossian"
    traduccio: "Ossian"
    nota: >
      Bard celta mític, suposadament traduït per James Macpherson (1761-1765).
      En realitat, una falsificació literària. Werther el llegeix en la seva fase
      més fosca, i els seus cants funeraris reflecteixen el seu estat d'ànim.

  - original: "Wahlheim"
    traduccio: "Wahlheim"
    nota: >
      Poble fictici on Werther s'estableix. Basat en Garbenheim, prop de Wetzlar.
      El nom suggereix «llar escollida» (Wahl = elecció, Heim = llar).

  - original: "Amtmann"
    traduccio: "administrador/magistrat"
    nota: >
      Funcionari judicial i administratiu d'una jurisdicció rural. El pare de Lotte
      n'és un, i Werther el visita sovint.

  - original: "Gesandter"
    traduccio: "ambaixador/enviat"
    nota: >
      L'enviat diplomàtic per a qui Werther treballa durant la seva estada a la cort.
      Personatge pedant i burocràtic que exaspera Werther.

  - original: "Contretanz/Englischer"
    traduccio: "contradansa/anglesa"
    nota: >
      Balls de saló del segle XVIII. La contradansa era un ball de parelles en línia;
      l'anglesa (Englischer Tanz) era semblant. El vals (Deutscher/Walzer) era considerat
      més íntim i atrevit.

  - original: "der Landpriester von Wakefield"
    traduccio: "El vicari de Wakefield"
    nota: >
      Novel·la d'Oliver Goldsmith (1766), un dels llibres preferits de Lotte i Werther,
      que tracta de la vida rural i la virtut.

  - original: "Emilia Galotti"
    traduccio: "Emilia Galotti"
    nota: >
      Tragèdia de G. E. Lessing (1772) sobre honor, tirania i llibertat personal.
      El llibre que es troba obert a la taula de Werther després de la seva mort.

  - original: "Batteaux/Wood/Winckelmann/Sulzer"
    traduccio: "Batteux/Wood/Winckelmann/Sulzer"
    nota: >
      Teòrics de l'art i l'estètica del segle XVIII que el jove V. cita amb pedanteria.
      Charles Batteux (1713-1780), Robert Wood (1717-1771), Johann Joachim Winckelmann
      (1717-1768), Johann Georg Sulzer (1720-1779).

  - original: "Melusine"
    traduccio: "Melusina"
    nota: >
      Figura de la mitologia medieval europea, una fada o esperit aquàtic lligada
      a una font. Werther s'hi compara en la seva fascinació per la font del poble.

  - original: "Leidenschaft"
    traduccio: "passió"
    nota: >
      Terme clau a Werther. En alemany, conté «Leiden» (sofriment), suggerint que
      la passió és inseparable del patiment. Aquesta ambigüitat és central a l'obra.

  - original: "Herausgeber"
    traduccio: "editor/compilador"
    nota: >
      Al final de la novel·la, un editor fictici narra els últims dies de Werther
      quan les cartes ja no basten. Recurs narratiu que dóna versemblança documental.

  - original: "Werther-Fieber"
    traduccio: "febre de Werther"
    nota: >
      Fenomen social que va seguir la publicació (1774): joves que imitaven la
      vestimenta de Werther (casaca blava, armilla groga) i, en casos extrems,
      el seu suïcidi. Va provocar la prohibició del llibre en diversos llocs.
