termes:
  - original: "Micromégas"
    traduccio: "Micromègas"
    nota: "De micros (petit) i megas (gran). Nom que al·ludeix a la relativitat de les dimensions."

  - original: "muphti"
    traduccio: "muftí"
    nota: "Autoritat religiosa islàmica. Voltaire l'usa per satiritzar la censura religiosa."

  - original: "entéléchie"
    traduccio: "entelèquia"
    nota: "Terme aristotèlic (ἐντελέχεια). Principi que porta en si la seva pròpia finalitat."

  - original: "ciel empyrée"
    traduccio: "cel empiri"
    nota: "En la cosmologia antiga, la regió més alta del cel, residència de la divinitat."

  - original: "Sirien"
    traduccio: "sirià"
    nota: "Habitant de Sirius. Micromègas és un sirià en el sentit astronòmic."

  - original: "Saturnien"
    traduccio: "saturnià"
    nota: "Habitant de Saturn. El secretari de l'Acadèmia de Saturn, alter ego de Fontenelle."

  - original: "toise"
    traduccio: "toesa"
    nota: "Antiga mesura de longitud francesa, equivalent a uns 1,949 metres."

  - original: "lieue"
    traduccio: "llegua"
    nota: "Mesura de distància variable, típicament uns 4 km."

  - original: "pied de roi"
    traduccio: "peu reial / peu de rei"
    nota: "Unitat de mesura francesa anterior al sistema mètric, equivalent a 32,48 cm."

  - original: "géomètre"
    traduccio: "geòmetra"
    nota: "Matemàtic. Voltaire l'usa tant per als científics terrestres com per descriure Pascal."

  - original: "pinnules"
    traduccio: "pínnules"
    nota: "Peces de coure foradades, usades en instruments de mesura d'angles."

  - original: "malebranchiste"
    traduccio: "malebranchista"
    nota: "Seguidor de Malebranche, filòsof de l'ocasionalisme (tot passa en Déu)."

  - original: "leibnitzien"
    traduccio: "leibnizià"
    nota: "Seguidor de Leibniz, defensor de l'harmonia preestablerta."

  - original: "péripatéticien"
    traduccio: "peripatètic"
    nota: "Seguidor d'Aristòtil, que ensenyava passejant (peripatein)."

  - original: "forme substantielle"
    traduccio: "forma substancial"
    nota: "Concepte aristotèlic-escolàstic. Voltaire el ridiculitza com a noció buida."

  - original: "Fontenelle"
    traduccio: "Fontenelle"
    nota: "Bernard Le Bovier de Fontenelle (1657-1757), secretari perpetu de l'Acadèmia de Ciències. Model del saturnià."

  - original: "Derham"
    traduccio: "Derham"
    nota: "William Derham (1657-1735), autor de Teologia astronòmica. Voltaire en qüestiona les observacions."

  - original: "Maupertuis"
    traduccio: "Maupertuis"
    nota: "Pierre-Louis Moreau de Maupertuis (1698-1759), dirigí l'expedició al cercle polar per mesurar el grau de latitud."
