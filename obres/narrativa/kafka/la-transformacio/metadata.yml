  descripcio: >
    Una de les obres més cèlebres de la literatura del segle XX. Gregor
    Samsa, un viatjant de comerç, es desperta un matí transformat en un insecte monstruós.
    La narració explora l'alienació, la identitat i les dinàmiques familiars amb
    una prosa neta i despullada d'ornaments.
