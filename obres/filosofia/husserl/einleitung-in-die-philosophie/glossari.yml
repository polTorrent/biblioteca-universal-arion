termes:
  - original: "Anschauung"
    traduccio: "intuïció"
    notes: "Terme central en la fenomenologia husserliana. Designa la captació directa i immediata d'un objecte o estat de coses."

  - original: "Apriori / a priori"
    traduccio: "apriori / a priori"
    notes: "Coneixement independent de l'experiència. Husserl distingeix entre apriori formal i apriori material."

  - original: "Bewusstsein"
    traduccio: "consciència"
    notes: "La consciència com a camp d'investigació fenomenològica."

  - original: "Dingwahrnehmung"
    traduccio: "percepció de coses"
    notes: "La percepció d'objectes físics, analitzada en termes d'escorços (Abschattungen)."

  - original: "Eidos"
    traduccio: "eidos / essència"
    notes: "Del grec εἶδος. L'essència ideal captada per intuïció eidètica."

  - original: "eidetisch"
    traduccio: "eidètic"
    notes: "Relatiu a l'eidos o essència. Ciència eidètica = ciència d'essències."

  - original: "Einfühlung"
    traduccio: "empatia / endopatia"
    notes: "La captació de la vida psíquica aliena."

  - original: "Epoché"
    traduccio: "epoché"
    notes: "Del grec ἐποχή. Suspensió del judici sobre l'existència del món natural."

  - original: "Erkenntnis"
    traduccio: "coneixement"
    notes: "Sovint en compostos: Erkenntnistheorie (teoria del coneixement), Erkenntniskritik (crítica del coneixement)."

  - original: "Erlebnis"
    traduccio: "vivència"
    notes: "L'experiència viscuda, els actes de consciència en la seva immediatesa."

  - original: "Evidenz"
    traduccio: "evidència"
    notes: "La donació originària i autolegitimant d'un objecte a la consciència."

  - original: "Geisteswissenschaften"
    traduccio: "ciències de l'esperit"
    notes: "Les ciències humanes i socials, contraposades a les ciències naturals (Naturwissenschaften)."

  - original: "Intentionalität"
    traduccio: "intencionalitat"
    notes: "La propietat fonamental de la consciència de ser sempre consciència-de-quelcom."

  - original: "Konstitution"
    traduccio: "constitució"
    notes: "El procés pel qual la consciència constitueix el sentit dels objectes."

  - original: "Lebenswelt"
    traduccio: "món de la vida"
    notes: "El món tal com és viscut prereflexivament en l'actitud natural."

  - original: "Naturwissenschaften"
    traduccio: "ciències naturals"
    notes: "Les ciències empíriques de la natura (física, química, biologia, etc.)."

  - original: "Noema / Noesis"
    traduccio: "noema / noesi"
    notes: "Del grec νόημα / νόησις. Noema: el contingut intencional de l'acte. Noesi: l'acte de consciència mateix."

  - original: "Ontologie"
    traduccio: "ontologia"
    notes: "Ciència de l'ésser. Husserl distingeix ontologia formal i ontologies materials (regionals)."

  - original: "Phänomenologie"
    traduccio: "fenomenologia"
    notes: "La ciència descriptiva de les essències de la consciència pura i els seus correlats."

  - original: "phänomenologische Reduktion"
    traduccio: "reducció fenomenològica"
    notes: "El mètode de posar entre parèntesis (einklammerung) la tesi natural de l'existència del món."

  - original: "reine Vernunft"
    traduccio: "raó pura"
    notes: "La raó en el seu exercici apriorístic, independent de l'experiència empírica."

  - original: "Sachlage"
    traduccio: "estat de coses"
    notes: "Una configuració objectiva de propietats i relacions."

  - original: "Tatsache"
    traduccio: "fet"
    notes: "El factual, contraposat a l'essencial (Wesen). Tatsachenwissenschaft = ciència de fets."

  - original: "transzendental"
    traduccio: "transcendental"
    notes: "Relatiu a les condicions de possibilitat del coneixement i de la constitució del sentit."

  - original: "Urteil"
    traduccio: "judici"
    notes: "L'acte de predicació. Urteilstheorie = teoria del judici."

  - original: "Vernunftkritik"
    traduccio: "crítica de la raó"
    notes: "L'examen filosòfic de la validesa i els límits de la raó (teòrica, pràctica, axiològica)."

  - original: "Vorstellung"
    traduccio: "representació"
    notes: "Acte de consciència que presenta un objecte, sigui perceptiu o imaginatiu."

  - original: "Wahrnehmung"
    traduccio: "percepció"
    notes: "La captació directa d'un objecte present. Äußere W. = percepció externa; innere W. = percepció interna."

  - original: "Wesen"
    traduccio: "essència"
    notes: "El què invariant d'un objecte o tipus d'objectes. Wesensschau = intuïció d'essències."

  - original: "Wesensschau"
    traduccio: "intuïció d'essències"
    notes: "La captació directa de l'eidos o essència d'un objecte mitjançant variació imaginativa."

  - original: "Wissenschaftslehre"
    traduccio: "teoria de la ciència"
    notes: "La disciplina que estudia les condicions formals i materials de la ciència en general."

  - original: "Entelechie"
    traduccio: "entelèquia"
    notes: "Del grec ἐντελέχεια (Aristòtil). La realització plena d'una potència."

  - original: "Substanz"
    traduccio: "substància"
    notes: "Concepte ontològic fonamental discutit en relació amb Aristòtil, Descartes, Spinoza i Leibniz."

  - original: "Monade"
    traduccio: "mònada"
    notes: "Concepte leibnizià adoptat per Husserl per designar el subjecte transcendental concret."

  - original: "Ding an sich"
    traduccio: "cosa en si"
    notes: "Concepte kantià. La realitat tal com és independentment de la nostra percepció."

  - original: "Kategorie"
    traduccio: "categoria"
    notes: "Concepte fonamental de l'enteniment (Aristòtil, Kant). Husserl parla de categories formals i materials."

  - original: "Wertlehre"
    traduccio: "axiologia / teoria dels valors"
    notes: "La disciplina filosòfica que estudia els valors i la seva jerarquia."

  - original: "Gemüt"
    traduccio: "ànim / esperit"
    notes: "La vida afectiva i volitiva del subjecte, contraposada a l'intel·lecte (Verstand)."

  - original: "Streben"
    traduccio: "afany / tendència"
    notes: "L'impuls volitiu dirigit cap a un fi."

  - original: "Selbstverständlichkeit"
    traduccio: "evidència per si mateixa / obvietat"
    notes: "Allò que es dóna com a comprensible sense necessitat de demostració."
