termes:
  - original: ἀπολογία
    transliteracio: apologia
    traduccio: defensa
    notes: >
      Discurs de defensa davant un tribunal. No implica disculpa
      sinó argumentació jurídica i filosòfica.

  - original: δαιμόνιον
    transliteracio: daimonion
    traduccio: senyal diví / oracle interior
    notes: >
      Veu interior que Sòcrates descriu com un senyal diví personal
      que el dissuadeix d'actuar, però mai no l'impulsa a fer res.
      Meletos el ridiculitza a l'acusació com a "noves divinitats".

  - original: ἀρετή
    transliteracio: areté
    traduccio: virtut / excel·lència
    notes: >
      Concepte central de l'ètica grega que designa l'excel·lència
      moral i la realització plena de la funció pròpia d'un ésser.

  - original: σοφία
    transliteracio: sophia
    traduccio: saviesa
    notes: >
      Sòcrates distingeix entre la saviesa humana (saber que no se sap)
      i la saviesa divina (coneixement veritable). L'oracle de Delfos
      el declara el més savi dels homes.

  - original: ψυχή
    transliteracio: psyché
    traduccio: ànima
    notes: >
      Per a Sòcrates, la cura de l'ànima (ἐπιμέλεια τῆς ψυχῆς) és
      el deure primordial de l'home, per sobre de riqueses i honors.

  - original: εὐσέβεια
    transliteracio: eusebeia
    traduccio: pietat
    notes: >
      Respecte religiós als déus. L'acusació de Meletos és precisament
      d'impietat (ἀσέβεια), que Sòcrates refuta demostrant que creu
      en activitats divines i, per tant, en déus.

  - original: μύωψ
    transliteracio: myops
    traduccio: tàvec
    notes: >
      Metàfora central del discurs: Sòcrates es compara amb un tàvec
      (insecte que pica) assignat per Déu per despertar la ciutat
      d'Atenes, comparada amb un cavall gran i indolent.

  - original: Πρυτανεῖον
    transliteracio: Prytaneion
    traduccio: Pritaneu
    notes: >
      Edifici públic d'Atenes on es mantenia el foc sagrat i on
      rebien manutenció gratuïta els benefactors de la ciutat i els
      vencedors olímpics. Sòcrates proposa irònicament ser-hi mantingut.

  - original: Πυθία
    transliteracio: Pythia
    traduccio: profetessa pítia / pitonissa
    notes: >
      Sacerdotessa de l'oracle de Delfos (Apol·lo) que va declarar
      que no hi havia cap home més savi que Sòcrates, detonant la
      seva missió filosòfica d'examen.

  - original: οἱ Τριάκοντα
    transliteracio: hoi Triakonta
    traduccio: els Trenta (Tirans)
    notes: >
      Règim oligàrquic imposat a Atenes (404-403 aC) després de la
      derrota a la guerra del Peloponès. Sòcrates relata com es va
      negar a obeir la seva ordre d'arrestar Lleó el Salamini.

  - original: ἔλεγχος
    transliteracio: elenchos
    traduccio: examen creuat / refutació
    notes: >
      Mètode socràtic d'interrogació dialèctica mitjançant preguntes
      i respostes que exposen les contradiccions de l'interlocutor.

  - original: σοφιστής
    transliteracio: sophistés
    traduccio: sofista
    notes: >
      Mestre itinerant que ensenyava retòrica i virtut a canvi de
      diners. Sòcrates es distingeix dels sofistes (Gòrgias, Pròdic,
      Hípies, Èven) remarcant que no cobra ni pretén ensenyar.

  - original: ἀσέβεια
    transliteracio: asebeia
    traduccio: impietat
    notes: >
      Delicte religiós del qual s'acusa Sòcrates: no creure en els
      déus de la ciutat i introduir noves divinitats.
