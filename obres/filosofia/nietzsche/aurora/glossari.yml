termes:
  - original: "Morgenröthe"
    transliteracio: "Morgenröthe"
    traduccio: "Aurora"
    notes: "Títol de l'obra. Metàfora del nou dia del pensament lliure."

  - original: "Sittlichkeit"
    transliteracio: "Sittlichkeit"
    traduccio: "moralitat"
    notes: "Concepte central. Nietzsche distingeix entre Sittlichkeit (moralitat com a sistema) i Moral."

  - original: "Sitte"
    transliteracio: "Sitte"
    traduccio: "costum"
    notes: "Costum, tradició establerta. Base de la 'Sittlichkeit der Sitte' (moralitat del costum)."

  - original: "Sittlichkeit der Sitte"
    transliteracio: "Sittlichkeit der Sitte"
    traduccio: "moralitat del costum"
    notes: "Concepte fonamental de l'obra: la moralitat entesa com a obediència als costums heretats."

  - original: "Vorurteil"
    transliteracio: "Vorurteil"
    traduccio: "prejudici"
    notes: "Prejudici moral, tema central del subtítol (Gedanken über die moralischen Vorurtheile)."

  - original: "Vernunft"
    transliteracio: "Vernunft"
    traduccio: "raó"
    notes: "La raó, sovint criticada per Nietzsche com a instrument al servei de la moral."

  - original: "Gewissen"
    transliteracio: "Gewissen"
    traduccio: "consciència"
    notes: "Consciència moral, diferent de Bewusstsein (consciència general)."

  - original: "Schuld"
    transliteracio: "Schuld"
    traduccio: "culpa"
    notes: "Culpa, també 'deute' en alemany. Doble sentit explotat per Nietzsche."

  - original: "Strafe"
    transliteracio: "Strafe"
    traduccio: "càstig"
    notes: "Càstig, pena. Nietzsche critica la confusió entre conseqüència i càstig."

  - original: "Wahnsinn"
    transliteracio: "Wahnsinn"
    traduccio: "follia"
    notes: "Follia, bogeria. Nietzsche la vincula a la innovació moral i espiritual."

  - original: "Herkommen"
    transliteracio: "Herkommen"
    traduccio: "tradició"
    notes: "Tradició heretada, allò que 've de lluny'. Sinònim parcial de Sitte."

  - original: "Selbstüberwindung"
    transliteracio: "Selbstüberwindung"
    traduccio: "autosuperació"
    notes: "Autosuperació, autodomini. Concepte clau en l'ètica nietzscheana."

  - original: "Mitleid"
    transliteracio: "Mitleid"
    traduccio: "compassió"
    notes: "Compassió, pietat. Nietzsche en critica l'ús cristià."

  - original: "Herrschsucht"
    transliteracio: "Herrschsucht"
    traduccio: "afany de domini"
    notes: "Desig de poder/domini. Anticipació de la Wille zur Macht."

  - original: "Kausalität"
    transliteracio: "Kausalität"
    traduccio: "causalitat"
    notes: "Causalitat. Nietzsche oposa el sentit de la causalitat al sentit de la moralitat."

  - original: "Freigeist"
    transliteracio: "Freigeist"
    traduccio: "esperit lliure"
    notes: "Esperit lliure, el qui s'allibera dels prejudicis morals."

  - original: "Unterirdischer"
    transliteracio: "Unterirdischer"
    traduccio: "subterrani"
    notes: "El qui treballa sota terra, metàfora del filòsof que excava els fonaments de la moral."

  - original: "Erlösung"
    transliteracio: "Erlösung"
    traduccio: "redempció"
    notes: "Redempció, alliberament. Usat tant en sentit cristià com filosòfic."

  - original: "Leidenschaft"
    transliteracio: "Leidenschaft"
    traduccio: "passió"
    notes: "Passió. Etimològicament vinculat a Leiden (patir)."

  - original: "vita contemplativa"
    transliteracio: "vita contemplativa"
    traduccio: "vida contemplativa"
    notes: "Mantingut en llatí per Nietzsche. Es tradueix entre parèntesis."

  - original: "Philologie"
    transliteracio: "Philologie"
    traduccio: "filologia"
    notes: "Filologia. Nietzsche, filòleg de formació, la reivindica com a art de la lectura lenta."

  - original: "aere perennius"
    transliteracio: "aere perennius"
    traduccio: "més perdurable que el bronze"
    notes: "Expressió d'Horaci (Odes III, 30). Mantinguda en llatí al text."

  - original: "credo quia absurdum est"
    transliteracio: "credo quia absurdum est"
    traduccio: "crec perquè és absurd"
    notes: "Atribuïda a Tertul·lià. Mantinguda en llatí al text."

  - original: "Moral"
    transliteracio: "Moral"
    traduccio: "moral"
    notes: "Moral com a fenomen concret. Nietzsche distingeix Moral (la moral) de Sittlichkeit (moralitat com a sistema)."

  - original: "Verführung"
    transliteracio: "Verführung"
    traduccio: "seducció"
    notes: "Seducció, temptació. La moral com a 'gran mestra de la seducció' (Pròleg)."

  - original: "Vernünftigkeit"
    transliteracio: "Vernünftigkeit"
    traduccio: "racionalitat"
    notes: "Racionalitat, raonabilitat. Diferent de Vernunft (raó): Vernünftigkeit és la qualitat de ser racional."

  - original: "Geist"
    transliteracio: "Geist"
    traduccio: "esperit"
    notes: "Esperit, ment. Concepte ampli que abasta intel·lecte, ànima i caràcter."

  - original: "Trieb"
    transliteracio: "Trieb"
    traduccio: "instint"
    notes: "Instint, impuls. Força motriu preconscient. Plural: Triebe."

  - original: "Auszeichnung"
    transliteracio: "Auszeichnung"
    traduccio: "distinció"
    notes: "Distinció, excel·lència. L'impuls de distingir-se com a base de la moralitat (aforisme 30)."

  - original: "deus absconditus"
    transliteracio: "deus absconditus"
    traduccio: "Déu amagat"
    notes: "Concepte teològic discutit per Pascal. Mantingut en llatí (aforisme 91)."

  - original: "Rausch"
    transliteracio: "Rausch"
    traduccio: "embriaguesa"
    notes: "Embriaguesa, èxtasi. Fe en l'embriaguesa com a vida veritable (aforisme 50)."

  - original: "Euthanasie"
    transliteracio: "Euthanasie"
    traduccio: "eutanàsia"
    notes: "L'eutanàsia del cristianisme: la seva mort dolça en un moralisme suau (aforisme 92)."

  - original: "pudenda origo"
    transliteracio: "pudenda origo"
    traduccio: "origen vergonyós"
    notes: "Llatí: origen del qual cal avergonyir-se. Aplicat a la vita contemplativa (aforisme 42)."

  - original: "pia fraus"
    transliteracio: "pia fraus"
    traduccio: "frau piadós"
    notes: "Llatí: engany benèvol. Aplicat al matrimoni i la creença en l'amor durador (aforisme 27)."

  - original: "mimicry"
    transliteracio: "mimicry"
    traduccio: "mimetisme"
    notes: "Anglicisme usat per Nietzsche. Camuflatge animal com a base de la moral social (aforisme 26)."
