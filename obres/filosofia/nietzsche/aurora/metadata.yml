obra:
  titol: "Aurora"
  titol_original: "Morgenröthe. Gedanken über die moralischen Vorurtheile"
  autor: "Friedrich Nietzsche"
  autor_original: "Friedrich Wilhelm Nietzsche"
  traductor: "Editorial Clàssica"
  any_original: 1881
  any_traduccio: 2026
  llengua_original: "alemany"
  genere: "filosofia"
  descripcio: >
    Reflexions sobre els prejudicis morals. Obra central del pensament de Nietzsche
    on inicia la seva crítica radical de la moral, qüestionant els fonaments de la
    tradició moral occidental. Escrita a Gènova i publicada el 1881, amb un pròleg
    afegit el 1886. Conté 575 aforismes organitzats en cinc llibres. Traducció
    completa dels cinc llibres i el pròleg.
  notes: "Traducció completa: Pròleg + Llibre Primer (1-96) + Llibre Segon (97-148) + Llibre Tercer (149-275) + Llibre Quart (276-423) + Llibre Cinquè (424-575)"
