termes:
  - original: "das Tragische"
    traduccio: "el tràgic"
    nota: "No simplement 'la tragèdia' com a gènere, sinó la visió tràgica del món: l'acceptació afirmativa del sofriment i la contradicció com a essència de l'existència."

  - original: "das Werden"
    traduccio: "el devenir"
    nota: "Concepte central en Heràclit i Nietzsche: el flux perpetu de la realitat, oposat a l'ésser estàtic de Parmènides."

  - original: "das Sein"
    traduccio: "l'ésser"
    nota: "Categoria ontològica fonamental de Parmènides: allò que és, immutable, etern, indivisible."

  - original: "das Unbestimmte / das Apeiron"
    traduccio: "l'indeterminat / l'àpeiron"
    nota: "Principi d'Anaximandre (τὸ ἄπειρον): substància primordial il·limitada i indefinida d'on sorgeixen totes les coses."

  - original: "der Urgrund"
    traduccio: "el fonament primordial"
    nota: "El principi originari (ἀρχή) de la realitat, buscat per tots els presocràtics."

  - original: "die ewige Gerechtigkeit"
    traduccio: "la justícia eterna"
    nota: "En Anaximandre, la llei còsmica que imposa que tot el que neix ha de perir com a expiació per la seva individuació."

  - original: "das Spiel"
    traduccio: "el joc"
    nota: "En Heràclit, metàfora del cosmos com a joc d'un nen (παῖς παίζων) que crea i destrueix sense propòsit moral."

  - original: "der Krieg"
    traduccio: "la guerra"
    nota: "En Heràclit (πόλεμος πάντων πατήρ): la lluita dels contraris com a principi generador de totes les coses."

  - original: "das Feuer"
    traduccio: "el foc"
    nota: "Element primordial en Heràclit: símbol del devenir perpetu, de la transformació constant."

  - original: "die Lust"
    traduccio: "el plaer / el delit"
    nota: "En sentit nietzscheà, l'alegria creadora, el gaudi estètic davant l'existència, no el plaer hedonista."

  - original: "der Nous"
    traduccio: "el Nous / la intel·ligència"
    nota: "En Anaxàgores (νοῦς): principi ordenador còsmic, intel·ligència pura que imposa ordre al caos primordial."

  - original: "Urstoff"
    traduccio: "matèria primordial"
    nota: "La substància originària de què es compon tot l'univers, cercada pels filòsofs jonis."

  - original: "die Vielheit"
    traduccio: "la pluralitat"
    nota: "La multiplicitat de les coses individuals, que Parmènides nega i Heràclit afirma."

  - original: "die Einheit"
    traduccio: "la unitat"
    nota: "L'u primordial, la totalitat indivisa. En Parmènides, l'ésser és u; en Heràclit, els contraris són u."

  - original: "Schuld"
    traduccio: "culpa"
    nota: "En Anaximandre, la culpa ontològica de l'existència individual, que s'ha de pagar amb la destrucció."

  - original: "Vergänglichkeit"
    traduccio: "caducitat"
    nota: "La transitorietat de totes les coses, tema central del pessimisme presocràtic."

  - original: "Anschauung"
    traduccio: "intuïció"
    nota: "La captació directa, no conceptual, de la realitat. Nietzsche valora la intuïció per sobre de la deducció lògica."

  - original: "das ästhetische Grundphänomen"
    traduccio: "el fenomen estètic fonamental"
    nota: "La interpretació del món com a obra d'art, no com a mecanisme moral o racional."

  - original: "Trieb"
    traduccio: "impuls / pulsió"
    nota: "Força instintiva que mou el filòsof. Nietzsche descriu la filosofia com a activitat impulsiva, no merament racional."

  - original: "die Zweckmässigkeit"
    traduccio: "la finalitat"
    nota: "La teleologia o ordenació a fins. Nietzsche critica la lectura finalista d'Anaxàgores."

  - original: "Homoiomerien"
    traduccio: "homeomeries"
    nota: "Terme d'Anaxàgores (ὁμοιομέρεια): partícules infinitament divisibles que contenen una porció de totes les qualitats."

  - original: "das Unrecht des Daseins"
    traduccio: "la injustícia de l'existència"
    nota: "Fórmula d'Anaximandre: el simple fet d'existir com a individu separat ja implica una transgressió còsmica."
