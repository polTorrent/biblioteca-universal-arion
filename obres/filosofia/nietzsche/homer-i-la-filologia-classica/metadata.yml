obra:
  titol: "Homer i la filologia clàssica"
  titol_original: "Homer und die klassische Philologie"
  autor: "Friedrich Nietzsche"
  autor_original: "Friedrich Wilhelm Nietzsche"
  traductor: "Editorial Clàssica"
  any_original: 1869
  any_traduccio: 2026
  llengua_original: "alemany"
  categoria: "filosofia"
  genere: "filosofia"
  font_original: "https://de.wikisource.org/wiki/Homer_und_die_classische_Philologie"
  descripcio: >
    Lliçó inaugural pronunciada per Nietzsche el 28 de maig de 1869 a la Universitat
    de Basilea, amb només 24 anys, en accedir a la càtedra de filologia clàssica.
    En aquest discurs, Nietzsche defensa la unitat entre filologia i filosofia, aborda
    la qüestió homèrica (Homer com a individu o com a creació col·lectiva) i proclama
    la seva cèlebre frase final: «Philosophia facta est quae philologia fuit» — la
    filosofia ha esdevingut allò que fou la filologia. Text fonamental per entendre
    el jove Nietzsche i la seva concepció de la cultura grega. Proposta de la comunitat.
  notes: "Traducció completa de la lliçó inaugural"
