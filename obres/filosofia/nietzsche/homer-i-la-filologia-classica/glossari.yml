termes:
  - original: "Philologie"
    traduccio: "filologia"
    nota: "Del grec φιλολογία. Nietzsche l'entén no com a mera erudició, sinó com a disciplina que uneix ciència, art i filosofia."

  - original: "klassisch"
    traduccio: "clàssic"
    nota: "Nietzsche qüestiona el terme com a judici de valor acríticament emprat, no com a categoria objectiva."

  - original: "Alterthum"
    traduccio: "antiguitat"
    nota: "Grafia arcaica de 'Altertum'. Designa l'època grecoromana com a objecte d'estudi privilegiat."

  - original: "Wissenschaft"
    traduccio: "ciència"
    nota: "En el sentit ampli alemany de 'saber sistemàtic', no limitat a les ciències naturals."

  - original: "Ästhetik"
    traduccio: "estètica"
    nota: "La dimensió artística i valorativa de la filologia, contraposada a la dimensió purament històrica."

  - original: "die homerische Frage"
    traduccio: "la qüestió homèrica"
    nota: "Debat filològic sobre la identitat d'Homer i l'autoria de la Ilíada i l'Odissea, central des de F. A. Wolf."

  - original: "Unitarier"
    traduccio: "unitaris"
    nota: "Defensors de la unitat autoral dels poemes homèrics: un sol poeta (Homer) va compondre la Ilíada i l'Odissea."

  - original: "Chorizonten"
    traduccio: "corizonts"
    nota: "Del grec χωρίζοντες ('els que separen'). Filòlegs que atribueixen els poemes homèrics a múltiples autors."

  - original: "Prolegomena ad Homerum"
    traduccio: "Prolegomena ad Homerum"
    nota: "Obra de F. A. Wolf (1795), fundacional de la filologia moderna. Qüestiona l'autoria única d'Homer."

  - original: "Friedrich August Wolf"
    traduccio: "Friedrich August Wolf"
    nota: "Filòleg alemany (1759-1824), considerat el fundador de la filologia clàssica moderna."

  - original: "Peisistratische Redaction"
    traduccio: "redacció pisistratea"
    nota: "Suposada compilació dels poemes homèrics sota el tirà atenenc Pisístrat (s. VI aC)."

  - original: "Sprachinstinct"
    traduccio: "instint lingüístic"
    nota: "Noció que anticipa la lingüística moderna: la capacitat innata del llenguatge com a objecte d'estudi."

  - original: "Selbstzweck"
    traduccio: "fi en si mateix"
    nota: "Concepte kantià: allò que té valor intrínsec, no instrumental."

  - original: "Volksindividualitäten"
    traduccio: "individualitats nacionals"
    nota: "Les manifestacions culturals específiques de cada poble, objecte de la filologia com a ciència històrica."

  - original: "Ewig-mustergültiges"
    traduccio: "eternament modèlic"
    nota: "L'ideal clàssic com a norma perenne, no contingent."

  - original: "Demodokos"
    traduccio: "Demòdoc"
    nota: "Aede cec a l'Odissea (VIII), considerat tradicionalment com a autoretrat d'Homer."

  - original: "Philosophia facta est quae philologia fuit"
    traduccio: "La filosofia ha esdevingut allò que fou la filologia"
    nota: "Frase final cèlebre del discurs. Inversió de Sèneca ('philosophia facta est quae philologia fuit', Ep. 108.23). Nietzsche la reinterpreta com a programa personal."

  - original: "Antrittsrede"
    traduccio: "lliçó inaugural"
    nota: "Discurs d'incorporació a una càtedra universitària, gènere acadèmic alemany."
