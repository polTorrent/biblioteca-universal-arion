  descripcio: >
    Recull pòstum d'apunts filosòfics de Friedrich Nietzsche, compilat i organitzat
    per Elisabeth Förster-Nietzsche i Peter Gast a partir dels quaderns del filòsof
    (1883–1888). L'obra s'estructura en quatre llibres: I. El nihilisme europeu,
    II. Crítica dels valors suprems, III. Principi d'una nova valoració,
    IV. Disciplina i criança. Tot i la polèmica sobre la legitimitat editorial
    de la compilació, conté algunes de les formulacions més potents de Nietzsche
    sobre la voluntat de poder, l'etern retorn, la transvaloració dels valors
    i la crítica de la moral, la religió i la filosofia tradicionals.
    Selecció de 50 aforismes representatius dels quatre llibres.
  notes: "Selecció de 50 aforismes clau. Edició de referència: Kröner, 1906 (ed. ampliada)."
