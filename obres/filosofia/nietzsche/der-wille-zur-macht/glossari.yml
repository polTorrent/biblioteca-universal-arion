termes:
  - original: "Wille zur Macht"
    traduccio: "voluntat de poder"
    notes: "Concepte central de Nietzsche: força primordial que impulsa tot ésser a créixer, dominar i expandir-se."

  - original: "Nihilismus"
    traduccio: "nihilisme"
    notes: "Estat en què els valors suprems es desvaloren. Nietzsche en distingeix un d'actiu (creatiu) i un de passiu (decadent)."

  - original: "Umwerthung aller Werthe"
    traduccio: "transvaloració de tots els valors"
    notes: "Projecte filosòfic de Nietzsche: substituir els valors de la moral cristiana per valors afirmadors de la vida."

  - original: "Ewige Wiederkunft / Wiederkehr"
    traduccio: "etern retorn"
    notes: "Doctrina cosmològica i ètica: la repetició infinita i idèntica de tot el que existeix."

  - original: "Übermensch"
    traduccio: "superhome"
    notes: "Ideal humà que supera les limitacions de la moral convencional i afirma la vida plenament."

  - original: "Werden"
    traduccio: "devenir"
    notes: "El flux constant del canvi, oposat a l'ésser estàtic (Sein). Concepte d'arrel heraclitiana."

  - original: "Sein"
    traduccio: "ésser"
    notes: "L'existència estàtica, que Nietzsche considera una ficció imposada al devenir."

  - original: "Décadence"
    traduccio: "decadència"
    notes: "Terme manllevat del francès. Declivi vital; per a Nietzsche, la moral i la religió en són símptomes."

  - original: "Perspektivismus"
    traduccio: "perspectivisme"
    notes: "Tesi epistemològica: no hi ha fets, només interpretacions des de perspectives múltiples."

  - original: "Amor fati"
    traduccio: "amor fati / amor al destí"
    notes: "Fórmula per a la grandesa: estimar el necessari, no simplement suportar-lo."

  - original: "Zucht und Züchtung"
    traduccio: "disciplina i criança"
    notes: "Títol del llibre IV. Criança (Züchtung) entesa com a formació/educació de tipus humans superiors."

  - original: "Interpretation"
    traduccio: "interpretació"
    notes: "Clau del perspectivisme nietzscheà: tot coneixement és interpretació, no hi ha fets purs."

  - original: "Dionysisch"
    traduccio: "dionisíac"
    notes: "Principi d'afirmació de la vida, el caos i la creativitat, oposat a l'apoloni."

  - original: "Für-wahr-halten"
    traduccio: "tenir-per-vertader"
    notes: "Calc conceptual deliberat: tota creença és un acte de tenir quelcom per vertader, no una certesa."

  - original: "Kraft"
    traduccio: "força"
    notes: "Element primordial del cosmos nietzscheà: el món com a joc de forces en tensió."

  - original: "Schein"
    traduccio: "aparença"
    notes: "Per a Nietzsche, l'aparença no s'oposa a la realitat sinó que en forma part essencialment."

  - original: "Circe der Philosophen"
    traduccio: "Circe dels filòsofs"
    notes: "Metàfora: la moral com a encantadora que transforma els filòsofs, com Circe els companys d'Ulisses."

  - original: "Vornehm"
    traduccio: "noble"
    notes: "Qualitat aristocràtica de l'esperit: reverència cap a un mateix, autodomini, selectivitat."

  - original: "Werthsetzung"
    traduccio: "valoració"
    notes: "Acte de posar valors (Werthe setzen). Nou principi de valoració basat en la voluntat de poder."

  - original: "Selbstüberwindung"
    traduccio: "autosuperació"
    notes: "Procés pel qual l'home es transcendeix a si mateix cap al superhome."
