  descripcio: >
    Primera obra del període il·lustrat de Nietzsche, publicada el 1878 i dedicada
    a Voltaire. Trencament radical amb Wagner i la metafísica romàntica.
    Nietzsche hi adopta un mètode d'anàlisi psicològica i històrica dels valors
    morals, religiosos i estètics, dissolent-los en els seus orígens «humans,
    massa humans». L'obra consta de 638 aforismes distribuïts en nou seccions.
    Selecció de 50 aforismes representatius de les nou seccions del primer volum.
  notes: "Selecció de 50 aforismes clau del primer volum. Edició de referència: Chemnitz, Ernst Schmeitzner, 1878."
