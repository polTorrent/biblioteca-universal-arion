# Glossari — Humà, massa humà (Menschliches, Allzumenschliches)
# Friedrich Nietzsche, 1878

termes:
  - original: "Menschliches, Allzumenschliches"
    traduccio: "humà, massa humà"
    notes: "Títol de l'obra; al·lusió irònica a la reducció de tot ideal a origen psicològic i fisiològic"

  - original: "freier Geist"
    traduccio: "esperit lliure"
    notes: "Concepte central: individu emancipat de tradicions, dogmes i convencions morals"

  - original: "Freigeisterei"
    traduccio: "lliurepensament"
    notes: "Actitud intel·lectual de l'esperit lliure; no confondre amb el liberalisme polític"

  - original: "Metaphysik"
    traduccio: "metafísica"
    notes: "Nietzsche la critica com a projecció d'errors psicològics sobre la realitat"

  - original: "moralische Empfindung"
    traduccio: "sentiment moral"
    notes: "Segona secció de l'obra; els sentiments morals tenen origen històric i psicològic, no transcendent"

  - original: "Sublimierung"
    traduccio: "sublimació"
    notes: "Transformació d'impulsos bàsics en formes culturals elevades"

  - original: "Erkenntnis"
    traduccio: "coneixement"
    notes: "Coneixement entès com a procés crític, no com a veritat absoluta"

  - original: "Vorurteil"
    traduccio: "prejudici"
    notes: "Nietzsche analitza els prejudicis morals com a productes històrics"

  - original: "Kultur"
    traduccio: "cultura"
    notes: "Oposat a 'civilització'; àmbit on es manifesten els valors humans"

  - original: "Leidenschaft"
    traduccio: "passió"
    notes: "Força motriu que la moral tradicional intenta reprimir"

  - original: "Selbstbeobachtung"
    traduccio: "autoobservació"
    notes: "Mètode psicològic que Nietzsche aplica a la moral i la religió"

  - original: "Irrtum"
    traduccio: "error"
    notes: "Concepte recurrent: molts valors es basen en errors intel·lectuals"

  - original: "Ursprung"
    traduccio: "origen"
    notes: "Anàlisi genealògica dels valors morals; precedent de 'Genealogia de la moral'"

  - original: "Empfindung"
    traduccio: "sensació / sentiment"
    notes: "Base psicofisiològica dels judicis morals"

  - original: "Künstler"
    traduccio: "artista"
    notes: "Secció IV tracta l'ànima dels artistes i escriptors"

  - original: "Genie"
    traduccio: "geni"
    notes: "Nietzsche desmitifica el geni com a producte de treball i circumstàncies, no d'inspiració divina"

  - original: "Gesellschaft"
    traduccio: "societat"
    notes: "Secció V; anàlisi de les convencions socials com a construccions històriques"

  - original: "Staat"
    traduccio: "estat"
    notes: "Secció VIII: l'estat com a institució temporal, no eterna"

  - original: "Wanderer"
    traduccio: "caminant"
    notes: "Metàfora de l'esperit lliure que avança sense destí fix"

  - original: "Umwertung"
    traduccio: "transvaloració"
    notes: "Germen del concepte posterior de 'transvaloració de tots els valors'"
