obra:
  titol: "Fragments Pòstums"
  titol_original: "Nachgelassene Fragmente"
  autor: "Friedrich Nietzsche"
  autor_original: "Friedrich Wilhelm Nietzsche"
  traductor: "Editorial Clàssica (proposta comunitat)"
  any_original: "1869-1889"
  any_traduccio: 2026
  llengua_original: "alemany"
  genere: "filosofia"
  descripcio: >
    Selecció de fragments pòstums de Friedrich Nietzsche, escrits entre 1881 i 1889
    i publicats després de la seva mort. Aquests apunts privats, mai destinats a
    publicació, revelen el taller intel·lectual de Nietzsche: idees en gestació,
    experiments de pensament i formulacions provisionals de conceptes centrals com
    la voluntat de poder, l'etern retorn, el superhome i la transvaloració de tots
    els valors. Selecció de 25 fragments representatius organitzats cronològicament.
  notes: "Selecció de 25 fragments representatius (1881-1889). Proposta comunitat."
