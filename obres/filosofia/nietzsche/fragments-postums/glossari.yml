termes:
  - original: "Wille zur Macht"
    traduccio: "voluntat de poder"
    notes: "Concepte central del pensament tarda de Nietzsche. No indica domini sobre altres, sino forca creativa d'autoafirmacio."

  - original: "Übermensch"
    traduccio: "superhome"
    notes: "L'home que se supera a si mateix. Evitem 'suprahome' per fidelitat al prefix über- (sobre, mes enlla)."

  - original: "ewige Wiederkehr / ewige Wiederkunft"
    traduccio: "etern retorn"
    notes: "Idea cosmo-etica: la repeticio infinita de cada instant. Formulada per primer cop al fragment 11[141]."

  - original: "Nihilismus"
    traduccio: "nihilisme"
    notes: "Desvaloritzacio dels valors suprems. Nietzsche el diagnostica com a consequencia de la mort de Deu."

  - original: "Umwerthung aller Werthe"
    traduccio: "transvaloracio de tots els valors"
    notes: "Projecte filosof ic central de l'ultim Nietzsche. Reavaluacio radical dels fonaments morals."

  - original: "Herren-Moral"
    traduccio: "moral dels senyors"
    notes: "Moral afirmativa, creadora de valors, oposada a la moral dels esclaus (Sklaven-Moral)."

  - original: "Sklaven-Moral"
    traduccio: "moral dels esclaus"
    notes: "Moral reactiva, nascuda del ressentiment, que inverteix els valors aristocratics."

  - original: "Ressentiment"
    traduccio: "ressentiment"
    notes: "Nietzsche usa el terme frances. Rancunia creativa que genera valors morals invertits."

  - original: "Trieb / Triebe"
    traduccio: "impuls / impulsos"
    notes: "Forces instintives basiques. Nietzsche redueix el pensament a un joc d'impulsos."

  - original: "Schein / scheinbar"
    traduccio: "aparenca / aparent"
    notes: "Nietzsche revaloritza el mon aparent com l'unic real, contra la tradicio platonica."

  - original: "das Seiende"
    traduccio: "l'ens / allo que es"
    notes: "Terme ontologic. Nietzsche l'identifica amb el mon sensible, no amb un mes enlla."

  - original: "Macht"
    traduccio: "poder"
    notes: "No en sentit politic, sino com a forca vital, capacitat d'autoafirmacio i creixement."

  - original: "Stärke / Schwäche"
    traduccio: "forca / feblesa"
    notes: "Parella oposada fonamental en la valoracio nietzscheana."

  - original: "Tugend"
    traduccio: "virtut"
    notes: "Nietzsche critica la virtut com a mascara de feblesa en la moral dels esclaus."

  - original: "Explosiv-Stoffe"
    traduccio: "materials explosius"
    notes: "Metafora per al geni: acumulacio de forca que explota en creacio."

  - original: "Verkleingerung"
    traduccio: "empetitiment"
    notes: "Proces de degradacio i mediocritzacio de l'home europeu modern."

  - original: "Für-wahr-halten"
    traduccio: "tenir-per-veritable"
    notes: "Calc deliberat per mantenir l'estructura conceptual nietzscheana. Tot 'tenir per cert' es ja una ficcio."

  - original: "Art-züchtend"
    traduccio: "que cria l'especie"
    notes: "Terme biologic-filosofic. Nietzsche planteja el judici en termes d'utilitat per a l'especie."
