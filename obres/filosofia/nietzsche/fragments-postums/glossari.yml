termes:
  - original: "Wille zur Macht"
    traduccio: "voluntat de poder"
    notes: "Concepte central del pensament tardà de Nietzsche. No indica domini sobre altres, sinó força creativa d'autoafirmació."

  - original: "Übermensch"
    traduccio: "superhome"
    notes: "L'home que se supera a si mateix. Evitem 'suprahome' per fidelitat al prefix über- (sobre, més enllà)."

  - original: "ewige Wiederkehr / ewige Wiederkunft"
    traduccio: "etern retorn"
    notes: "Idea cosmoètica: la repetició infinita de cada instant. Formulada per primer cop al fragment 11[141]."

  - original: "Nihilismus"
    traduccio: "nihilisme"
    notes: "Desvaloració dels valors suprems. Nietzsche el diagnostica com a conseqüència de la mort de Déu."

  - original: "Umwerthung aller Werthe"
    traduccio: "transvaloració de tots els valors"
    notes: "Projecte filosòfic central de l'últim Nietzsche. Reavaluació radical dels fonaments morals."

  - original: "Herren-Moral"
    traduccio: "moral dels senyors"
    notes: "Moral afirmativa, creadora de valors, oposada a la moral dels esclaus (Sklaven-Moral)."

  - original: "Sklaven-Moral"
    traduccio: "moral dels esclaus"
    notes: "Moral reactiva, nascuda del ressentiment, que inverteix els valors aristocràtics."

  - original: "Ressentiment"
    traduccio: "ressentiment"
    notes: "Nietzsche usa el terme francès. Rancúnia creativa que genera valors morals invertits."

  - original: "Trieb / Triebe"
    traduccio: "impuls / impulsos"
    notes: "Forces instintives bàsiques. Nietzsche redueix el pensament a un joc d'impulsos."

  - original: "Schein / scheinbar"
    traduccio: "aparença / aparent"
    notes: "Nietzsche revaloritza el món aparent com l'únic real, contra la tradició platònica."

  - original: "das Seiende"
    traduccio: "l'ens / allò que és"
    notes: "Terme ontològic. Nietzsche l'identifica amb el món sensible, no amb un més enllà."

  - original: "Macht"
    traduccio: "poder"
    notes: "No en sentit polític, sinó com a força vital, capacitat d'autoafirmació i creixement."

  - original: "Stärke / Schwäche"
    traduccio: "força / feblesa"
    notes: "Parella oposada fonamental en la valoració nietzscheana."

  - original: "Tugend"
    traduccio: "virtut"
    notes: "Nietzsche critica la virtut com a màscara de feblesa en la moral dels esclaus."

  - original: "Explosiv-Stoffe"
    traduccio: "materials explosius"
    notes: "Metàfora per al geni: acumulació de força que explota en creació."

  - original: "Verkleingerung"
    traduccio: "empetitiment"
    notes: "Procés de degradació i mediocrització de l'home europeu modern."

  - original: "Für-wahr-halten"
    traduccio: "tenir-per-veritable"
    notes: "Calc deliberat per mantenir l'estructura conceptual nietzscheana. Tot 'tenir per cert' és ja una ficció."

  - original: "Art-züchtend"
    traduccio: "que cria l'espècie"
    notes: "Terme biològic-filosòfic. Nietzsche planteja el judici en termes d'utilitat per a l'espècie."
