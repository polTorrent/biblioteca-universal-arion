termes:
  - original: "Consolatio"
    traduccio: "Consolació"
    descripcio: "Gènere literari llatí de consol filosòfic davant l'adversitat"
  - original: "Prosimetrum"
    traduccio: "Prosímetre"
    descripcio: "Forma literària que alterna prosa i vers, característica d'aquesta obra"
  - original: "Camenae"
    traduccio: "Camenes/Muses"
    descripcio: "Divinitats itàliques de la poesia, assimilades a les Muses gregues"
  - original: "Philosophia"
    traduccio: "Filosofia"
    descripcio: "Personificació al·legòrica de la filosofia com a dona de dignitat sobrehumana"
  - original: "Π (Pi) / Θ (Theta)"
    traduccio: "Π / Θ"
    descripcio: "Lletres gregues brodades al vestit de la Filosofia: Π = Praxis (filosofia pràctica), Θ = Theoria (filosofia teòrica/contemplativa)"
  - original: "Eleaticis atque Academicis studiis"
    traduccio: "Estudis eleàtics i acadèmics"
    descripcio: "L'escola eleàtica (Parmènides, Zenó) i l'Acadèmia platònica, tradicions filosòfiques fonamentals"
  - original: "Sirenes"
    traduccio: "Sirenes"
    descripcio: "Criatures mitològiques que seduïen amb el cant; aquí, metàfora de la poesia consolatòria falsa"
  - original: "Lethargum"
    traduccio: "Letargia"
    descripcio: "Malaltia del son profund; metàfora de l'oblit filosòfic"
  - original: "ἕπου θεῷ (hepou theō)"
    traduccio: "Segueix Déu"
    descripcio: "Precepte pitagòric que Boeci reivindica com a guia de la seva vida moral"
  - original: "εἶς κοίρανός ἐστιν, εἶς βασιλεύς"
    traduccio: "Un sol senyor hi ha, un sol rei"
    descripcio: "Cita d'Homer (Ilíada II, 204-205), aplicada per la Filosofia a la pàtria celeste"
  - original: "ὄνος λύρας (onos lyras)"
    traduccio: "Ase davant la lira"
    descripcio: "Proverbi grec per a qui no entén el que escolta"
  - original: "ἐξαύδα, μὴ κεῦθε νόῳ (exauda, mē keuthe noō)"
    traduccio: "Parla, no ho amaguis en el teu esperit"
    descripcio: "Cita d'Homer (Ilíada I, 363), Tetis a Aquil·les"
  - original: "Conigastus"
    traduccio: "Conigast"
    descripcio: "Oficial got que oprimia els febles; Boeci s'hi va oposar"
  - original: "Triguilla"
    traduccio: "Triguil·la"
    descripcio: "Prepòsit (superintendent) de la casa reial de Teodoric"
  - original: "Maiestas"
    traduccio: "Majestat"
    descripcio: "Crim de lesa majestat (alta traïció); acusació principal contra Boeci"
  - original: "Coemptio"
    traduccio: "Coemptió"
    descripcio: "Compra forçada de gra a preus fixats, forma d'impost extraordinari"
  - original: "Boreas / Zephyrus"
    traduccio: "Bòreas / Zèfir"
    descripcio: "Vents del nord (fred) i de l'oest (suau), símbol dels cicles naturals"
  - original: "Vesaevus"
    traduccio: "Vesuvi"
    descripcio: "Volcà de Campània, símbol de la força destructiva natural"
  - original: "Phoebus / Sol"
    traduccio: "Febus / Sol"
    descripcio: "Apel·latiu del déu Apol·lo com a divinitat solar"
  - original: "Hesperus / Lucifer"
    traduccio: "Hèsper / Lucífer"
    descripcio: "Noms del planeta Venus com a estel vespertí i matutí respectivament"
