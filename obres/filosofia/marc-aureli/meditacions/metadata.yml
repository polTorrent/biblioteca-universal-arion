    influencies:
    - Epictet
    - Crisip
    - Zenó de Citi
    - Sèneca
    - Heràclit
    obres_relacionades:
    - Enchiridion d'Epictet
    - Discursos d'Epictet
    - De Brevitate Vitae de Sèneca
    - Epistulae Morales de Sèneca
