  descripcio: 'Els tres capítols de «Jiān Ài» (兼愛, Amor universal) constitueixen el
    nucli doctrinal del mohisme. Mozi hi defensa que tots els mals del món —guerres,
    robatoris, injustícia— neixen de l''amor parcial (別, bié) i que l''únic remei
    és l''amor universal i indiscriminat (兼, jiān). Argumenta amb exemples històrics
    (Yu el Gran, el rei Wen, el rei Wu) que els grans sobirans ja van practicar aquest
    principi, i que és tan factible com qualsevol costum imposada pels governants.

    '
