  descripcio: >
    Primer llibre del poema filosòfic epicuri «De la natura de les coses».
    Lucreci exposa els principis fonamentals de la física atomista: res no sorgeix
    del no-res, res no es destrueix completament, la matèria es compon d'àtoms
    invisibles i buit. Dedicat a Memmi, s'obre amb un himne a Venus com a força
    generatriu de la natura i inclou l'elogi d'Epicur.
