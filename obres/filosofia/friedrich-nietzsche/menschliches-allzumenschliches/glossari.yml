obra: Menschliches, Allzumenschliches
autor: Friedrich Nietzsche
subtitol: Ein Buch für freie Geister
idioma_original: alemany
traduccio: catala
termes:
  - original: Mensch
    traduccio: home / esser huma
    notes: Concepte central; designa l'esser huma en la seva condicio finita i historica.
  - original: Allzumenschlich
    traduccio: massa huma
    notes: Adjectiu que Nietzsche utilitza per desemmascarar les motivacions baixes darrere dels ideals elevats.
  - original: freier Geist
    traduccio: esperit lliure
    notes: Figura clau del llibre; aquell que s'allibera de les conviccions metafisiques i morals heretades.
  - original: Geist
    traduccio: esperit
    notes: No es l'esperit en sentit hegelia; sovint equival a intel·lecte, ment o disposicio anímica.
  - original: Moral
    traduccio: moral
    notes: Objecte de critica genealogica; sistema de valors que Nietzsche analitza historicament.
  - original: Metaphysik
    traduccio: metafisica
    notes: Disciplina que Nietzsche considera superada pel pensament historic i cientific.
  - original: Wahrheit
    traduccio: veritat
    notes: Nocio problematitzada; Nietzsche en denuncia el caracter convencional i utilitari.
  - original: Irrtum
    traduccio: error
    notes: Categoria fonamental; molts conceptes considerats veritats son errors utils consolidats.
  - original: Erkenntnis
    traduccio: coneixement
    notes: Activitat humana limitada per la perspectiva i els interessos vitals.
  - original: Wissenschaft
    traduccio: ciencia
    notes: Model d'aproximacio rigorosa a la realitat, oposat a la metafisica.
  - original: historischer Sinn
    traduccio: sentit historic
    notes: Capacitat de comprendre fenomens en la seva genesi i evolucio.
  - original: Ursprung
    traduccio: origen
    notes: Punt de partida d'una investigacio genealogica; sovint mes humil del que la tradicio pretén.
  - original: Trieb
    traduccio: impuls / pulsio
    notes: Força psicologica subjacent als comportaments i creences humanes.
  - original: Leidenschaft
    traduccio: passio
    notes: Estat afectiu intens; pot ser tant cega com sublimada per l'esperit lliure.
  - original: Künstler
    traduccio: artista
    notes: Figura analitzada críticament; el seu prestigi metafisic queda desemmascarat.
  - original: Religion
    traduccio: religio
    notes: Fenomen humà, no diví; estudiat des de la psicologia i la historia.
  - original: Kultur
    traduccio: cultura
    notes: Conjunt de practiques i valors d'una epoca; objecte d'analisi critica.
  - original: Convention
    traduccio: convencio
    notes: Acord social que sovint es presenta com a veritat natural o eterna.
  - original: Vorurteil
    traduccio: prejudici
    notes: Creenca heretada no examinada; objectiu de la critica nietzscheana.
  - original: Selbstüberwindung
    traduccio: superacio de si
    notes: Tasca de l'esperit lliure; alliberar-se de les pròpies cadenes interiors.
