termes:
  - id: "lucili"
    llati: "Lucilius"
    traduccio: "Lucili"
    definicio: >
      Gaius Lucilius Iunior (c. 15-70 dC), procurador romà de Sicília i amic de Sèneca,
      destinatari de les 124 Epistulae Morales i de les Naturales Quaestiones. Home culte
      amb interessos filosòfics i literaris, representa l'estudiant ideal de filosofia
      estoica: algú que no és filòsof professional però que busca viure millor.
    usos: [1, 4, 5]

  - id: "stultitia"
    llati: "stultitia"
    traduccio: "necietat, insensatesa"
    definicio: >
      Terme tècnic de l'estoïcisme romà que designa l'estat mental oposat a la saviesa
      (sapientia). El stultus no és simplement l'ignorant sinó qui viu sense examinar
      la seva vida, malgastant el temps en coses sense valor. Per a Sèneca, la stultitia
      és la condició natural de la humanitat no filosòfica, i la seva superació és
      l'objectiu de l'educació moral.
    usos: [5]

  - id: "iactura"
    llati: "iactura"
    traduccio: "pèrdua, malbaratament"
    definicio: >
      Del verb iacere (llançar). Originalment terme marítim que designava la càrrega
      llançada per la borda per salvar el vaixell. Sèneca l'usa metafòricament per a
      la pèrdua del temps: una pèrdua deliberada o negligent d'allò que té valor.
      La iactura per neglegentiam (pèrdua per negligència) és la més vergonyosa
      (turpissima) perquè és voluntària i evitable.
    usos: [1]

  - id: "parsimonia"
    llati: "parsimonia"
    traduccio: "estalvi, frugalitat"
    definicio: >
      Virtut estoica de la moderació i l'estalvi, tant material com temporal.
      Sèneca cita el proverbi antic sera parsimonia in fundo est («l'estalvi al
      fons és tardà»): quan gairebé no queda res, ja no serveix de res estalviar.
      La parsimònia aplicada al temps és la disciplina de no malgastar-lo, que
      constitueix el missatge central de l'epístola.
    usos: [7]
