termes:
  - original: "tempus"
    traduccio: "temps"
    nota: "Concepte central de l'epístola. Sèneca el tracta com l'únic bé realment nostre."

  - original: "vindica te tibi"
    traduccio: "reivindica't a tu mateix"
    nota: "Expressió jurídica (vindicatio) aplicada a la recuperació del propi jo."

  - original: "mors"
    traduccio: "mort"
    nota: "No com a esdeveniment futur sinó com a procés continu: 'quidquid aetatis retro est mors tenet'."

  - original: "neglegentia"
    traduccio: "negligència"
    nota: "La causa més vergonyosa (turpissima) de pèrdua de temps segons Sèneca."

  - original: "parsimonia"
    traduccio: "estalvi / frugalitat"
    nota: "Proverbi citat: 'sera parsimonia in fundo est' — l'estalvi tardà és inútil."

  - original: "Lucili"
    traduccio: "Lucili"
    nota: "Lucilius Iunior, procurador de Sicília, destinatari de les epístoles."

  - original: "iactura"
    traduccio: "pèrdua"
    nota: "Terme marítim (llançar càrrega per la borda), usat metafòricament per la pèrdua de temps."

  - original: "ratio impensae"
    traduccio: "compte de les despeses"
    nota: "Metàfora comptable: Sèneca porta el balanç del temps gastat."

  - original: "paupertas"
    traduccio: "pobresa"
    nota: "Pobresa de temps, no material. Sèneca admet la seva pròpia 'indigència temporal'."

  - original: "cotidie mori"
    traduccio: "morir cada dia"
    nota: "Idea estoica fonamental: cada dia que passa és una porció de vida ja perduda."
