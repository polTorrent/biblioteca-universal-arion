obra:
  titol: "Meghadūta — El Missatger del Núvol"
  titol_original: "मेघदूतम् (Meghadūtam)"
  autor: "Kālidāsa"
  autor_original: "कालिदास"
  traductor: "Editorial Clàssica"
  any_original: "c. s. IV-V dC"
  any_traduccio: 2026
  llengua_original: "sànscrit"
  categoria: "oriental"
  genere: "poesia"
  descripcio: >
    Poema líric en sànscrit on un yakṣa exiliat demana a un núvol
    que porti un missatge a la seva estimada a la ciutat d'Alakā.
    Obra mestra de la poesia sànscrita clàssica, considerada un dels
    millors poemes lírics de la literatura universal.
