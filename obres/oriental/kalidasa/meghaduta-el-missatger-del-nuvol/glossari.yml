termes:
  - original: "Kumārasambhava"
    transliteracio: "kumārasambhava"
    traduccio: "El Naixement del Déu de la Guerra"
    definicio: >
      Poema èpic en sànscrit de Kālidāsa que narra el naixement de Kārttikeya
      (Skanda), déu de la guerra, fill de Śiva i Pārvatī.

  - original: "Kālidāsa"
    transliteracio: "kālidāsa"
    traduccio: "Kālidāsa"
    definicio: >
      Poeta i dramaturg sànscrit (c. s. IV-V dC), considerat el més gran autor
      de la literatura clàssica índia. Autor del Kumārasambhava, Meghadūta,
      Śakuntalā i altres obres mestres.

  - original: "Śiva"
    transliteracio: "śiva"
    traduccio: "Śiva"
    definicio: >
      Déu suprem de la destrucció i la regeneració en l'hinduisme. En el poema,
      viu com a ermità asceta al Himàlaia després de la mort de Satī, la seva
      primera esposa.

  - original: "Umā"
    transliteracio: "umā"
    traduccio: "Umā"
    definicio: >
      Nom de Pārvatī, filla de l'Himàlaia i Menā. El nom prové del crit de la
      seva mare «U mā!» ('Oh, no!') quan la veié practicar austeritats severes.
      Reencarnació de Satī, destinada a ser esposa de Śiva.

  - original: "Himālaya"
    transliteracio: "himālaya"
    traduccio: "Himàlaia"
    definicio: >
      Personificació de la serralada com a rei de les muntanyes. Pare d'Umā
      (Pārvatī) i espòs de Menā.

  - original: "Menā"
    transliteracio: "menā"
    traduccio: "Menā"
    definicio: >
      Nimfa celestial, esposa de l'Himàlaia i mare d'Umā (Pārvatī) i de
      Maināka.

  - original: "Maināka"
    transliteracio: "maināka"
    traduccio: "Maināka"
    definicio: >
      Fill de l'Himàlaia i Menā. Muntanya que va escapar de la destrucció
      d'Indra amagant-se sota l'oceà.

  - original: "Brahmā"
    transliteracio: "brahmā"
    traduccio: "Brahmà"
    definicio: >
      Déu creador de l'univers en la trinitat hindú (Trimūrti). Els déus
      acudeixen a ell per demanar consell contra el dimoni Tāraka.

  - original: "Indra"
    transliteracio: "indra"
    traduccio: "Indra"
    definicio: >
      Rei dels déus i senyor del cel. Porta el llamp (vajra) com a arma.
      Lidera els déus en la seva lluita contra Tāraka.

  - original: "Kāma"
    transliteracio: "kāma"
    traduccio: "Kāma"
    definicio: >
      Déu de l'amor, equivalent hindú d'Eros. Armat amb un arc de flors i
      fletxes perfumades. Enviat per Indra a despertar l'amor de Śiva per Umā,
      és cremat per la mirada de Śiva.

  - original: "Tāraka"
    transliteracio: "tāraka"
    traduccio: "Tàraka"
    definicio: >
      Dimoni (asura) que ha obtingut un poder irresistible gràcies a una
      benedicció de Brahmā. Només pot ser vençut per un fill de Śiva, cosa que
      motiva tota l'acció del poema.

  - original: "Gangā"
    transliteracio: "gaṅgā"
    traduccio: "Gangà"
    definicio: >
      El riu sagrat Ganges, personificat com a deessa. Neix a l'Himàlaia i
      banya tant el cel com la terra.

  - original: "Viṣṇu"
    transliteracio: "viṣṇu"
    traduccio: "Vixnu"
    definicio: >
      Déu conservador de l'univers en la Trimūrti. Porta el disc (chakra)
      com a arma, que resulta ineficaç contra Tāraka.

  - original: "Varuṇa"
    transliteracio: "varuṇa"
    traduccio: "Varuna"
    definicio: >
      Déu de les aigües i de l'ordre còsmic. La seva arma és el llaç (pāśa),
      que penja inert davant el poder de Tāraka.

  - original: "Yama"
    transliteracio: "yama"
    traduccio: "Yama"
    definicio: >
      Déu de la mort i jutge dels difunts. El seu ceptre ha perdut el poder
      davant Tāraka.

  - original: "Kubera"
    transliteracio: "kubera"
    traduccio: "Kuvera"
    definicio: >
      Déu de la riquesa. El seu braç ja no pot brandir la maça davant el
      domini de Tāraka.

  - original: "Vāsuki"
    transliteracio: "vāsuki"
    traduccio: "Vāsuki"
    definicio: >
      Rei dels nāga (serps). Esmentat com a líder de les serps en el poema.

  - original: "Meru"
    transliteracio: "meru"
    traduccio: "Meru"
    definicio: >
      Muntanya mítica al centre de l'univers en la cosmologia hindú. Els seus
      cims sagrats són arrabassats per Tāraka.

  - original: "Nārada"
    transliteracio: "nārada"
    traduccio: "Nàrada"
    definicio: >
      Savi celestial que viatja lliurement entre els mons. Profetitza que
      Umā serà l'esposa de Śiva.

  - original: "Pṛthu"
    transliteracio: "pṛthu"
    traduccio: "Prithu"
    definicio: >
      Rei mític que va regnar sobre la terra en temps antics. Esmentat al
      cant primer.

  - original: "Vikramāditya"
    transliteracio: "vikramāditya"
    traduccio: "Vikramāditya"
    definicio: >
      Rei d'Ujjain a la cort del qual Kālidāsa fou una de les «Nou Pedres
      Precioses» (Navaratna).

  - original: "Satī"
    transliteracio: "satī"
    traduccio: "Satī"
    definicio: >
      Primera esposa de Śiva en una vida anterior. Es va immolar quan el seu
      pare va menysprear Śiva. Reneix com Umā/Pārvatī.

  - original: "tapas"
    transliteracio: "tapas"
    traduccio: "austeritat, penitència"
    definicio: >
      Pràctica ascètica d'autodisciplina i meditació. Umā practica tapas
      sever per guanyar l'amor de Śiva.

  - original: "koïl"
    transliteracio: "kokila"
    traduccio: "cucut indi"
    definicio: >
      Ocell (Eudynamys scolopacea) de cant melodiós, símbol de la primavera
      i de l'amor en la poesia sànscrita.
