  descripcio: 'Selecció de 100 kurals (dístics) del Tirukkuṛaḷ, obra mestra de la
    literatura tàmil i un dels textos ètics més importants de la humanitat. Organitzat
    en tres llibres: Aram (Virtut), Porul (Riquesa) i Inbam (Amor), el Tirukkuṛaḷ
    condensa en 1330 versets curts tota una filosofia de vida. Aquesta selecció recull
    100 dels kurals més representatius.

    '
