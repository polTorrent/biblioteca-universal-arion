termes:
  - original: "குறள்"
    transliteracio: "kuṛaḷ"
    traduccio: "dístic / verset breu"
    notes: "Forma poètica de dos versos (4+3 paraules). Dona nom a l'obra."

  - original: "அறம்"
    transliteracio: "aṛam"
    traduccio: "virtut / dharma / rectitud"
    notes: "Primer llibre del Tirukkuṛaḷ. Concepte central d'ordre moral còsmic."

  - original: "பொருள்"
    transliteracio: "poruḷ"
    traduccio: "riquesa / bé material / propòsit"
    notes: "Segon llibre. Inclou política, economia i govern."

  - original: "இன்பம்"
    transliteracio: "iṉbam"
    traduccio: "amor / plaer / felicitat"
    notes: "Tercer llibre. Tracta l'amor romàntic i eròtic."

  - original: "ஆதிபகவன்"
    transliteracio: "ādipakavaṉ"
    traduccio: "Senyor Primordial / Déu primer"
    notes: "Epítet diví al kural 1. No sectari: pot referir-se a qualsevol concepció de Déu."

  - original: "தவம்"
    transliteracio: "tavam"
    traduccio: "ascetisme / penitència"
    notes: "Pràctica espiritual de renúncia i disciplina."

  - original: "கல்வி"
    transliteracio: "kalvi"
    traduccio: "aprenentatge / educació"
    notes: "Capitol 40 del Porul. Thiruvalluvar dona gran importància a l'educació."

  - original: "அன்பு"
    transliteracio: "aṉbu"
    traduccio: "amor / afecte / compassió"
    notes: "Amor universal, diferent de l'amor romàntic (inbam)."

  - original: "செங்கோல்"
    transliteracio: "ceṅkōl"
    traduccio: "ceptre just / govern recte"
    notes: "Literalment 'bastó recte'. Símbol del govern just."

  - original: "ஊழ்"
    transliteracio: "ūḻ"
    traduccio: "destí / karma"
    notes: "Força còsmica que determina els resultats de les accions."

  - original: "மானம்"
    transliteracio: "māṉam"
    traduccio: "honor / dignitat"
    notes: "Virtut fonamental en l'ètica del Tirukkuṛaḷ."

  - original: "நட்பு"
    transliteracio: "naṭpu"
    traduccio: "amistat"
    notes: "Tema important al Porul. Thiruvalluvar distingeix l'amistat vertadera de la falsa."

  - original: "விருந்தோம்பல்"
    transliteracio: "virundombal"
    traduccio: "hospitalitat"
    notes: "Deure sagrat d'acollir l'hoste, tema del capítol 9."

  - original: "அடக்கம்"
    transliteracio: "aṭakkam"
    traduccio: "autocontrol / moderació"
    notes: "Virtut central: domini dels sentits i les passions."

  - original: "பொறை"
    transliteracio: "poṛai"
    traduccio: "paciència / tolerància"
    notes: "Capacitat de suportar ofenses sense rancor."
