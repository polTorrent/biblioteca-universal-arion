  - 1: Arjunaviṣādayogaḥ — El ioga del desànim d'Arjuna
  - 2: Sāṅkhyayogaḥ — El ioga del coneixement
  - 3: Karmayogaḥ — El ioga de l'acció
  - 6: Ātmasaṃyamayogaḥ — El ioga del domini de si mateix
  - 11: Viśvarūpadarśanayogaḥ — El ioga de la visió de la forma universal
  - 12: Bhaktiyogaḥ — El ioga de la devoció
