termes:
  - original: "俳句"
    romanitzacio: "haiku"
    traduccio: "haiku"
    definicio: "Forma poètica japonesa de 17 síl·labes (5-7-5), que captura un instant fugaç de la natura o l'experiència humana."

  - original: "紀行文"
    romanitzacio: "kikōbun"
    traduccio: "relat de viatge"
    definicio: "Gènere literari japonès de prosa narrativa de viatge, sovint amb observacions poètiques i reflexions personals."

  - original: "俳文"
    romanitzacio: "haibun"
    traduccio: "prosa poètica amb haiku"
    definicio: "Gènere que combina prosa lírica amb haikus intercalats. Bashō en va ser el mestre indiscutible."

  - original: "過客"
    romanitzacio: "kakaku"
    traduccio: "viatger de pas"
    definicio: "Mot clàssic per al viatger efímer. Obre l'obra amb la famosa reflexió sobre el temps com a viatger etern."

  - original: "漂泊"
    romanitzacio: "hyōhaku"
    traduccio: "vagareig, errància"
    definicio: "Concepte central en Bashō: l'impuls irresistible de vagar, lligat a la tradició dels poetes itinerants."

  - original: "道祖神"
    romanitzacio: "dōsojin"
    traduccio: "déu dels camins"
    definicio: "Divinitat protectora dels viatgers i dels encreuaments de camins en la tradició xintoista."

  - original: "風雅"
    romanitzacio: "fūga"
    traduccio: "elegància poètica, refinament artístic"
    definicio: "Ideal estètic japonès d'elegància natural i sensibilitat poètica, central en l'estètica de Bashō."

  - original: "わび"
    romanitzacio: "wabi"
    traduccio: "bellesa austera, simplicitat"
    definicio: "Concepte estètic japonès que valora la bellesa en la simplicitat, la imperfecció i l'austeritat."

  - original: "さび"
    romanitzacio: "sabi"
    traduccio: "pàtina del temps, solitud serena"
    definicio: "Qualitat estètica que aprecia la bellesa melancòlica del pas del temps i la solitud contemplativa."

  - original: "歌枕"
    romanitzacio: "utamakura"
    traduccio: "topònim poètic"
    definicio: "Llocs famosos en la tradició poètica japonesa, carregats de ressonàncies literàries acumulades durant segles."

  - original: "翁"
    romanitzacio: "okina"
    traduccio: "el vell mestre"
    definicio: "Sobrenom respectuós de Bashō, usat pels seus deixebles i en la tradició posterior."

  - original: "曾良"
    romanitzacio: "Sora"
    traduccio: "Sora (Kawai Sora)"
    definicio: "Deixeble i company de viatge de Bashō en el periple d'Oku no Hosomichi. Nom complet: Kawai Sora (河合曾良)."

  - original: "奧羽"
    romanitzacio: "Ōu"
    traduccio: "Ōu (nord-est del Japó)"
    definicio: "Regió que comprèn les antigues províncies de Mutsu i Dewa, al nord-est de Honshū. Destí del viatge de Bashō."

  - original: "松島"
    romanitzacio: "Matsushima"
    traduccio: "Matsushima"
    definicio: "Badia amb centenars de petites illes cobertes de pins, considerada un dels tres paisatges més bells del Japó (日本三景)."

  - original: "象潟"
    romanitzacio: "Kisagata"
    traduccio: "Kisagata"
    definicio: "Antiga llacuna costanera, descrita per Bashō com el contrapunt melangiós de Matsushima. Avui terra ferma per un terratrèmol (1804)."

  - original: "光堂"
    romanitzacio: "Hikari-dō / Konjiki-dō"
    traduccio: "Pavelló Daurat"
    definicio: "Pavelló daurat del temple Chūsonji a Hiraizumi. Construït el 1124 per Fujiwara no Kiyohira, recobert d'or i laca. Un dels tresors nacionals del Japó."

  - original: "三里"
    romanitzacio: "san-ri"
    traduccio: "tres ri (punt d'acupuntura)"
    definicio: "Punt d'acupuntura sota el genoll (足三里). Bashō s'hi fa moxibustió abans de partir, tradició dels viatgers japonesos per enfortir les cames."

  - original: "西行"
    romanitzacio: "Saigyō"
    traduccio: "Saigyō"
    definicio: "Poeta i monjo itinerant (1118–1190), gran model de Bashō. Els seus viatges i poemes van inspirar el periple d'Oku no Hosomichi."

  - original: "無常"
    romanitzacio: "mujō"
    traduccio: "impermanència"
    definicio: "Concepte budista central: la naturalesa transitòria de totes les coses. Tema recurrent a l'obra de Bashō."

  - original: "平泉"
    romanitzacio: "Hiraizumi"
    traduccio: "Hiraizumi"
    definicio: "Antiga capital dels Fujiwara del nord (s. XI-XII). Destruïda el 1189. Bashō hi reflexiona sobre la glòria efímera i la impermanència."

  - original: "五月雨"
    romanitzacio: "samidare"
    traduccio: "pluges de maig / pluges d'estiu"
    definicio: "Pluges persistents de la cinquena lluna (estiu en el calendari occidental). Kigo (paraula estacional) que evoca melancolia i humitat."

  - original: "関"
    romanitzacio: "seki"
    traduccio: "barrera / pas fronterer"
    definicio: "Postos de control establerts a les fronteres provincials del Japó feudal. Shirakawa, Nezumi i Ichiburi són les barreres que Bashō travessa."

  - original: "遊行"
    romanitzacio: "yugyō"
    traduccio: "peregrinació religiosa"
    definicio: "Pràctica budista de vagar predicant. El patriarca Yugyō va netejar el camí del santuari de Kehi portant-hi sorra, costum que perdura."

  - original: "路通"
    romanitzacio: "Rotsū"
    traduccio: "Rotsū"
    definicio: "Poeta de haikai, deixeble de Bashō. Acompanya el mestre en l'última etapa del viatge, des de Tsuruga fins a Ōgaki."
