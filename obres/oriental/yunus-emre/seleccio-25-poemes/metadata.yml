obra:
  titol: Selecció de 25 poemes
  titol_original: Divan-ı Yunus Emre (seçme 25 şiir)
  autor: Yunus Emre
  autor_original: يونس امره
  traductor: Biblioteca Universal Arion (IA + revisió humana)
  any_original: c. 1300-1320
  any_traduccio: 2026
  llengua_original: turc antic (anatolià)
  genere: poesia/oriental
  descripcio: 'Selecció de 25 poemes del Divan de Yunus Emre (c. 1238–1320), un dels
    pares de la literatura turca i gran poeta místic sufi. Els seus versos, escrits
    en turc anatolià popular (no en persa ni àrab cortesà), expressen l''amor diví,
    la recerca espiritual, la fugacitat del món i la fraternitat humana amb un llenguatge
    accessible i profundament líric. La seva obra influí decisivament en la poesia
    turca posterior i en el moviment dels derviches.

    '
  temes:
  - sufisme
  - amor diví (aşk)
  - mística
  - fugacitat del món
  - fraternitat humana
  - recerca espiritual
  - poesia turca medieval
