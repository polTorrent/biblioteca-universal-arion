context_historic: 'Yunus Emre (c. 1238–1320) és considerat el pare de la poesia turca
  en llengua vernacla. En una època en què la literatura culta de l''Àsia Menor s''escrivia
  en persa i àrab, Yunus Emre optà pel turc anatolià del poble. Deixeble del xeic
  sufi Taptuk Emre, la seva poesia combina la tradició mística de l''Islam amb un
  lirisme popular i directe. Va ser declarat Personalitat de l''Any per la UNESCO
  el 1991. Els seus poemes es reciten encara avui a Turquia i són part fonamental
  del cànon literari turc. La seva influència s''estén a poetes posteriors com Karacaoğlan,
  Pir Sultan Abdal i Âşık Veysel.

  '
