termes:
  - original: "Mesnevī"
    transliteracio: "Masnavi"
    traduccio: "Poema en dístics rimats"
    context: "Forma poètica persa composta de dístics amb rima interna; títol de l'obra mestra de Rumi en sis volums"
  - original: "Mevlānā"
    transliteracio: "Mawlana"
    traduccio: "El nostre Senyor / Mestre"
    context: "Títol honorífic atorgat a Jalal al-Din Rumi; del persa 'el nostre mestre'"
  - original: "Jelālu-'d-Dīn"
    transliteracio: "Jalal al-Din"
    traduccio: "Glòria de la Fe"
    context: "Nom propi de Rumi; significa 'esplendor de la religió' en àrab"
  - original: "reed-flute"
    transliteracio: "ney"
    traduccio: "Flauta de canya"
    context: "Símbol central del Proem: la canya arrencada del canyar representa l'ànima separada de Déu"
  - original: "love"
    transliteracio: "ishq"
    traduccio: "Amor (diví)"
    context: "Força transformadora central del sufisme; l'amor místic que uneix l'ànima amb Déu, motor de tota l'obra"
  - original: "soul"
    transliteracio: "ruh"
    traduccio: "Ànima / Esperit"
    context: "L'essència espiritual de l'ésser humà, contraposada a la carn (nafs); tema recurrent als contes"
  - original: "flesh"
    transliteracio: "nafs"
    traduccio: "Carn / Ego / Jo inferior"
    context: "L'ànima carnal o ego que busca la gratificació; al conte V, la dona representa la carn i l'home l'ànima"
  - original: "dervish"
    transliteracio: "darwix"
    traduccio: "Dervix"
    context: "Asceta sufí; els seguidors de Rumi formen l'orde Mevleví, coneguts com a 'dervixos giravoltants'"
  - original: "Shemsu-'d-Dīn, Tebrīzī"
    transliteracio: "Shams al-Din Tabrizi"
    traduccio: "Sol de la Fe, de Tabriz"
    context: "Mestre espiritual de Rumi; la seva amistat i desaparició van transformar Rumi en poeta místic"
  - original: "Sinai"
    transliteracio: "Sinai"
    traduccio: "Sinaí"
    context: "Muntanya sagrada; al Proem, tremola d'amor davant Déu, com Moisès. Símbol de l'èxtasi místic"
  - original: "Vazīr"
    transliteracio: "wazir"
    traduccio: "Visir / Ministre"
    context: "Conseller del rei; personatge clau als contes III-IV, on el visir jueu encarna l'enveja i l'engany"
  - original: "Husāmu-'d-Dīn"
    transliteracio: "Husam al-Din"
    traduccio: "Espasa de la Fe"
    context: "Deixeble i successor de Rumi; amanuense del Masnavi, a qui Rumi va dictar tota l'obra"
  - original: "'Umer"
    transliteracio: "Úmar"
    traduccio: "Úmar (ibn al-Khattab)"
    context: "Segon califa de l'islam; esmentat en diversos contes com a model de pietat i justícia"
  - original: "Caliph"
    transliteracio: "khalifa"
    traduccio: "Califa / Successor"
    context: "Líder espiritual i polític de la comunitat musulmana"
  - original: "God willing"
    transliteracio: "insha'Allah"
    traduccio: "Si Déu vol"
    context: "Fórmula de submissió a la voluntat divina; els metges del conte I pequen per ometre-la per orgull"
  - original: "Samarqand"
    transliteracio: "Samarcanda"
    traduccio: "Samarcanda"
    context: "Ciutat de l'Àsia Central; al conte I, l'orfebre de Samarcanda és l'amant secret de la serventa"
  - original: "Balkh"
    transliteracio: "Balkh"
    traduccio: "Balkh"
    context: "Ciutat natal de Rumi a l'actual Afganistan; el seu pare hi era un erudit venerat abans de l'exili"
  - original: "Qonya"
    transliteracio: "Konya"
    traduccio: "Konya / Iconi"
    context: "Ciutat d'Anatòlia on Rumi va viure, ensenyar i fundar l'orde Mevleví; hi és enterrat"
  - original: "mirror"
    transliteracio: "a'ina"
    traduccio: "Mirall"
    context: "Símbol del cor purificat que reflecteix la llum divina; al Proem, el rovell l'enfosqueix"
  - original: "lion"
    transliteracio: "shir"
    traduccio: "Lleó"
    context: "Al conte V, el lleó representa el poder i la majestat; les bèsties ofereixen tribut per sobreviure"
