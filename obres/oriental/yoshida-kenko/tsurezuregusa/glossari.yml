termes:
  - terme: waka
    original: 和歌
    transliteracio: waka
    traduccio: poesia japonesa clàssica
    nota: Forma poètica japonesa, especialment el tanka de 31 síl·labes (5-7-5-7-7).

  - terme: nembutsu
    original: 念仏
    transliteracio: nembutsu
    traduccio: invocació del nom del Buda Amida
    nota: Pràctica central del budisme de la Terra Pura. Consisteix a recitar "Namu Amida Butsu".

  - terme: moxa
    original: 灸
    transliteracio: kyū
    traduccio: moxibustió
    nota: Tècnica de medicina tradicional que crema herba d'artemísia sobre punts d'acupuntura.

  - terme: sanri
    original: 三里
    transliteracio: sanri
    traduccio: punt d'acupuntura sota el genoll
    nota: Punt situat a la part externa de la cama, sota el genoll. Es creia que la moxibustió aquí prevenia malalties.

  - terme: hitatare
    original: 直垂
    transliteracio: hitatare
    traduccio: vestit formal masculí
    nota: Peça de vestir formal dels guerrers i nobles durant el període Kamakura.

  - terme: miso
    original: 味噌
    transliteracio: miso
    traduccio: pasta fermentada de soja
    nota: Condiment bàsic de la cuina japonesa, fet amb soja fermentada.

  - terme: zelkova
    original: 榎
    transliteracio: enoki
    traduccio: arbre zelkova (Zelkova serrata)
    nota: Arbre caducifoli comú al Japó, de la família de les ulmàcies.

  - terme: treumil
    original: 足鼎
    transliteracio: ashigane
    traduccio: trípode de cuina
    nota: Recipient metàl·lic amb tres potes, usat per cuinar o escalfar aliments.

  - terme: sunoko
    original: 簀子
    transliteracio: sunoko
    traduccio: galeria exterior de fusta
    nota: Passarel·la o galeria oberta de llistons de fusta a l'exterior d'una residència aristocràtica.

  - terme: sukigaki
    original: 透垣
    transliteracio: sukigaki
    traduccio: tanca de bambú calat
    nota: Tanca feta amb bambú entreteixit que deixa passar la llum, típica dels jardins japonesos.

  - terme: Kokin-shū
    original: 古今集
    transliteracio: Kokin-shū
    traduccio: Recull de poemes antics i moderns
    nota: Primera antologia imperial de poesia japonesa (c. 905), compilada per Ki no Tsurayuki.

  - terme: Shin-kokin-shū
    original: 新古今集
    transliteracio: Shin-kokin-shū
    traduccio: Nou recull de poemes antics i moderns
    nota: Vuitena antologia imperial de poesia (c. 1205), considerada un cim de la poesia waka.

  - terme: Genji Monogatari
    original: 源氏物語
    transliteracio: Genji Monogatari
    traduccio: La història de Genji
    nota: Novel·la de Murasaki Shikibu (c. 1008), considerada la primera novel·la de la literatura mundial.

  - terme: Makura no Sōshi
    original: 枕草子
    transliteracio: Makura no Sōshi
    traduccio: El llibre del coixí
    nota: Llibre de notes i reflexions de Sei Shōnagon (c. 1002), obra cabdal de la literatura de Heian.

  - terme: Maka Shikan
    original: 摩訶止観
    transliteracio: Maka Shikan
    traduccio: Gran tractat de calma i contemplació
    nota: Text fonamental del budisme Tendai, escrit per Zhiyi (538-597).

  - terme: Wenxuan
    original: 文選
    transliteracio: Wenxuan
    traduccio: Antologia de literatura xinesa
    nota: Antologia compilada pel príncep Xiao Tong (501-531), obra de referència en tot l'est asiàtic.

  - terme: Tanabata
    original: 七夕
    transliteracio: Tanabata
    traduccio: Festa de les estrelles
    nota: Festa celebrada el setè dia del setè mes lunar, basada en la llegenda de dues estrelles enamorades.

  - terme: Ninna-ji
    original: 仁和寺
    transliteracio: Ninna-ji
    traduccio: Temple Ninna-ji
    nota: Temple budista de Kyoto, fundat l'any 888. Seus de diversos fragments humorístics del Tsurezuregusa.

  - terme: Iwashimizu
    original: 石清水
    transliteracio: Iwashimizu
    traduccio: Santuari d'Iwashimizu Hachimangū
    nota: Important santuari xintoista al cim del mont Otokoyama, al sud de Kyoto.

  - terme: tsuina
    original: 追儺
    transliteracio: tsuina
    traduccio: ritual d'expulsió dels dimonis
    nota: Cerimònia celebrada l'últim dia de l'any per expulsar els esperits malignes.
