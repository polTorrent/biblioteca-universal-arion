- id: dao
  xinès: 道
  pinyin: Dào
  traduccio: el Dao
  definicio: "El Camí, principi suprem i inefable que subjau a tota l'existència. Alhora font originària, llei natural i procés còsmic. El terme combina els significats de 'camí', 'mètode' i 'paraula'. En el Tao Te King, el Dao transcendeix qualsevol determinació: és anterior al Cel i a la Terra (cap. 25), engendra totes les coses (cap. 42) i, tanmateix, roman buit i inexhaurible (cap. 4). La paradoxa fundacional de l'obra rau precisament en el fet que el Dao que pot ser expressat amb paraules no és el Dao etern (cap. 1)."

- id: de
  xinès: 德
  pinyin: Dé
  traduccio: la Virtut
  definicio: "El poder intrínsec, l'eficàcia natural o la virtut interior que emana del Dao en cada ésser. No es tracta d'una virtut moral confuciana sinó de la potència originària que cada cosa rep del Dao per desplegar la seva naturalesa pròpia. El De Jing (caps. 38-81) explora com aquesta virtut es manifesta en el govern, l'acció i la vida quotidiana. La Virtut suprema (上德) no és conscient de si mateixa i per això és autèntica; la virtut inferior s'esforça a ser virtuosa i per això no ho és (cap. 38)."

- id: wu-wei
  xinès: 無為
  pinyin: Wú Wéi
  traduccio: la no-acció
  definicio: "Acció sense forçament, intervenció sense interferència. No designa la passivitat ni la inacció, sinó l'actuació espontània i sense esforç que s'alinea amb el curs natural de les coses. El savi governa per la no-acció i així res no resta desgovernat (cap. 3). És el principi polític i ètic central del taoisme: actuar sense imposar la voluntat pròpia, com l'aigua que venç la roca sense combatre-la. Els manuscrits de Mawangdui confirmen la centralitat d'aquest concepte en la versió més antiga del text."

- id: sheng-ren
  xinès: 聖人
  pinyin: Shèng Rén
  traduccio: el Savi
  definicio: "L'ésser humà realitzat que ha assolit la unió amb el Dao. A diferència del savi confucià (que encarna la virtut moral i el ritual), el Savi taoista actua per la no-acció, no acumula coneixement discursiu i es manté en la humilitat. Apareix al llarg de tot el text com a model de conducta: no competeix (cap. 8), no s'exhibeix (cap. 22), abraça la unitat (cap. 22) i governa sense que el poble se n'adoni (cap. 17). El Savi taoista és l'antítesi del governant autoritari."

- id: wan-wu
  xinès: 萬物
  pinyin: Wàn Wù
  traduccio: les deu mil coses
  definicio: "La totalitat dels éssers i fenòmens del món manifest. L'expressió 'deu mil' (萬) no és literal sinó que indica una multitud innombrable, l'equivalent xinès de 'totes les coses'. Les deu mil coses neixen del Dao (cap. 1), són nodrides pel De (cap. 51) i retornen a l'arrel primordial (cap. 16). El Dao engendra l'U, l'U engendra el Dos, el Dos engendra el Tres, i el Tres engendra les deu mil coses (cap. 42)."

- id: tian
  xinès: 天
  pinyin: Tiān
  traduccio: el Cel
  definicio: "El Cel com a principi còsmic regulador, no pas com a déu personal. En el pensament xinès antic, Tiān designava tant el cel físic com l'ordre natural i moral de l'univers. En el Tao Te King, el Cel és subordinat al Dao: 'L'home segueix la Terra, la Terra segueix el Cel, el Cel segueix el Dao, el Dao segueix la seva pròpia naturalesa' (cap. 25). El Cel i la Terra són imparcials: tracten les deu mil coses com gossos de palla (cap. 5). La xarxa del Cel (天網) és àmplia i no deixa escapar res (cap. 73)."

- id: yin
  xinès: 陰
  pinyin: Yīn
  traduccio: el Yin
  definicio: "El principi femení, receptiu, fosc, fred i passiu de la cosmologia xinesa. Tot i que el binomi Yin-Yang no apareix explícitament com a terme tècnic en el Tao Te King (a diferència del Yijing), la seva dinàmica impregna tot el text. El Tao Te King privilegia sistemàticament les qualitats associades al Yin: la foscor, la quietud, la humilitat, la feminitat, la vall, l'aigua. Les deu mil coses porten el Yin a l'esquena i abracen el Yang (cap. 42)."

- id: yang
  xinès: 陽
  pinyin: Yáng
  traduccio: el Yang
  definicio: "El principi masculí, actiu, lluminós, calent i expansiu. Complementari i inseparable del Yin, junts formen la polaritat fonamental de l'existència. El Tao Te King, sense negar el Yang, adverteix contra l'excés d'activitat, de força i de lluminositat: allò que és dur i rígid pertany a la mort, allò que és tou i flexible pertany a la vida (cap. 76). La interacció harmònica de Yin i Yang, mediada per l'alè vital (氣), constitueix la dinàmica de tota transformació."

- id: pu
  xinès: 樸
  pinyin: Pǔ
  traduccio: la fusta sense treballar
  definicio: "La simplicitat primordial, l'estat natural anterior a tota elaboració cultural. El caràcter 樸 designa literalment un tronc no tallat, la fusta en brut, sense polir ni donar-li forma. Metàfora central del Tao Te King per a l'estat originari de les coses abans que la civilització les 'treballi' amb noms, categories i convencions socials. Quan la fusta sense treballar es talla, se'n fan estris (cap. 28): l'aparició dels noms i les institucions fragmenta la unitat primordial. El savi abraça la simplicitat (cap. 19)."

- id: gu
  xinès: 谷
  pinyin: Gǔ
  traduccio: la Vall
  definicio: "Símbol de la receptivitat, la buidor fecunda i la humilitat. La vall és baixa, oberta i rep totes les aigües: per això és imatge del Dao, que roman buit i per això és inexhaurible. L'esperit de la vall (谷神) no mor mai; és l'anomenada femella misteriosa (cap. 6). Conèixer el mascle però mantenir la posició de la femella és ser la vall del món (cap. 28). La vall encarna el principi taoista segons el qual allò que s'abaixa i es buida és el que més rep i perdura."

- id: xuan
  xinès: 玄
  pinyin: Xuán
  traduccio: el Fosc / el Misteriós
  definicio: "La foscor profunda, el misteri insondable. El caràcter 玄 designa un negre amb reflex vermellós, la foscor dels abismes. En el Tao Te King, qualifica allò que escapa a la percepció i a la comprensió ordinària. La porta del Fosc i del Misteriós (玄之又玄) és l'entrada a totes les meravelles (cap. 1). El terme dóna nom a la tradició del 'Coneixement fosc' (玄學, Xuanxue), corrent filosòfic dels segles III-IV que reinterpretà el Tao Te King, el Zhuangzi i el Yijing."

- id: qi
  xinès: 氣
  pinyin: Qì
  traduccio: l'alè vital
  definicio: "L'energia, el buf vital o l'alè que anima tota l'existència. Tot i que el terme no ocupa en el Tao Te King la posició central que tindrà en la medicina i la cosmologia xineses posteriors, hi apareix en contextos clau: les deu mil coses porten el Yin i abracen el Yang, i l'alè vital (沖氣) en fa l'harmonia (cap. 42). El Qi és el substrat energètic que permet la interacció entre Yin i Yang, el medium a través del qual el Dao es manifesta en les deu mil coses."

- id: xuan-de
  xinès: 玄德
  pinyin: Xuán Dé
  traduccio: la Virtut misteriosa
  definicio: "La Virtut fosca o profunda, síntesi dels conceptes de Xuan i De. Designa l'eficàcia silenciosa del Dao que actua sense posseir, crea sense reclamar i guia sense dominar. Apareix en moments crucials del text: 'Engendrar-les i no posseir-les, actuar i no dependre'n, fer-les créixer i no dominar-les: això s'anomena la Virtut misteriosa' (cap. 10, reiterat als caps. 51 i 65). En els manuscrits de Mawangdui, les variants de 玄德 confirmen la seva importància estructural en el pensament de Laozi."

- id: tian-xia
  xinès: 天下
  pinyin: Tiān Xià
  traduccio: Sota el Cel / el món
  definicio: "Literalment 'allò que és sota el cel', designa el món humà, l'ecumene, el conjunt dels territoris habitats. En el context polític del Tao Te King, Tiān Xià és equivalent a 'l'imperi' o 'el món governat'. El savi aspira a ordenar Sota el Cel sense intervenir-hi: 'Qui vol conquerir Sota el Cel i actuar-hi, veig que no ho aconseguirà' (cap. 29). L'ideal polític taoista és un món on el governant és gairebé invisible i el poble viu en pau espontània (cap. 17)."

- id: zi-ran
  xinès: 自然
  pinyin: Zì Rán
  traduccio: l'espontaneïtat / el que és per si mateix
  definicio: "Literalment 'per si mateix així', designa la naturalitat, l'espontaneïtat, allò que és tal com és sense intervenció externa. No és equivalent exacte del concepte occidental de 'natura'. El Dao segueix la seva pròpia naturalesa (道法自然, cap. 25): no hi ha res per sobre del Dao que el determini, el Dao simplement és el que és. Zìrán és el fonament últim de la cadena ontològica home-terra-cel-Dao. En la tradició filosòfica posterior, Guo Xiang (s. IV) farà de Zìrán el principi absolut, substituint el Dao com a fonament."
