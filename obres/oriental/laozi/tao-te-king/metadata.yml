  descripcio: 'El Tao Te King (道德經, Dào Dé Jīng) és el text fundacional del taoisme,
    atribuït al savi Laozi. Dividit en 81 capítols breus, l''obra explora els conceptes
    del Tao (道, el Camí), el Te (德, la Virtut) i el Wu Wei (無為, la no-acció). És un
    dels textos filosòfics més traduïts i influents de la història de la humanitat,
    amb una profunditat que abasta la metafísica, l''ètica, la política i l''estètica.

    '
