context_historic: 'El Tao Te King és una obra fonamental de la filosofia xinesa, atribuïda
  tradicionalment a Laozi (老子, «el Vell Mestre»), un contemporani suposat de Confuci
  al s. VI aC. La recerca moderna suggereix que el text va ser compilat entre els
  segles IV i III aC. L''obra es divideix en dues parts: el Dao Jing (道經, capítols
  1-37), que tracta del Tao com a principi còsmic, i el De Jing (德經, capítols 38-81),
  que tracta de la virtut i la seva aplicació. El Tao Te King ha exercit una influència
  immensa en la filosofia, la religió, l''art i la cultura xineses, i ha esdevingut
  un dels textos més traduïts del món després de la Bíblia.

  '
