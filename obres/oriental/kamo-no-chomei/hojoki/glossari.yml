termes:
  - terme: Hōjōki
    original: 方丈記
    transliteracio: Hōjōki
    traduccio: "Apunts des d'una cabana de deu peus quadrats"
    nota: "Títol de l'obra; hōjō (方丈) significa 'deu peus quadrats', ki (記) significa 'apunts' o 'relat'"

  - terme: cho
    original: 町
    transliteracio: chō
    traduccio: "unitat de distància (aprox. 109 metres)"
    nota: "Mesura de longitud japonesa tradicional"

  - terme: Ōjōyōshū
    original: 往生要集
    transliteracio: Ōjōyōshū
    traduccio: "Compendi essencial per al renaixement [a la Terra Pura]"
    nota: "Obra budista de Genshin (985), influent en el budisme de la Terra Pura"

  - terme: koto
    original: 琴
    transliteracio: koto
    traduccio: "cítara japonesa de tretze cordes"
    nota: "Instrument de corda polsada tradicional"

  - terme: biwa
    original: 琵琶
    transliteracio: biwa
    traduccio: "llaüt japonès de coll curt"
    nota: "Instrument de corda associat als monjos itinerants (biwa hōshi)"

  - terme: Fugen
    original: 普賢
    transliteracio: Fugen
    traduccio: "Bodhisattva Samantabhadra"
    nota: "Bodhisattva de la pràctica i la meditació, sovint representat sobre un elefant blanc"

  - terme: Angen
    original: 安元
    transliteracio: Angen
    traduccio: "era Angen (1175-1177)"
    nota: "Període del regnat de l'emperador Takakura"

  - terme: Jisho
    original: 治承
    transliteracio: Jishō
    traduccio: "era Jishō (1177-1181)"
    nota: "Període marcat per guerres civils i desastres naturals"

  - terme: Kenreki
    original: 建暦
    transliteracio: Kenryaku
    traduccio: "era Kenryaku (1211-1213)"
    nota: "Període en què Chōmei va completar el Hōjōki"

  - terme: Shuribandoku
    original: 周利槃特
    transliteracio: Shūribandoku
    traduccio: "Cūḍapanthaka (deixeble del Buddha)"
    nota: "Deixeble del Buddha considerat el menys intel·ligent, que va assolir la il·luminació per la seva perseverança"

  - terme: Jyomyokoji
    original: 浄名居士
    transliteracio: Jōmyō Koji
    traduccio: "el laic Vimalakīrti"
    nota: "Personatge budista cèlebre per la seva saviesa malgrat viure com a laic"

  - terme: Toyama
    original: 外山
    transliteracio: Toyama
    traduccio: "turons exteriors"
    nota: "Nom del lloc on Chōmei va construir la seva última cabana, a Hino (actual prefectura de Kyoto)"

  - terme: Ren-in
    original: 蓮胤
    transliteracio: Ren-in
    traduccio: "nom monàstic de Kamo no Chōmei"
    nota: "Nom budista que va adoptar en fer-se monjo"
