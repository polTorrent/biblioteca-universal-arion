termes:
  - original: "fröken"
    transliteracio: "fröken"
    traduccio: "senyoreta"
    nota: >
      Títol suec per a una dona jove soltera de classe alta.
      Equivalent a l'anglès 'Miss' o el castellà 'señorita'.
      Es manté «senyoreta» com a tractament formal.

  - original: "betjänt"
    transliteracio: "betjänt"
    traduccio: "criat"
    nota: >
      Criat personal del comte. El terme suec implica un rang
      domèstic superior al d'un simple mosso.

  - original: "kokerska"
    transliteracio: "kokerska"
    traduccio: "cuinera"
    nota: >
      Cuinera de la casa senyorial. Cristina ocupa un lloc
      intermedi a la jerarquia domèstica.

  - original: "greven"
    transliteracio: "greven"
    traduccio: "el comte"
    nota: >
      El pare de Júlia. No apareix mai en escena però la seva
      presència simbòlica (botes, campana, telèfon) domina l'obra.

  - original: "midsommarnatten"
    transliteracio: "midsommarnatten"
    traduccio: "la nit de Sant Joan"
    nota: >
      La festa de mitjan estiu escandinava (23-24 de juny).
      Adaptat com «Sant Joan» per la proximitat cultural catalana.

  - original: "ni"
    transliteracio: "ni"
    traduccio: "vós"
    nota: >
      Pronòm de tractament formal suec. A la traducció es fa servir
      «vós» per marcar la distància social entre Júlia i Joan.
      El pas de «ni» a «du» (vós → tu) marca un punt d'inflexió
      dramàtic en la relació.

  - original: "du"
    transliteracio: "du"
    traduccio: "tu"
    nota: >
      Pronòm de tractament informal suec. El canvi de «ni» a «du»
      entre Júlia i Joan reflecteix la caiguda de barreres socials
      i la intimitat transgressora.

  - original: "livré"
    transliteracio: "livré"
    traduccio: "lliurea"
    nota: >
      Uniforme formal del criat. Símbol de servitud que Joan es
      treu durant l'obra, en un acte de llibertat momentània.

  - original: "stallgården"
    transliteracio: "stallgården"
    traduccio: "el pati de les cavallerisses"
    nota: >
      Lloc on Júlia va humiliar el seu promès fent-lo saltar
      el fuet com un gos. Escena clau per entendre el personatge.

  - original: "ridspöet"
    transliteracio: "ridspöet"
    traduccio: "el fuet"
    nota: >
      Fuet d'equitació. Instrument de poder i humiliació que
      Júlia fa servir per dominar el seu promès.

  - original: "Diana"
    transliteracio: "Diana"
    traduccio: "Diana"
    nota: >
      La gossa de la senyoreta Júlia, que ha quedat prenyada
      del gos de la porteria. Paral·lelisme amb la «caiguda»
      de la seva mestressa.

  - original: "Serine"
    transliteracio: "Serine"
    traduccio: "Serine"
    nota: >
      La cadernera de Júlia, sacrificada per Joan. Símbol de la
      innocència destruïda i preludi del final tràgic.

  - original: "scottish / schottisch"
    transliteracio: "escotís"
    traduccio: "escotís"
    nota: >
      Ball de parella d'origen escocès, popular a Escandinàvia
      al segle XIX.

  - original: "bonjour"
    transliteracio: "bonjour"
    traduccio: "jaqueta"
    nota: >
      Jaqueta curta de vestir. Joan se la posa per substituir
      la lliurea, en un acte de transformació social.

  - original: "sommelier"
    transliteracio: "sommelier"
    traduccio: "sommelier"
    nota: >
      Terme mantingut del francès. Joan va treballar com a
      sommelier a Lucerna, experiència que alimenta els seus
      somnis d'ascens social.

  - original: "mesallians"
    transliteracio: "mésalliance"
    traduccio: "mésalliance"
    nota: >
      Matrimoni desigual entre classes socials. Joan inverteix
      el terme aplicant-lo a si mateix, mostrant que la transgres-
      sió social funciona en ambdues direccions.

  - original: "kronofogde"
    transliteracio: "kronofogde"
    traduccio: "executor"
    nota: >
      Funcionari judicial suec. El promès de Júlia, a qui ella
      va intentar sotmetre com a esclau.

  - original: "statkarl"
    transliteracio: "statkarl"
    traduccio: "jornaler"
    nota: >
      Treballador agrícola lligat a una propietat senyorial.
      El pare de Joan era statkarl de l'advocat fiscal, cosa
      que situa la família al nivell més baix de la jerarquia rural.

  - original: "grönsiska"
    transliteracio: "grönsiska"
    traduccio: "cadernera"
    nota: >
      En l'original, «grönsiska» és un llucareta (Chloris chloris),
      però el text usa «Serine» com a nom propi de l'ocell.
      Adaptat com «cadernera» per ser l'ocell cantaire de referència
      en la tradició catalana.

  - original: "trollet"
    transliteracio: "trollet"
    traduccio: "el troll"
    nota: >
      Criatura del folklore escandinau. Joan diu «aleshores el troll
      rebenta» referint-se a la creença que els trolls no resisteixen
      la llum del sol. Metàfora de la revelació matinal.

  - original: "adelskalendern"
    transliteracio: "adelskalendern"
    traduccio: "calendari de la noblesa"
    nota: >
      Registre genealògic de la noblesa sueca. Joan l'ha consultat
      per conèixer els avantpassats de Júlia, un moliner amb la
      dona del qual el rei va dormir.

  - original: "havrelåren"
    transliteracio: "havrelåren"
    traduccio: "la caixa de la civada"
    nota: >
      Recipient per guardar civada a l'estable. Joan explica que
      s'hi va tancar per morir, fascinat per la seva suavitat.
      Escena clau que després ell mateix desmunta com a mentida.
