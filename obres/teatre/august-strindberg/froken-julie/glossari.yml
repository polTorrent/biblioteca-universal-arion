obra: Fröken Julie
autor: August Strindberg
any: 1888
llengua_original: suec
termes:
  - original: Fröken Julie
    traduccio: Senyoreta Júlia
    notes: Títol de l'obra; tractament aristocràtic femení en suec.
  - original: greve
    traduccio: comte
    notes: Pare de Júlia, figura absent però omnipresent.
  - original: Jean
    traduccio: Joan
    notes: Criat del comte; nom afrancesat per aspiració social.
  - original: Kristin
    traduccio: Cristina
    notes: Cuinera, promesa de Jean.
  - original: midsommar
    traduccio: Sant Joan / solstici d'estiu
    notes: Festivitat nòrdica durant la qual transcorre l'acció.
  - original: herrskap
    traduccio: senyors / amos
    notes: Terme col·lectiu per a la classe dominant.
  - original: pliktkänsla
    traduccio: sentit del deure
    notes: Concepte clau en la moral dels personatges.
  - original: ståndscirkulation
    traduccio: circulació d'estaments
    notes: Concepte sociològic del pròleg de Strindberg.
  - original: naturalism
    traduccio: naturalisme
    notes: Corrent literari al qual s'adscriu l'obra.
  - original: rakkniv
    traduccio: navalla d'afaitar
    notes: Objecte simbòlic del desenllaç tràgic.
