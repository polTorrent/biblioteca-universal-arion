  descripcio: "Tragèdia grega sobre Medea, princesa de la Còlquida, que es venja de Jàson després que aquest l'abandoni per casar-se amb la filla del rei de Corint. Una de les obres més poderoses del teatre antic sobre la passió, la traïció i la venjança."
