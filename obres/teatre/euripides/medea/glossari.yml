termes:
  - original: "Μήδεια"
    transliteracio: "Mēdeia"
    traduccio: "Medea"
    nota: "Princesa de la Còlquida, neta del déu Sol (Hèlios). Maga poderosa que ajudà Jàson a obtenir el velló d'or."

  - original: "Ἰάσων"
    transliteracio: "Iasōn"
    traduccio: "Jàson"
    nota: "Heroi tessali, capità dels Argonautes. Espòs de Medea que l'abandona per casar-se amb la filla de Creont."

  - original: "Κρέων"
    transliteracio: "Kreōn"
    traduccio: "Creont"
    nota: "Rei de Corint que decreta l'exili de Medea."

  - original: "Τροφός"
    transliteracio: "Trophos"
    traduccio: "Dida"
    nota: "La dida o nodrissa de Medea, que obre la tragèdia amb el pròleg."

  - original: "Παιδαγωγός"
    transliteracio: "Paidagōgos"
    traduccio: "Pedagog"
    nota: "Tutor i acompanyant dels fills de Medea i Jàson."

  - original: "Χορός"
    transliteracio: "Khoros"
    traduccio: "Cor"
    nota: "Cor de dones coríntias que comenten l'acció i aconsellen Medea."

  - original: "Αἰγεύς"
    transliteracio: "Aigeus"
    traduccio: "Egeu"
    nota: "Rei d'Atenes que ofereix refugi a Medea."

  - original: "Ἄγγελος"
    transliteracio: "Angelos"
    traduccio: "Missatger"
    nota: "Personatge que relata la mort de Creüsa i Creont."

  - original: "Ἀργώ"
    transliteracio: "Argō"
    traduccio: "Argo"
    nota: "La nau dels Argonautes que navegà fins a la Còlquida."

  - original: "Κόλχοι"
    transliteracio: "Kolkhoi"
    traduccio: "Còlquida"
    nota: "Regió al sud del Caucas, pàtria de Medea."

  - original: "Συμπληγάδες"
    transliteracio: "Symplēgades"
    traduccio: "Simplègades"
    nota: "Roques mòbils a l'entrada del Pont Euxí que xocaven entre si."

  - original: "δέρας"
    transliteracio: "deras"
    traduccio: "velló"
    nota: "El velló d'or (πάγχρυσον δέρας), objectiu de l'expedició dels Argonautes."

  - original: "ὅρκος"
    transliteracio: "horkos"
    traduccio: "jurament"
    nota: "Els juraments sagrats que Jàson va fer a Medea i que ara viola."

  - original: "δεξιά"
    transliteracio: "dexia"
    traduccio: "mà dreta"
    nota: "Gest ritual d'encaixada de mans que segellava promeses solemnes."

  - original: "φάρμακον"
    transliteracio: "pharmakon"
    traduccio: "verí / poció"
    nota: "Substància màgica, pot ser remei o verí. Medea és experta en phàrmaka."

  - original: "λέχος"
    transliteracio: "lekhos"
    traduccio: "llit nupcial"
    nota: "Símbol central del matrimoni traït; Medea lamenta la pèrdua del llit compartit."

  - original: "θυμός"
    transliteracio: "thymos"
    traduccio: "ànima / passió"
    nota: "Força emocional interior, seu de la ira i les passions."

  - original: "ξένος"
    transliteracio: "xenos"
    traduccio: "estranger / hoste"
    nota: "Concepte que inclou tant l'estranger com la relació d'hospitalitat sagrada."

  - original: "ἄτη"
    transliteracio: "atē"
    traduccio: "perdició / obcecació"
    nota: "Encegament fatal enviat pels déus o causat per la hýbris."

  - original: "Ἥλιος"
    transliteracio: "Hēlios"
    traduccio: "Hèlios / Sol"
    nota: "Déu del Sol, avi de Medea. Li proporciona el carro alat per fugir al final."

  - original: "Πελίας"
    transliteracio: "Pelias"
    traduccio: "Pèlias"
    nota: "Rei d'Iolcos, oncle de Jàson. Medea va enganyar les seves filles perquè el matessin."

  - original: "Κόρινθος"
    transliteracio: "Korinthos"
    traduccio: "Corint"
    nota: "Ciutat on transcorre l'acció de la tragèdia."
