termes:
  - original: "et dukkehjem"
    transliteracio: "et dukkehjem"
    traduccio: "una casa de nines"
    notes: |
      Títol de l'obra. Literalment «una llar de nines» o «una casa de nines».
      Metàfora central: Nora és tractada com una nina dins una casa-joguina,
      primer pel pare i després pel marit. El títol condensa la denúncia d'Ibsen
      sobre el paper subordinat de la dona en el matrimoni burgès del segle XIX.

  - original: "lerkefugl"
    transliteracio: "lerkefugl"
    traduccio: "alosa"
    notes: |
      Ocell que Helmer utilitza com a sobrenom afectuós per a Nora («lerkefuglen»,
      «l'alosa»). Forma part d'un patró de noms d'animals (alosa, esquirol,
      ocell malgastador) que revela com Helmer infantilitza i animalitza Nora,
      reduint-la a una criatura decorativa i inofensiva.

  - original: "ekorn"
    transliteracio: "ekorn"
    traduccio: "esquirol"
    notes: |
      Segon sobrenom animal que Helmer aplica a Nora. L'esquirol connota activitat
      frenètica i joc, reforçant la imatge de Nora com a ésser infantil i graciós
      que no participa del món seriós dels homes.

  - original: "spillefugl"
    transliteracio: "spillefugl"
    traduccio: "ocell malgastador"
    notes: |
      Literalment «ocell que malgasta». Helmer l'usa per retreure a Nora
      la seva suposada tendència a gastar diners. Irònicament, Nora ha estat
      estalviant en secret per pagar un deute que va salvar la vida de Helmer.

  - original: "sanglerke"
    transliteracio: "sanglerke"
    traduccio: "alosa cantaire"
    notes: |
      Variant del sobrenom «lerkefugl». Helmer demana que «la petita alosa
      cantaire no abaixi les ales», consolidant el llenguatge paternalista
      i possessiu amb què es dirigeix a Nora.

  - original: "makroner"
    transliteracio: "makroner"
    traduccio: "macarons"
    notes: |
      Dolços que Nora menja d'amagat malgrat la prohibició de Helmer.
      Símbol de la petita transgressió quotidiana i de la doble vida de Nora:
      la façana d'obediència i la realitat d'autonomia secreta.

  - original: "gjeld"
    transliteracio: "gjeld"
    traduccio: "deute"
    notes: |
      El deute secret de Nora és el motor de l'acció dramàtica. Va demanar
      diners prestats —falsificant la signatura del pare— per pagar el viatge
      a Itàlia que va salvar la vida de Helmer. Helmer proclama que «cap deute,
      mai préstecs» és el fonament d'una llar honesta.

  - original: "veksel"
    transliteracio: "veksel"
    traduccio: "lletra de canvi, pagaré"
    notes: |
      Document de deute que Nora va signar amb Krogstad. La falsificació
      de la signatura del pare en aquest document és el «crim» que Krogstad
      utilitza per xantagejar Nora i que desencadena la crisi final.

  - original: "tarantella"
    transliteracio: "tarantella"
    traduccio: "tarantel·la"
    notes: |
      Dansa italiana frenètica que Nora assaja per al ball de disfresses.
      En el context de l'obra, la tarantel·la simbolitza el desesperat intent
      de Nora de distreure Helmer i guanyar temps mentre la seva vida secreta
      s'ensorra. La dansa té ressonàncies de possessió i alliberament.

  - original: "det vidunderlige"
    transliteracio: "det vidunderlige"
    traduccio: "el meravellós, el miracle"
    notes: |
      Expressió recurrent que Nora utilitza per referir-se al que esperava
      que passés: que Helmer, en descobrir la veritat, assumís tota la culpa
      per amor. «El meravellós» no arriba mai, i la seva absència precipita
      la decisió final de Nora d'abandonar la llar.

  - original: "advokat"
    transliteracio: "advokat"
    traduccio: "advocat"
    notes: |
      Professió de Torvald Helmer abans de ser nomenat director del banc.
      La seva formació jurídica el fa especialment inflexible davant la
      «il·legalitat» de Nora, anteposant la lletra de la llei al vincle afectiu.

  - original: "Aksjebanken"
    transliteracio: "aksjebanken"
    traduccio: "el Banc d'Accions"
    notes: |
      Institució financera de la qual Helmer és nomenat director.
      El nou càrrec representa l'ascens social i econòmic de la família,
      i és el catalitzador que posa en marxa els esdeveniments de l'obra:
      Krogstad, empleat del banc, tem ser acomiadat per Helmer.

  - original: "sagfører"
    transliteracio: "sagfører"
    traduccio: "procurador"
    notes: |
      Càrrec legal de Krogstad. Un sagfører és un advocat de rang inferior,
      cosa que marca la diferència social entre Krogstad i Helmer i explica
      en part la vulnerabilitat de Krogstad davant el poder de Helmer.

  - original: "barnepige"
    transliteracio: "barnepige"
    traduccio: "mainadera"
    notes: |
      Anne-Marie, la mainadera dels fills dels Helmer, que anteriorment va
      criar Nora mateixa. El fet que Anne-Marie hagués abandonat la seva
      pròpia filla per treballar prefigura el dilema final de Nora
      sobre si deixar els seus fills.

  - original: "brevkasse"
    transliteracio: "brevkasse"
    traduccio: "bústia"
    notes: |
      La bústia tancada amb clau de Helmer és un objecte escènic crucial.
      Conté la carta de Krogstad que revela el secret de Nora. La clau
      de la bústia —que només Helmer posseeix— simbolitza el seu control
      sobre la informació i, per extensió, sobre la vida de Nora.
