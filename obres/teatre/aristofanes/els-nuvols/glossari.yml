# Glossari — Els núvols (Νεφέλαι) d'Aristòfanes
# Termes clau grec-català

termes:
  - original: "Νεφέλαι"
    transliteracio: "Nephélai"
    traduccio: "Els núvols"
    nota: "Títol de l'obra; el cor de núvols representa les divinitats dels sofistes"

  - original: "Στρεψιάδης"
    transliteracio: "Strepsiádēs"
    traduccio: "Estrepsiades"
    nota: "Protagonista; nom derivat de στρέφω (girar, tergiversar), al·lusiu a les seves trampes"

  - original: "Φειδιππίδης"
    transliteracio: "Pheidippídēs"
    traduccio: "Fidípides"
    nota: "Fill d'Estrepsiades; nom compost de φείδομαι (estalviar) i ἵππος (cavall), sàtira de l'aristocràcia eqüestre"

  - original: "Σωκράτης"
    transliteracio: "Sōkrátēs"
    traduccio: "Sòcrates"
    nota: "Filòsof atenès, caricaturitzat com a sofista i investigador de fenòmens naturals"

  - original: "φροντιστήριον"
    transliteracio: "phrontistḗrion"
    traduccio: "Pensatori"
    nota: "L'escola de Sòcrates; literalment 'lloc per pensar', paròdia dels cercles intel·lectuals"

  - original: "δίκαιος λόγος"
    transliteracio: "díkaios lógos"
    traduccio: "Argument Just"
    nota: "Personificació de la retòrica tradicional i la moral antiga"

  - original: "ἄδικος λόγος"
    transliteracio: "ádikos lógos"
    traduccio: "Argument Injust"
    nota: "Personificació de la nova retòrica sofística, capaç de fer guanyar la causa feble"

  - original: "Χαιρεφῶν"
    transliteracio: "Chairephṓn"
    traduccio: "Querefont"
    nota: "Deixeble fidel de Sòcrates, conegut per la seva pal·lidesa"

  - original: "χρέα"
    transliteracio: "chréa"
    traduccio: "deutes"
    nota: "Tema central de l'obra; els deutes d'Estrepsiades per la passió hípica del fill"

  - original: "τόκοι"
    transliteracio: "tókoi"
    traduccio: "interessos"
    nota: "Interessos dels deutes; τόκος també significa 'part', doble sentit còmic"

  - original: "μνᾶ"
    transliteracio: "mnâ"
    traduccio: "mina"
    nota: "Unitat monetària grega equivalent a 100 dracmes"

  - original: "ἥττων λόγος"
    transliteracio: "hḗttōn lógos"
    traduccio: "argument feble"
    nota: "L'argument més dèbil que la retòrica sofística pot fer triomfar; acusació central contra Sòcrates"

  - original: "κρείττων λόγος"
    transliteracio: "kreíttōn lógos"
    traduccio: "argument fort"
    nota: "L'argument naturalment superior, associat a la tradició i la justícia"

  - original: "Πασίας"
    transliteracio: "Pasías"
    traduccio: "Pàsias"
    nota: "Creditor d'Estrepsiades"

  - original: "Ἀμυνίας"
    transliteracio: "Amynías"
    traduccio: "Amínias"
    nota: "Segon creditor d'Estrepsiades"

  - original: "Δῖνος"
    transliteracio: "Dînos"
    traduccio: "Remolí / Torb"
    nota: "Força còsmica que, segons el Sòcrates aristofànic, ha substituït Zeus; joc de paraules amb δῖνος (recipient)"

  - original: "ἀναπνοή"
    transliteracio: "anapnoḗ"
    traduccio: "respiració"
    nota: "Concepte filosòfic associat a l'aire com a principi diví al Pensatori"

  - original: "μέτρα"
    transliteracio: "métra"
    traduccio: "metres"
    nota: "Metres poètics; Sòcrates ensenya mètrica com a part de l'educació sofística"

  - original: "γνώμη"
    transliteracio: "gnṓmē"
    traduccio: "intel·ligència / judici"
    nota: "Capacitat de raonament que Estrepsiades espera adquirir al Pensatori"

  - original: "ψυχή"
    transliteracio: "psychḗ"
    traduccio: "ànima"
    nota: "Concepte filosòfic central; els deixebles del Pensatori tenen l'ànima separada del cos"
