  descripcio: >
    Comèdia clàssica d'Aristòfanes que satiritza Sòcrates i els sofistes
    atenesos. Estrepsiades, un pagès endeutat, envia el seu fill Fidípides al
    'Pensatori' de Sòcrates per aprendre l'art de la retòrica i escapar dels
    creditors.
