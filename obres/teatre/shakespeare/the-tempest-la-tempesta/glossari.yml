termes:
  - terme_original: "Prospero"
    transliteracio: ""
    traduccio: "Pròsper"
    categoria: "nom propi"
    nota: "Catalanització del nom llatí Prosperus. Duc legítim de Milà, mag."

  - terme_original: "Ferdinand"
    transliteracio: ""
    traduccio: "Ferran"
    categoria: "nom propi"
    nota: "Forma catalana tradicional del nom germànic Ferdinand."

  - terme_original: "Sebastian"
    transliteracio: ""
    traduccio: "Sebastià"
    categoria: "nom propi"
    nota: "Germà del rei Alonso."

  - terme_original: "Antonio"
    transliteracio: ""
    traduccio: "Antoni"
    categoria: "nom propi"
    nota: "Germà usurpador de Pròsper."

  - terme_original: "Trinculo"
    transliteracio: ""
    traduccio: "Trínculo"
    categoria: "nom propi"
    nota: "Bufó del rei. Nom mantingut amb accent català."

  - terme_original: "Stephano"
    transliteracio: ""
    traduccio: "Stèfano"
    categoria: "nom propi"
    nota: "Majordom borratxo. Forma amb accent greu per reflectir la pronúncia italiana."

  - terme_original: "Boatswain"
    transliteracio: ""
    traduccio: "Contramaestre"
    categoria: "nàutica"
    nota: "Oficial de coberta responsable de la maniobra i la tripulació."

  - terme_original: "Yare / Yarely"
    transliteracio: ""
    traduccio: "De pressa / Llestament"
    categoria: "nàutica"
    nota: "Terme mariner anglès que significa àgil, ràpid, preparat per navegar."

  - terme_original: "Topmast"
    transliteracio: ""
    traduccio: "Arbre de gàbia"
    categoria: "nàutica"
    nota: "Pal superior del vaixell, per sobre del pal mestre."

  - terme_original: "Main-course"
    transliteracio: ""
    traduccio: "Vela mestra"
    categoria: "nàutica"
    nota: "La vela principal del vaixell."

  - terme_original: "Bermoothes"
    transliteracio: ""
    traduccio: "Bermudes"
    categoria: "topònim"
    nota: "Referència a les illes Bermudes, lligades als relats de naufragis que van inspirar l'obra."

  - terme_original: "Sycorax"
    transliteracio: ""
    traduccio: "Sícorax"
    categoria: "nom propi"
    nota: "Bruixa mare de Caliban, d'Alger. El nom pot derivar del grec sys (truja) + korax (corb)."

  - terme_original: "Setebos"
    transliteracio: ""
    traduccio: "Setebos"
    categoria: "mitologia"
    nota: "Déu patagònic esmentat a la relació de Pigafetta del viatge de Magallanes (1520)."

  - terme_original: "Harpy"
    transliteracio: ""
    traduccio: "Harpia"
    categoria: "mitologia"
    nota: "Criatura mitològica amb cos d'ocell i cara de dona. Ariel pren aquesta forma a III.iii."

  - terme_original: "Masque"
    transliteracio: ""
    traduccio: "Mascarada / Espectacle"
    categoria: "teatre"
    nota: "Forma dramàtica cortesana amb música, dansa i al·legoria. L'espectacle de IV.i amb Iris, Ceres i Juno."

  - terme_original: "Naiad"
    transliteracio: ""
    traduccio: "Nàiade"
    categoria: "mitologia"
    nota: "Nimfa de les aigües dolces en la mitologia grega."

  - terme_original: "Dis"
    transliteracio: ""
    traduccio: "Dis"
    categoria: "mitologia"
    nota: "Plutó, déu dels inferns. Raptor de Prosèrpina, filla de Ceres."

  - terme_original: "Revels"
    transliteracio: ""
    traduccio: "Festes / Celebracions"
    categoria: "teatre"
    nota: "En el context del famós monòleg 'Our revels now are ended' (IV.i), referència a l'espectacle i, per extensió, a la vida mateixa."

  - terme_original: "Sea-change"
    transliteracio: ""
    traduccio: "Canvi marí / Transformació marina"
    categoria: "neologisme shakespearià"
    nota: "Encunyat per Shakespeare a la cançó d'Ariel (I.ii): 'doth suffer a sea-change / Into something rich and strange'. Avui significa transformació radical."

  - terme_original: "Brave new world"
    transliteracio: ""
    traduccio: "Bell món nou"
    categoria: "expressió"
    nota: "Exclamació de Miranda (V.i). Aldous Huxley la va fer servir com a títol de la seva distopia (1932)."

  - terme_original: "Gaberdine"
    transliteracio: ""
    traduccio: "Gavardina / Capa"
    categoria: "vestimenta"
    nota: "Peça de roba ample, com un mantell. Trínculo s'amaga sota la de Caliban."

  - terme_original: "Moon-calf"
    transliteracio: ""
    traduccio: "Fill de lluna"
    categoria: "insult"
    nota: "Criatura deforme suposadament engendrada per influència lunar. Aplicat a Caliban."
