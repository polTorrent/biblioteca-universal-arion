  descripcio: >-
    La Tempesta és considerada l'última obra completa de Shakespeare, escrita
    cap al 1610-1611. Pròsper, duc legítim de Milà, viu exiliat en una illa
    remota amb la seva filla Miranda. Mitjançant la seva màgia, provoca una
    tempesta que porta els seus enemics a l'illa, on orquestra la reconciliació,
    el perdó i la restauració de l'ordre. L'obra explora temes com el poder,
    la colonització, l'art i la naturalesa, la llibertat i el perdó. El famós
    discurs de Pròsper «Our revels now are ended» es llegeix sovint com el
    comiat de Shakespeare del teatre. Proposta rebuda per Quercus al canal
    propostes-traducció.
