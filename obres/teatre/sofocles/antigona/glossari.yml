termes:
  - original: "ἄγραπτα νόμιμα"
    transliteracio: "agrapta nomima"
    traduccio: "lleis no escrites"
    notes: |
      Les lleis divines no escrites que Antígona invoca contra l'edicte de Creont.
      Concepte fonamental del dret natural: lleis universals superiors a les lleis
      positives dels homes, d'origen diví i vigents des de sempre.

  - original: "Ἅιδης"
    transliteracio: "hades"
    traduccio: "Hades"
    notes: |
      Déu de l'inframón i, per extensió, el regne dels morts. En l'Antígona,
      Hades és invocat com l'únic déu que Antígona venera i com l'espòs
      metafòric de la protagonista.

  - original: "ἀναρχία"
    transliteracio: "anarchia"
    traduccio: "anarquia"
    notes: |
      Absència d'ordre i autoritat. Creont la presenta com el pitjor dels mals
      (v. 672), contraposant-la a la peiθarkhia (obediència). Concepte clau
      del seu discurs polític.

  - original: "ἄτη"
    transliteracio: "ate"
    traduccio: "ruïna, ceguesa, desgràcia"
    notes: |
      Terme que designa tant la ceguesa fatal enviada pels déus com les
      conseqüències ruïnoses d'aquesta ceguesa. L'até és el motor tràgic
      que empeny els personatges cap a la destrucció.

  - original: "Βάκχος / Διόνυσος"
    transliteracio: "bakkhos / dionysos"
    traduccio: "Baco / Dionís"
    notes: |
      Déu del vi, l'èxtasi i el teatre, fill de Zeus i Sèmele de Tebes.
      El cinquè estàsim és un himne a Dionís com a déu protector de Tebes.
      Invocat amb molts noms: Iacchos, Bacus, Bromios.

  - original: "δεινός"
    transliteracio: "deinos"
    traduccio: "admirable, terrible, estrany"
    notes: |
      Paraula clau del primer estàsim (Oda a l'Home): πολλὰ τὰ δεινά.
      Té un doble sentit deliberat: l'home és alhora admirable i terrible,
      capaç del bé i del mal. Traduït com «admirable» mantenint l'ambigüitat.

  - original: "Δίκη"
    transliteracio: "dike"
    traduccio: "Justícia"
    notes: |
      Personificació de la justícia divina. Antígona invoca la Dike dels déus
      inferiors contra l'edicte de Creont. Concepte central en el debat entre
      llei divina i llei humana.

  - original: "Ἐρινύες"
    transliteracio: "erinyes"
    traduccio: "Erínies, Fúries"
    notes: |
      Divinitats vengadores que persegueixen els crims de sang i les
      transgressions contra l'ordre diví. Tirèsies adverteix que les Erínies
      aguaiten Creont per les seves accions contra els morts i els vius.

  - original: "Ἔρως"
    transliteracio: "eros"
    traduccio: "Eros, Amor"
    notes: |
      Déu de l'amor i el desig. El tercer estàsim (vv. 781-800) és un himne
      a Eros com a força invencible que altera fins els judicis dels justos
      i que ha provocat la querella entre Hemon i Creont.

  - original: "εὐσέβεια"
    transliteracio: "eusebeia"
    traduccio: "pietat, reverència als déus"
    notes: |
      La pietat religiosa, especialment el respecte als ritus funeraris i als
      déus. Antígona actua per eusebeia, però paradoxalment és acusada de
      dyssebeia (impietat) per Creont.

  - original: "θρῆνος"
    transliteracio: "threnos"
    traduccio: "lament fúnebre"
    notes: |
      Cant de dol ritual. El quart episodi conté el threnos d'Antígona,
      el seu lament davant la mort imminent, un dels moments lírics
      més intensos de la tragèdia grega.

  - original: "κήρυγμα"
    transliteracio: "kerygma"
    traduccio: "edicte, proclama"
    notes: |
      El decret públic de Creont que prohibeix l'enterrament de Polinices.
      L'edicte és el motor de l'acció dramàtica i el punt de conflicte
      entre la llei estatal i la llei divina.

  - original: "νόμος"
    transliteracio: "nomos"
    traduccio: "llei, costum"
    notes: |
      Terme amb un camp semàntic ampli: llei escrita, costum, norma social,
      melodia. En l'Antígona, el conflicte central es planteja entre el nomos
      del govern (edicte de Creont) i els nomima dels déus (lleis no escrites).

  - original: "πάροδος"
    transliteracio: "parodos"
    traduccio: "cant d'entrada del cor"
    notes: |
      Primera intervenció coral, cantada mentre el cor entra a l'orquestra.
      En l'Antígona, el pàrodos celebra la victòria de Tebes sobre l'exèrcit
      d'Argos i la derrota dels set capitans.

  - original: "στάσιμον"
    transliteracio: "stasimon"
    traduccio: "estàsim, cant coral estàtic"
    notes: |
      Cant del cor entre els episodis, executat amb el cor en posició
      estàtica a l'orquestra. L'Antígona conté cinc estàsims, cadascun
      amb un tema diferent (l'home, el destí, l'amor, la mitologia, Dionís).

  - original: "τύραννος"
    transliteracio: "tyrannos"
    traduccio: "tirà, governant"
    notes: |
      En el grec clàssic, tyrannos no tenia necessàriament el sentit pejoratiu
      modern: podia designar simplement un governant que havia accedit al poder
      no per herència directa. Creont és tyrannos legítim per parentiu, però
      la seva conducta el converteix en tirà en el sentit negatiu.

  - original: "ὕβρις"
    transliteracio: "hybris"
    traduccio: "ultrage, desmesura"
    notes: |
      L'excés, l'arrogància davant els déus. Creont acusa Antígona d'hybris,
      però la tragèdia mostra que és ell qui comet hybris en desafiar les
      lleis divines. Concepte central de la tragèdia grega.

  - original: "φρόνησις"
    transliteracio: "phronesis"
    traduccio: "prudència, saviesa pràctica"
    notes: |
      La saviesa pràctica o bon judici. La paraula final del cor
      (τὸ φρονεῖν, «el pensar») identifica la phronesis com la primera
      condició de la felicitat, la lliçó que Creont aprèn massa tard.

  - original: "Ἀχέρων"
    transliteracio: "akheron"
    traduccio: "Aqueront"
    notes: |
      Riu de l'inframón que les ànimes dels morts havien de travessar.
      Antígona diu que es «desposa amb l'Aqueront» (v. 815), una de les
      imatges més punyents de la seva condemna.

  - original: "Περσεφόνη"
    transliteracio: "persefone"
    traduccio: "Persèfone"
    notes: |
      Reina de l'inframón, esposa d'Hades. Antígona la invoca com a
      receptora dels seus morts familiars (v. 894). Divinitat que
      simbolitza el trànsit entre la vida i la mort.
