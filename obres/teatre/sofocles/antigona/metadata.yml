obra:
  titol: Antígona
  titol_original: Ἀντιγόνη
  autor: Sòfocles
  autor_original: Σοφοκλής
  traductor: Biblioteca Arion
  any_original: 441 aC
  any_traduccio: 2026
  llengua_original: grec
  genere: teatre
  descripcio: |
    Tragèdia grega sobre el conflicte entre la llei divina i la llei humana.
    Antígona desafia l'edicte del rei Creont per enterrar el seu germà Polinices,
    desencadenant una espiral de destrucció que arrasa la casa reial de Tebes.
    Una de les obres més influents del teatre occidental.
  font_original: "https://el.wikisource.org/wiki/Ἀντιγόνη"
  domini_public: true
  temes:
    - llei divina vs llei humana
    - dret natural
    - poder i tirania
    - pietat i desobediència
    - família i estat
    - destí i lliure albir
