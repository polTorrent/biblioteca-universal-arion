# Glossari de Primero Sueño - Sor Juana Inés de la Cruz
# Termes clau de l'original castellà i la traducció catalana

termes:
  - original: "Pirámide"
    traduccio: "Piràmide"
    nota: "Símbol neoplatònic de l'ascens de l'ànima cap al coneixement"

  - original: "Sueño"
    traduccio: "Somni"
    nota: "Estat de l'ànima alliberada del cos per accedir al coneixement intel·lectual"

  - original: "Alma"
    traduccio: "Ànima"
    nota: "Principi racional que ascendeix en el somni"

  - original: "Entendimiento"
    traduccio: "Enteniment"
    nota: "Facultat intel·lectual superior segons la tradició escolàstica"

  - original: "Fantasía"
    traduccio: "Fantasia"
    nota: "Facultat imaginativa que opera durant el somni"

  - original: "Nocturna"
    traduccio: "Nocturna"
    nota: "Referent a la nit, marc temporal del poema"

  - original: "Faetón"
    traduccio: "Faetont"
    nota: "Figura mitològica, símbol de l'ambició intel·lectual"

  - original: "Ícaro"
    traduccio: "Ícar"
    nota: "Símbol de la caiguda per excés d'ambició"

  - original: "Aurora"
    traduccio: "Aurora"
    nota: "Final del somni, retorn a la consciència diürna"

  - original: "Nictímene"
    traduccio: "Nictímene"
    nota: "Mussol mitològic, ocell nocturn"

  - original: "Harpócrates"
    traduccio: "Harpòcrates"
    nota: "Déu egipci del silenci"

  - original: "Morfeo"
    traduccio: "Morfeu"
    nota: "Déu dels somnis"

  - original: "Intelectiva"
    traduccio: "Intel·lectiva"
    nota: "Relatiu a l'enteniment pur"

  - original: "Esfera"
    traduccio: "Esfera"
    nota: "Cosmologia ptolemaica, nivells celestes"
