termes:
  - original: "völva"
    traduccio: "sibil·la, profetessa"
    notes: "Dona amb poders profètics i màgics en la tradició nòrdica"

  - original: "Valföðr"
    traduccio: "Pare dels Caiguts"
    notes: "Epítet d'Óðinn com a senyor del Valhalla"

  - original: "Yggdrasill"
    traduccio: "Yggdrasill"
    notes: "Freixe còsmic que sosté els nou mons de la cosmologia nòrdica"

  - original: "Ragnarök"
    transcripcio: "ragna rök"
    traduccio: "destí dels déus, crepuscle dels déus"
    notes: "Fi apocalíptic del món i dels déus, seguit d'un renaixement"

  - original: "æsir"
    traduccio: "asos, déus"
    notes: "Família principal de déus nòrdics (Óðinn, Þórr, Baldr...)"

  - original: "vanir"
    traduccio: "vans"
    notes: "Segona família de déus, associats a la fertilitat (Freyr, Freyja)"

  - original: "jötnar"
    transcripcio: "jötna / jötunn"
    traduccio: "gegants"
    notes: "Éssers primordials, sovint antagonistes dels déus"

  - original: "Ginnungagap"
    transcripcio: "gap ginnunga"
    traduccio: "buit primordial"
    notes: "Abisme còsmic que existia abans de la creació"

  - original: "Miðgarðr"
    traduccio: "Midgard, món dels homes"
    notes: "El món habitat pels humans, al centre de la cosmologia"

  - original: "Askr ok Embla"
    traduccio: "Ask i Embla (Freixe i Om)"
    notes: "Primera parella humana, creada pels déus a partir de troncs d'arbre"

  - original: "Urðr"
    traduccio: "Urd"
    notes: "Norna del passat; el seu pou (Urðar brunnr) nodreix Yggdrasill"

  - original: "Verðandi"
    traduccio: "Verdandi"
    notes: "Norna del present"

  - original: "Skuld"
    traduccio: "Skuld"
    notes: "Norna del futur; també apareix com a valquíria"

  - original: "valkyrjur"
    traduccio: "valquíries"
    notes: "Donzelles guerreres d'Óðinn que trien els caiguts en batalla"

  - original: "dvergar"
    traduccio: "nans"
    notes: "Éssers creats de la sang de Brimir i els ossos de Bláinn"

  - original: "Baldr"
    traduccio: "Baldr"
    notes: "Déu de la llum, fill d'Óðinn, mort per Höðr amb una branca de vesc"

  - original: "mistilteinn"
    traduccio: "vesc"
    notes: "Planta amb què Höðr mata Baldr, única cosa que podia ferir-lo"

  - original: "Loki"
    traduccio: "Loki"
    notes: "Déu embaucador, lligat sota una serp com a càstig"

  - original: "Heimdallr"
    traduccio: "Heimdall"
    notes: "Guardià del pont Bifröst; el seu corn (Gjallarhorn) anuncia el Ragnarök"

  - original: "Gjallarhorn"
    traduccio: "Gjallarhorn, corn ressonant"
    notes: "Corn que Heimdall fa sonar per anunciar el Ragnarök"

  - original: "Surtr"
    traduccio: "Surt"
    notes: "Gegant de foc del sud que destrueix el món amb flames"

  - original: "Fenrir"
    transcripcio: "Fenris / freki"
    traduccio: "Fenrir, el llop"
    notes: "Llop monstruós que devora Óðinn al Ragnarök"

  - original: "Jörmungandr"
    traduccio: "Jörmungandr, serp de Midgard"
    notes: "Serp còsmica que envolta el món; Þórr la mata però mor del seu verí"

  - original: "Naglfar"
    traduccio: "Naglfar"
    notes: "Vaixell fet d'ungles dels morts que navega al Ragnarök"

  - original: "Niðhöggr"
    traduccio: "Níðhöggr"
    notes: "Drac que rosega les arrels d'Yggdrasill i devora cadàvers"

  - original: "Gimlé"
    transcripcio: "Gimléi"
    traduccio: "Gimlé"
    notes: "Sala daurada on viuran els justos després del Ragnarök"

  - original: "Garmr"
    traduccio: "Garm"
    notes: "Gos o llop guardià de Gnipahellir, lligat fins al Ragnarök"

  - original: "seiðr"
    transcripcio: "seið"
    traduccio: "seid, màgia"
    notes: "Forma de màgia nòrdica associada a la profecia i l'encanteri"

  - original: "örlög"
    traduccio: "destí, fat"
    notes: "Destí primordial establert per les nornes"

  - original: "rökstólar"
    traduccio: "setials del destí"
    notes: "Trons on els déus es reuneixen per deliberar"

  - original: "Iðavöllr"
    transcripcio: "Iðavelli"
    traduccio: "Iðavöllr, plana resplendent"
    notes: "Lloc de reunió dels déus, tant al principi com després del Ragnarök"
