glossari:
  - terme: "Laura"
    original: "Laura"
    traduccio: "Laura"
    nota: "Musa i amada idealitzada de Petrarca, centre del Canzoniere."
  - terme: "Amor"
    original: "Amor"
    traduccio: "Amor"
    nota: "Personificacio de l'amor com a deu (Cupido), figura recurrent."
  - terme: "Madonna"
    original: "Madonna"
    traduccio: "Senyora"
    nota: "Apel·latiu cortes per a la dama estimada."
  - terme: "sospiri"
    original: "sospiri"
    traduccio: "sospirs"
    nota: "Motiu central del Canzoniere: els sospirs del poeta enamorat."
  - terme: "rime sparse"
    original: "rime sparse"
    traduccio: "rimes disperses"
    nota: "Auto-designacio del recull poetic de Petrarca."
  - terme: "core"
    original: "core"
    traduccio: "cor"
    nota: "Forma arcaica italiana de 'cuore', seu de la passio amorosa."
  - terme: "lauro"
    original: "lauro"
    traduccio: "llorer"
    nota: "Joc etimologic amb el nom de Laura; simbol de gloria poetica."
  - terme: "occhi"
    original: "occhi"
    traduccio: "ulls"
    nota: "Els ulls de Laura, font de la passio i de la ferida amorosa."
  - terme: "petra"
    original: "petra"
    traduccio: "pedra"
    nota: "Metafora de la duresa de la dama; tambe joc amb 'Petrarca'."
  - terme: "vita"
    original: "vita"
    traduccio: "vida"
    nota: "Concepte oposat a la mort de Laura, eix tematic de la segona part."
  - terme: "morte"
    original: "morte"
    traduccio: "mort"
    nota: "La mort de Laura (1348) divideix el Canzoniere en dues parts."
  - terme: "donna angelicata"
    original: "donna angelicata"
    traduccio: "dona angelical"
    nota: "Concepte stilnovista heretat: la dama com a intermediaria divina."
  - terme: "Febo"
    original: "Febo"
    traduccio: "Febus"
    nota: "Apol·lo, deu de la poesia; referencia mitologica frequent."
  - terme: "Dafne"
    original: "Dafne"
    traduccio: "Dafne"
    nota: "Nimfa transformada en llorer; paral·lel mitologic amb Laura."
  - terme: "Vaucluse"
    original: "Valchiusa"
    traduccio: "Vaucluse"
    nota: "Lloc de retir de Petrarca a la Provenca, escenari de molts sonets."
