termes:
  - original: "Ἀφροδίτα"
    transliteracio: "Aphrodita"
    traduccio: "Afrodita"
    nota: "Deessa de l'amor i la bellesa. Divinitat central en la poesia de Safo."

  - original: "Ἔρος"
    transliteracio: "Eros"
    traduccio: "Eros"
    nota: "Déu de l'amor/desig. Safo l'anomena 'afluixador de membres' (λυσιμέλης) i 'dolçamarg' (γλυκύπικρον)."

  - original: "Ψάπφω"
    transliteracio: "Psapphō"
    traduccio: "Safo"
    nota: "Forma eòlica del nom de la poeta. En el dialecte de Lesbos, el nom es pronunciava amb psi inicial."

  - original: "θῦμος"
    transliteracio: "thymos"
    traduccio: "cor / ànim"
    nota: "Seu de les emocions i la voluntat. En Safo, sovint equivalent a 'cor' o 'esperit'."

  - original: "φιλότης"
    transliteracio: "philotēs"
    traduccio: "amor / amistat"
    nota: "Terme que abasta des de l'amistat fins a l'amor eròtic. Central en el vocabulari afectiu de Safo."

  - original: "βρόδον"
    transliteracio: "brodon"
    traduccio: "rosa"
    nota: "Forma eòlica de ῥόδον (rhodon). Flor recurrent com a símbol de bellesa i d'Afrodita."

  - original: "σελάννα"
    transliteracio: "selanna"
    traduccio: "lluna"
    nota: "Forma eòlica de σελήνη (selēnē). Imatge central en diversos fragments (34, 96, 168B)."

  - original: "Πιερία"
    transliteracio: "Pieria"
    traduccio: "Pièria"
    nota: "Regió sagrada de les Muses al nord de Grècia. 'Les roses de Pièria' = la poesia."

  - original: "ἀβροσύνα"
    transliteracio: "habrosyna"
    traduccio: "delicadesa / refinament"
    nota: "Concepte clau en Safo: la bellesa com a estil de vida refinat i sensible."

  - original: "ὐμήναον"
    transliteracio: "hymenaon"
    traduccio: "himeneu"
    nota: "Invocació ritual en les cançons nupcials (epitalamis). Referència al déu Himeneu."

  - original: "γλυκύπικρον"
    transliteracio: "glykypikron"
    traduccio: "dolçamarg"
    nota: "Neologisme de Safo (fr. 130) per descriure Eros. Un dels mots més influents de la literatura occidental."

  - original: "λυσιμέλης"
    transliteracio: "lysimelēs"
    traduccio: "afluixador de membres"
    nota: "Epítet d'Eros (fr. 130). Descriu l'efecte físic del desig que afluixa el cos."

  - original: "Ἄτθις"
    transliteracio: "Atthis"
    traduccio: "Àttis"
    nota: "Una de les companyes més estimades de Safo, esmentada en diversos fragments (49, 96, 131)."

  - original: "Κλέϊς"
    transliteracio: "Kleis"
    traduccio: "Cleis"
    nota: "Probablement la filla de Safo, esmentada al fragment 132."

  - original: "ἐπιθαλάμιον"
    transliteracio: "epithalamion"
    traduccio: "epitalami"
    nota: "Cançó nupcial. Safo va excel·lir en aquest gènere (fr. 104-115)."
