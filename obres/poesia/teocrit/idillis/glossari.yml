termes:
  - original: βουκολικός (boukolikós)
    traduccio: bucòlic
    definicio: Relatiu als pastors de bous (βοῦς). Gènere poètic que idealitza la vida pastoral.
    context: Teòcrit és considerat el creador de la poesia bucòlica.

  - original: εἰδύλλιον (eidýllion)
    traduccio: idil·li
    definicio: Literalment 'petita imatge' o 'petit poema'. Composició breu de tema pastoral o quotidià.
    context: El terme s'aplica als poemes de Teòcrit des de l'antiguitat tardana.

  - original: Μοῖσαι (Moîsai)
    traduccio: Muses
    definicio: Les nou deesses de les arts. En dialecte dòric, Μοῖσαι en lloc de l'àtic Μοῦσαι.
    context: Invocades al refrany de l'Idil·li I.

  - original: σῦριγξ (sŷrinx)
    traduccio: siringa
    definicio: Flauta de Pan, instrument pastoral de tubs de canya lligats.
    context: Instrument emblemàtic de la poesia bucòlica, associat a Pan.

  - original: ἶυγξ (îynx)
    traduccio: iünx / roda màgica
    definicio: Instrument ritual giratori usat en encanteris amorosos. Originalment l'ocell colltort.
    context: Element central del ritual màgic de Simetxa a l'Idil·li II.

  - original: κῶμος (kômos)
    traduccio: serenata / ronda nocturna
    definicio: Processó festiva nocturna, sovint d'un enamorat cantant davant la porta de l'estimat/ada.
    context: Títol de l'Idil·li III, on un cabrer canta davant la cova d'Amaril·lis.

  - original: Δάφνις (Dáphnis)
    traduccio: Dafnis
    definicio: Pastor mític sicilià, fill d'Hermes, considerat l'inventor del cant bucòlic.
    context: Protagonista del cant de Tirsis a l'Idil·li I. Mor per negar-se a cedir a l'amor.

  - original: Κύκλωψ (Kýklōps)
    traduccio: Ciclop
    definicio: Gegant d'un sol ull. Aquí, Polifem, fill de Posidó, enamorat de Galatea.
    context: Protagonista dels Idil·lis VI i XI, tractat amb humor i tendresa.

  - original: Γαλάτεια (Galáteia)
    traduccio: Galatea
    definicio: Nereida (nimfa marina), objecte de l'amor de Polifem.
    context: Apareix als Idil·lis VI i XI.

  - original: Ἄδωνις (Ádōnis)
    traduccio: Adonis
    definicio: Jove d'extrema bellesa, estimat d'Afrodita, mort per un senglar i ressuscitat cíclicament.
    context: La festa d'Adonis és l'escenari de l'Idil·li XV.

  - original: Θαλύσια (Thalýsia)
    traduccio: Talísies
    definicio: Festa de la collita, ofrena de les primícies a Demèter.
    context: Títol de l'Idil·li VII, ambientat a l'illa de Cos.

  - original: λόχος ἀμοιβαῖος (lóchos amoibaîos)
    traduccio: cant amebeu
    definicio: Forma poètica dialogada on dos cantors s'alternen estrofa a estrofa.
    context: Estructura dels Idil·lis I, VI i VII.

  - original: ἔκπωμα (ékpōma)
    traduccio: copa (cílix)
    definicio: Copa per beure, aquí descrita amb relleus escultòrics (ècfrasi).
    context: A l'Idil·li I, el cabrer ofereix una copa meravellosament decorada a Tirsis.

  - original: νύμφη (nýmphē)
    traduccio: nimfa
    definicio: Divinitat menor femenina associada a la natura (fonts, boscos, muntanyes, mar).
    context: Amaril·lis (III), Galatea (VI, XI) i les nimfes que ploren Dafnis (I).

  - original: Πριάπος (Príāpos)
    traduccio: Príap
    definicio: Déu de la fertilitat i els horts, representat itifàl·lic.
    context: Visita Dafnis moribund a l'Idil·li I per burlar-se del seu orgull.

  - original: Ἀφροδίτη (Aphrodítē)
    traduccio: Afrodita
    definicio: Deessa de l'amor i el desig. A Teòcrit, sovint cruel i venjativa.
    context: Maleeix Dafnis (I), és invocada per Simetxa (II), és venerada a la festa d'Adonis (XV).

  - original: Σελήνη / Σελάνα (Selḗnē / Selána)
    traduccio: Selene / la Lluna
    definicio: Deessa de la lluna. En dòric, Σελάνα.
    context: Simetxa s'adreça a ella com a confident a l'Idil·li II.

  - original: Κῶς (Kôs)
    traduccio: Cos
    definicio: Illa del Dodecanès on Teòcrit va viure. Centre cultural hel·lenístic.
    context: Escenari de l'Idil·li VII (Les Talísies).

  - original: locus amoenus
    traduccio: locus amoenus (lloc amè)
    definicio: Tòpic literari d'un paratge natural idíl·lic (ombra, aigua, brisa, cant d'ocells).
    context: Descripció final de l'Idil·li VII, model paradigmàtic del tòpic.

  - original: Φαρμακεύτρια (Pharmakeútria)
    traduccio: fetillera / bruixa
    definicio: Dona que practica la màgia (φάρμακον = remei, verí, encanteri).
    context: Títol de l'Idil·li II, referit a Simetxa i la seva serventa Tèstilis.
