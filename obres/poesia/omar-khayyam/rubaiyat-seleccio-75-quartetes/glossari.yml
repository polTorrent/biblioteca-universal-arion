termes:
  - terme: Rubaiyat
    original: رباعیات
    transliteracio: rubā'iyyāt
    traduccio: Quartetes
    nota: >
      Plural de rubā'ī (رباعی), forma poètica persa de quatre versos amb rima AABA.
      El gènere és un dels més antics de la literatura persa.

  - terme: Jamshyd
    original: جمشید
    transliteracio: Jamshīd
    traduccio: Jamshyd
    nota: >
      Rei mític de la tradició persa (Shahnameh), símbol de la glòria mundana.
      Posseïa una copa llegendària (Jām-e Jam) de set anells que permetia
      veure tot l'univers. Representa l'esplendor efímer del poder terrenal.

  - terme: Kaikobad
    original: کیقباد
    transliteracio: Kay Qobād
    traduccio: Kaikobad
    nota: >
      Fundador de la dinastia kaianida a la mitologia persa (Shahnameh de Ferdowsí).
      Primer rei de la línia heroica. Usat per FitzGerald com a exemple de grandesa passada.

  - terme: Kaikhosru
    original: کیخسرو
    transliteracio: Kay Khosrow
    traduccio: Kaikhosru
    nota: >
      Rei heroic de la dinastia kaianida, nét de Kay Kāvus. Considerat el
      més gran dels reis mític perses, va abdicar per retirar-se a la vida espiritual.

  - terme: Rustum
    original: رستم
    transliteracio: Rostam
    traduccio: Rustum
    nota: >
      El gran heroi de l'epopeia persa Shahnameh. Guerrer invencible, fill de Zāl,
      famós per les seves set gestes i la tràgica mort del seu fill Sohrab.

  - terme: Hatim Tai
    original: حاتم طائی
    transliteracio: Ḥātam Ṭā'ī
    traduccio: Hatim Tai
    nota: >
      Poeta àrab preislàmic (m. c. 578), llegendari per la seva generositat extrema.
      El seu nom és sinònim d'hospitalitat i munificència a tot l'Orient.

  - terme: Bahram
    original: بهرام
    transliteracio: Bahrām
    traduccio: Bahram
    nota: >
      Bahram V (Bahram Gur), rei sassànida (r. 420-438), famós per la seva
      passió per la caça, especialment d'onagres (ases salvatges). La ironia
      és que el gran caçador ara jeu sota la terra que trepitgen les bèsties.

  - terme: Iram
    original: ارم
    transliteracio: Iram
    traduccio: Iram
    nota: >
      Iram dhāt al-'imād, la ciutat llegendària d'Aràbia esmentada al Qurʾān
      (sura 89:7), construïda pel rei Ad. Jardí paradisíac perdut, símbol
      de la bellesa i la glòria desaparegudes.

  - terme: Pelevi
    original: پهلوی
    transliteracio: Pahlavī
    traduccio: Pelevi
    nota: >
      Llengua persa mitjana (s. III-VII dC), la llengua dels textos zoroastrians.
      FitzGerald l'evoca com la llengua antiga i sagrada del cant poètic persa.

  - terme: Mahmud
    original: محمود
    transliteracio: Maḥmūd
    traduccio: Mahmud
    nota: >
      Mahmud de Gazni (971-1030), sultà que va crear un vast imperi.
      Usat com a exemple del poder terrenal que mereix pietat, no enveja,
      perquè tot poder és transitori.

  - terme: Muetzí
    original: مؤذّن
    transliteracio: mu'adhdhin
    traduccio: Muetzí
    nota: >
      La persona encarregada de fer la crida a l'oració (adhān) des del
      minaret de la mesquita. Aquí crida des de la "Torre de les Tenebres",
      invertint el seu paper habitual de guia espiritual.

  - terme: Carvansarà
    original: کاروانسرا
    transliteracio: kārvānsarā
    traduccio: Carvansarà
    nota: >
      Fonda o hostal al llarg de les rutes comercials orientals on les
      caravanes feien parada. Metàfora del món com a lloc de pas temporal.

  - terme: Ramadà
    original: رمضان
    transliteracio: Ramaḍān
    traduccio: Ramadà
    nota: >
      Novè mes del calendari islàmic, mes de dejuni. A la secció Kuza-Nama,
      marca el moment del vespre final del Ramadà quan apareix la lluna nova
      del mes de Xawwāl, senyal de la fi del dejuni.

  - terme: Kuza-Nama
    original: کوزه‌نامه
    transliteracio: Kūza-Nāma
    traduccio: Llibre dels Gerros
    nota: >
      Secció del Rubaiyat (LIX-LXVI) on els gerros de fang del terrisser
      prenen veu per qüestionar el seu creador. Al·legoria sobre la relació
      entre Déu i els humans, i la justícia divina.

  - terme: Parvin
    original: پروین
    transliteracio: Parvīn
    traduccio: Parvin (les Plèiades)
    nota: >
      Les Plèiades, cúmul estel·lar visible a ull nu. A l'astronomia persa,
      un dels asterismes més importants, associat al destí.

  - terme: Muixterí
    original: مشتری
    transliteracio: Mushtarī
    traduccio: Muixterí (Júpiter)
    nota: >
      El planeta Júpiter en la tradició astronòmica persa i àrab. Considerat
      un astre benèfic associat a la sort i la prosperitat.

  - terme: sufí
    original: صوفی
    transliteracio: ṣūfī
    traduccio: sufí
    nota: >
      Místic islàmic, seguidor del sufisme (tasawwuf). Khayyam es mostra
      escèptic davant l'ascetisme sufí, preferint el plaer terrenal del vi.

  - terme: Saturn
    original: زحل
    transliteracio: Zuḥal
    traduccio: Saturn
    nota: >
      El planeta més llunyà conegut en l'astronomia antiga. En la cosmologia
      medieval, la setena esfera celeste. Símbol del límit del coneixement humà.

  - terme: Tamam Shud
    original: تمام شد
    transliteracio: tamām shud
    traduccio: S'ha acabat
    nota: >
      Frase persa que tanca el poema, equivalent a "Fi" o "S'ha consumat".
      Expressa la finalitat irreversible que impregna tot el Rubaiyat.
