termes:
  - original: conticinio
    traduccio: conticini
    definicio: Última part de la nit, quan tot calla. Del llatí conticinium.
  - original: Nictimene
    traduccio: Nictímene
    definicio: Personatge mitològic transformat en mussol per haver comès incest amb el seu pare. Símbol de la nit i la vergonya.
  - original: Harpócrates
    traduccio: Harpòcrates
    definicio: Déu grec-egipci del silenci, representat amb un dit als llavis.
  - original: Almone
    traduccio: Almone
    definicio: Encantadora mitològica que transformava els amants en peixos.
  - original: silva
    traduccio: silva
    definicio: Forma mètrica que combina versos heptasíl·labs i endecasíl·labs amb rima consonant lliure.
  - original: Morfeo
    traduccio: Morfeu
    definicio: Déu grec dels somnis, fill del Son (Hipnos).
  - original: quilo
    traduccio: quil
    definicio: Substància resultant de la digestió estomacal, terme de la medicina galènica.
  - original: estimativa
    traduccio: estimativa
    definicio: Facultat de l'ànima que percep les intencions no sensibles (concepte escolàstic).
  - original: Faro
    traduccio: Far
    definicio: Far d'Alexandria, una de les set meravelles del món antic.
  - original: Categorías
    traduccio: Categories
    definicio: Les deu categories aristotèliques (substància, quantitat, qualitat, relació, lloc, temps, posició, possessió, acció, passió).
  - original: Universales
    traduccio: Universals
    definicio: Conceptes generals de la filosofia escolàstica (gènere, espècie, diferència, propi, accident).
  - original: triaca
    traduccio: triaga
    definicio: Antídot universal contra verins, compost medicinal complex de la medicina antiga.
  - original: Temis
    traduccio: Temis
    definicio: Deessa grega de la terra i la justícia natural; aquí simbolitza la natura com a mare.
  - original: Tonante
    traduccio: Tonant
    definicio: Epítet de Júpiter/Zeus com a déu del tro.
  - original: Faetón
    traduccio: Faetó
    definicio: Fill del Sol que intentà conduir el carro solar i morí fulminat per Zeus. Símbol de l'ambició intel·lectual.
