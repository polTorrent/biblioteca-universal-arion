# Glossari — El genet de bronze (Медный всадник)
# Aleksandr Puixkin (1833)

termes:
  - original: "Медный всадник"
    transliteracio: "Medni vsàdnik"
    traduccio: "El genet de bronze"
    nota: "Estàtua eqüestre de Pere el Gran a Sant Petersburg, obra d'Étienne Maurice Falconet (1782). Símbol central del poema."

  - original: "Пётр"
    transliteracio: "Piotr"
    traduccio: "Pere [el Gran]"
    nota: "Pere I de Rússia (1672–1725), fundador de Sant Petersburg. En el poema apareix com a 'ell' (он) a la Introducció."

  - original: "Петроград"
    transliteracio: "Petrograd"
    traduccio: "Petrograd"
    nota: "Nom eslau de Sant Petersburg, usat poèticament per Puixkin. No confondre amb el canvi oficial de nom de 1914."

  - original: "Петрополь"
    transliteracio: "Petròpolis"
    traduccio: "Petròpolis"
    nota: "Nom grecitzant de Sant Petersburg, usat en registre elevat."

  - original: "Нева"
    transliteracio: "Nevà"
    traduccio: "Nevà"
    nota: "Riu principal de Sant Petersburg. Protagonista de la inundació de 1824."

  - original: "Евгений"
    transliteracio: "Ievgueni"
    traduccio: "Eugeni"
    nota: "Protagonista del poema, funcionari humil. Nom deliberadament comú, contrast amb la grandesa de Pere."

  - original: "Параша"
    transliteracio: "Paraixa"
    traduccio: "Paraixa"
    nota: "Diminutiu de Прасковья (Prascòvia), la promesa d'Eugeni que mor a la inundació."

  - original: "Коломна"
    transliteracio: "Kolomna"
    traduccio: "Kolomna"
    nota: "Barri modest de Sant Petersburg on viu Eugeni."

  - original: "кумир"
    transliteracio: "kumir"
    traduccio: "ídol / estàtua"
    nota: "Paraula amb doble sentit: estàtua i ídol pagà. Puixkin l'usa per l'estàtua de Pere, amb connotació d'idolatria."

  - original: "чухонец"
    transliteracio: "txukhónets"
    traduccio: "finès [despectiu]"
    nota: "Terme col·loquial rus per als pobles finesos autòctons de la zona del Nevà abans de la fundació de Petersburg."

  - original: "порфироносная вдова"
    transliteracio: "porfiranósnaia vdovà"
    traduccio: "la viuda que porta la porpra"
    nota: "Moscou, l'antiga capital, comparada amb una emperadriu vídua eclipsada per la nova capital."

  - original: "стогны"
    transliteracio: "stogni"
    traduccio: "places / vies"
    nota: "Arcaisme eslau eclesiàstic per 'places públiques'. Ús deliberat de registre elevat."

  - original: "чёлн"
    transliteracio: "txoln"
    traduccio: "barca / esquif"
    nota: "Barca petita, mot poètic. Apareix al principi (barca del pescador finès) i durant la inundació."

  - original: "державец полумира"
    transliteracio: "derzhàvets polumira"
    traduccio: "el sobirà de mig món"
    nota: "Epítet de Pere el Gran, referint-se a l'extensió de l'Imperi Rus."

  - original: "Марсово поле"
    transliteracio: "Màrsovo pole"
    traduccio: "Camp de Mart"
    nota: "Plaça de Sant Petersburg usada per desfilades militars."

  - original: "Адмиралтейская игла"
    transliteracio: "Admiraltéiskaia iglà"
    traduccio: "l'agulla de l'Almirallat"
    nota: "Campanar daurat de l'edifici de l'Almirallat, punt de referència icònic de Sant Petersburg."

  - original: "наводнение"
    transliteracio: "navadnénie"
    traduccio: "inundació"
    nota: "La gran inundació de Sant Petersburg del 7 de novembre de 1824, fet històric central del poema."

  - original: "Карамзин"
    transliteracio: "Karamzin"
    traduccio: "Karamzín"
    nota: "Nikolai Karamzín (1766–1826), historiador i escriptor rus. Referència al llinatge oblidat d'Eugeni."

  - original: "Граф Хвостов"
    transliteracio: "Graf Khvostov"
    traduccio: "el comte Khvostov"
    nota: "Dmitri Khvostov (1757–1835), poeta mediocre, blanc habitual de la sàtira literària russa. Referència irònica."

  - original: "гривенник"
    transliteracio: "gríviennik"
    traduccio: "grivennik (deu copecs)"
    nota: "Moneda russa equivalent a deu copecs. Preu del trajecte en barca."
