termes:
  - original: "máj"
    traduccio: "maig"
    nota: "Títol del poema; evoca la primavera, l'amor i la joventut"
  - original: "hrdlička"
    traduccio: "tórtora"
    nota: "Hrdliččin hlas — la veu de la tórtora, símbol de l'amor en el poema"
  - original: "slavík"
    traduccio: "rossinyol"
    nota: "Ocell que canta l'amor a la rosa, tòpic romàntic"
  - original: "lůna"
    traduccio: "lluna"
    nota: "Forma poètica txeca; la lluna és presència constant al poema"
  - original: "jezero"
    traduccio: "llac"
    nota: "El llac és l'escenari central del poema, mirall de la natura"
  - original: "lesů pán"
    traduccio: "senyor dels boscos"
    nota: "Títol de Vilém com a cap dels bandolers"
  - original: "vězeň"
    traduccio: "presoner / pres"
    nota: "Vilém, empresonat i condemnat a mort"
  - original: "kolo"
    traduccio: "roda"
    nota: "Instrument de tortura i execució; el cos és entrellaçat a la roda sobre un pal"
  - original: "lebka"
    traduccio: "calavera"
    nota: "Símbol de la mort; la calavera de Vilém sobre la roda"
  - original: "duch / duchové"
    traduccio: "esperit / esperits"
    nota: "Als intermezzi, els esperits preparen el funeral del condemnat"
  - original: "Jarmila"
    traduccio: "Jarmila"
    nota: "L'estimada de Vilém; es suïcida al llac en saber la seva condemna"
  - original: "Vilém"
    traduccio: "Vilém"
    nota: "El protagonista, bandoler que mata el seu pare sense saber-ho"
  - original: "Hynek"
    traduccio: "Hynek"
    nota: "Alter ego del poeta; apareix al cant quart com a narrador"
  - original: "čekan"
    traduccio: "pal"
    nota: "Pal d'execució on es col·loca la roda amb el cos"
  - original: "kostlivec"
    traduccio: "esquelet"
    nota: "Restes de Vilém sobre la roda, al cant quart"
  - original: "suchopar"
    traduccio: "garriga"
    nota: "Terreny sec amb vegetació aromàtica"
  - original: "svatojánské mušky"
    traduccio: "cuques de llum"
    nota: "Literalment 'mosques de Sant Joan'; lluernes"
  - original: "žežhulka"
    traduccio: "cucut"
    nota: "Ocell el cant del qual marca el temps i les estacions"
