revisio:
  estat: corregit
  qualitat: null
  data_revisio: '2026-03-09'
  correccions_aplicades:
    - "Concordança de gènere: 'coloma blanc' → 'coloma blanca'"
    - "Normativa IEC: 'nínfar' → 'nenúfar' (3 ocurrències)"
    - "Error lèxic crític: 'llambordes' → 'llumetes' (světýlka = llumetes, no llambordes)"
    - "Error lèxic: 'dents rebrillants escrostonades' → 'dents brillants serrades'"
    - "Conjugació verbal: 'seien jo' → 'seia jo' (1a pers. sg. imperfet de seure)"
    - "Elisió normativa: 'la òliba' → 'l'òliba'"
    - "Verb omès: 'ja no coloma' → 'ja no és coloma'"
    - "Repetició cacofònica: 'la llum d'un llum' → 'la claror d'un llum' (3 ocurrències)"
    - "Puntuació: 'mai ai mai' → 'ai, mai' (expressió natural catalana)"
    - "Diminutiu incorrecte: 'llumenetes' → 'llumetes'"
    - "Lèxic: 'psalm' → 'salm' (forma normativa catalana)"
    - "Error lèxic greu: 'rosada' → 'rosa' (růžinu = rosa, no rosada/dew, 2 ocurrències)"
    - "Inversió subjecte-objecte: 'La lluna plena ha cobert un núvol' → 'La lluna plena, l'ha coberta un núvol'"
    - "Mode verbal: 'que entri un raig de lluna' → 's'hi escola un raig de lluna' (indicatiu, no subjuntiu)"
    - "Article omès: 'com en abraçada' → 'com en una abraçada'"
    - "Redundància: 'llisor immensa de la superfície' → 'llisor immensa de les aigües' (2 ocurrències)"
    - "Clàusula ambigua: 'sota núvol negre que vola' → 'que vola sota un núvol negre' (la coloma vola)"
    - "Falta 'al cel': 'cremen allà dalt a les muntanyes' → 'cremen al cel sobre les muntanyes' (po nebi)"
    - "Lèxic: 'la meva llar' → 'el meu poble' (dědinu = poble, no llar)"
    - "Preposició omesa: 'i la blanca torre' → 'i de la blanca torre'"
    - "Ordre de mots: 'emmudí del llac l'ampla — vespertina riba' → 'emmudí l'ampla riba vespertina del llac'"
    - "Ordre de mots: 'les ombres blavoses... escampa' → 'escampa les ombres blavoses...' (verb al final = calc txec)"
