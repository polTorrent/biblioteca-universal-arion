termes:
  - original: "kurhan"
    traduccio: "túmul"
    nota: "Túmul funerari de les estepes"
  - original: "Czatyrdah / Čatır-Dağ"
    traduccio: "Čatır-Dağ"
    nota: "Muntanya de Crimea (1545 m), literalment 'muntanya-tenda'"
  - original: "Bakczysaraj"
    traduccio: "Bakhtxisarai"
    nota: "Antiga capital del kanat de Crimea, cèlebre pel palau dels kans"
  - original: "Giraj / Girajowie"
    traduccio: "Girai"
    nota: "Dinastia dels kans de Crimea (s. XV-XVIII)"
  - original: "dżamid"
    traduccio: "mesquita"
    nota: "Lloc de culte islàmic"
  - original: "izan / azan"
    traduccio: "azan"
    nota: "Crida islàmica a l'oració"
  - original: "Diwy"
    traduccio: "Divs"
    nota: "Dimonis de la mitologia persa"
  - original: "Eblis"
    traduccio: "Eblis"
    nota: "El diable en la tradició islàmica (equivalent de Satanàs)"
  - original: "Faris"
    traduccio: "Faris"
    nota: "Genet àrab, cavaller del desert"
  - original: "Gaur"
    traduccio: "Gaur"
    nota: "Terme turc/persa per a infidel, no-musulmà"
  - original: "Mirza"
    traduccio: "Mirza"
    nota: "Títol honorífic turc/persa, acompanyant de Mickiewicz al viatge"
  - original: "buńczuk"
    traduccio: "estendard"
    nota: "Estendard otomà amb cua de cavall"
  - original: "menaru / minaret"
    traduccio: "minaret"
    nota: "Torre de la mesquita des d'on es fa la crida a l'oració"
  - original: "padyszach"
    traduccio: "padixà"
    nota: "Títol del sultà otomà, aquí aplicat metafòricament al Čatır-Dağ"
  - original: "janczary"
    traduccio: "geníssers"
    nota: "Soldats d'elit de l'imperi otomà"
  - original: "Bajdary"
    traduccio: "Baidari"
    nota: "Vall de Crimea famosa per la seva bellesa"
  - original: "Czufut-Kale"
    traduccio: "Txufut-Kalé"
    nota: "Ciutat fortalesa medieval a Crimea, habitada per caraïtes"
  - original: "Kikineis"
    traduccio: "Kikineis"
    nota: "Muntanya a la costa sud de Crimea"
  - original: "Ajudah"
    traduccio: "Ajudah"
    nota: "Promontori rocós a la costa sud de Crimea"
