termes:
  - original: "李白"
    transliteracio: "Lǐ Bái"
    traduccio: "Li Bai"
    nota: "Poeta de la dinastia Tang (701–762), també conegut com Li Taibai (李太白)."

  - original: "唐"
    transliteracio: "Táng"
    traduccio: "Tang"
    nota: "Dinastia Tang (618–907), considerada l'edat d'or de la poesia xinesa."

  - original: "月"
    transliteracio: "yuè"
    traduccio: "lluna"
    nota: "Símbol recurrent a la poesia de Li Bai, evoca nostàlgia, solitud i bellesa."

  - original: "酒"
    transliteracio: "jiǔ"
    traduccio: "vi"
    nota: "Vi de cereals (generalment arròs o mill). Tema central en molts poemes de Li Bai."

  - original: "故鄉"
    transliteracio: "gùxiāng"
    traduccio: "terra natal"
    nota: "La llar d'origen, motiu de nostàlgia freqüent a la poesia Tang."

  - original: "明月"
    transliteracio: "míngyuè"
    traduccio: "lluna brillant"
    nota: "Imatge poètica essencial, sovint vinculada a la nostàlgia i la contemplació."

  - original: "黃河"
    transliteracio: "Huánghé"
    traduccio: "Riu Groc"
    nota: "El segon riu més llarg de la Xina, símbol de la civilització xinesa."

  - original: "長江"
    transliteracio: "Chángjiāng"
    traduccio: "Riu Llarg (Iangtse)"
    nota: "El riu més llarg de la Xina, present en diversos poemes de comiat."

  - original: "蜀道"
    transliteracio: "Shǔdào"
    traduccio: "camí de Shu"
    nota: "Les rutes muntanyoses cap a Sichuan, tema del famós poema 蜀道難."

  - original: "廬山"
    transliteracio: "Lúshān"
    traduccio: "mont Lu"
    nota: "Muntanya sagrada a Jiangxi, celebrada per la seva cascada."

  - original: "黃鶴樓"
    transliteracio: "Huánghè Lóu"
    traduccio: "Torre de la Grua Groga"
    nota: "Famosa torre a Wuhan (Hubei), escenari de poemes de comiat."

  - original: "天姥"
    transliteracio: "Tiānmǔ"
    traduccio: "Tianmu"
    nota: "Muntanya llegendària a Zhejiang, escenari del somni visionari del poema 15."

  - original: "玉門關"
    transliteracio: "Yùmén Guān"
    traduccio: "Pas de la Porta de Jade"
    nota: "Pas fronterer a l'extrem occidental de la Gran Muralla, símbol de la frontera."

  - original: "峨眉山"
    transliteracio: "Éméi Shān"
    traduccio: "mont Emei"
    nota: "Una de les quatre muntanyes sagrades del budisme xinès, a Sichuan."

  - original: "金樽"
    transliteracio: "jīnzūn"
    traduccio: "copa d'or"
    nota: "Copa cerimonial per a vi, símbol de celebració i amistat."

  - original: "白帝城"
    transliteracio: "Báidì Chéng"
    traduccio: "Ciutat de l'Emperador Blanc"
    nota: "Antiga fortalesa al congost de Qutang, punt de partida del poema 3."

  - original: "長安"
    transliteracio: "Cháng'ān"
    traduccio: "Chang'an"
    nota: "Capital de la dinastia Tang, actual Xi'an."

  - original: "子規"
    transliteracio: "zǐguī"
    traduccio: "cucut"
    nota: "Ocell el cant del qual evoca tristesa i nostàlgia a la poesia xinesa."

  - original: "嫦娥"
    transliteracio: "Cháng'é"
    traduccio: "Chang'e"
    nota: "Deessa de la lluna en la mitologia xinesa."

  - original: "敬亭山"
    transliteracio: "Jìngtíng Shān"
    traduccio: "mont Jingting"
    nota: "Muntanya a Anhui, escenari del poema de solitud contemplativa (poema 13)."

  - original: "謝公"
    transliteracio: "Xiè Gōng"
    traduccio: "Senyor Xie"
    nota: "Referència a Xie Lingyun (385–433), poeta de paisatge que Li Bai admirava."

  - original: "仙人"
    transliteracio: "xiānrén"
    traduccio: "immortal"
    nota: "Ésser diví del taoisme, ideal espiritual freqüent a l'obra de Li Bai."

  - original: "劍閣"
    transliteracio: "Jiàngé"
    traduccio: "Pas de l'Espasa"
    nota: "Pas estratègic a Sichuan, descrit al poema 蜀道難."

  - original: "瑤台"
    transliteracio: "Yáotái"
    traduccio: "Terrassa de Jade"
    nota: "Palau celestial de la Reina Mare de l'Oest en la mitologia taoista."

  - original: "銀河"
    transliteracio: "Yínhé"
    traduccio: "Via Làctia"
    nota: "Literalment 'Riu de Plata', emprada com a símbol de grandiositat còsmica."
