  descripcio: "Selecció de trenta poemes representatius de Li Bai (701–762), el poeta més celebrat de la dinastia Tang. Inclou obres mestres com 靜夜思 (Pensaments en una nit tranquil·la), 將進酒 (Que vingui el vi!), 蜀道難 (El camí difícil de Shu) i 夢遊天姥吟留別 (Somiant una excursió al mont Tianmu)."
