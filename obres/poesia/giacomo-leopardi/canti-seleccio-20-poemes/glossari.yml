termes:
  - terme: stirpe
    original: "stirpe"
    traduccio: "estirp, llinatge"
    notes: >
      Mot recurrent a Leopardi per designar el llinatge humà o una progènie.
      En italià antic i poètic, 'stirpe' té connotacions més nobles que el simple 'progenie'.

  - terme: numi / numen
    original: "numi"
    traduccio: "numen, divinitats"
    notes: >
      Plural llatí de 'numen' (voluntat divina, poder diví). Leopardi l'usa
      freqüentment com a sinònim poètic de 'déus' o 'forces divines'.

  - terme: fato
    original: "fato"
    traduccio: "fat, destí"
    notes: >
      El destí entès com a força implacable i cega. Concepte central en la
      filosofia pessimista de Leopardi, on el fat és indiferent al patiment humà.

  - terme: virtute / virtù
    original: "virtute / virtù"
    traduccio: "virtut, valor"
    notes: >
      Tant en el sentit moral (virtut) com marcial (valor, heroisme).
      A les cançons patriòtiques, 'virtù' té el sentit renaixentista de força i excel·lència.

  - terme: tedio
    original: "tedio"
    traduccio: "tedi, avorriment"
    notes: >
      Concepte filosòfic clau a Leopardi. El tedi és l'estat fonamental de l'existència
      humana quan s'han esvaït les il·lusions. No és simple avorriment, sinó una nàusea
      existencial profunda.

  - terme: alma
    original: "alma"
    traduccio: "nutrícia, benvolguda"
    notes: >
      Adjectiu llatí ('almus') que significa 'que nodreix, que dóna vida'.
      'Alma terra' = terra nutrícia, mare terra. No confondre amb 'ànima'.

  - terme: vate
    original: "vate"
    traduccio: "vat, poeta profeta"
    notes: >
      Del llatí 'vates', poeta amb dons profètics. Leopardi s'autodenomina
      així a 'A Itàlia', inscrivint-se en la tradició del poeta civil.

  - terme: averno / Tartaro
    original: "averno / Tartaro"
    traduccio: "avern, Tàrtar"
    notes: >
      L'inframon clàssic. L'Avern era el llac d'entrada als inferns;
      el Tàrtar, la zona més profunda. Leopardi els usa com a sinònims poètics de mort.

  - terme: sciaura
    original: "sciaura"
    traduccio: "dissort, desgràcia"
    notes: >
      Forma poètica i arcaica de 'sciagura' (desgràcia). Terme freqüent
      a Leopardi per designar la condició desventurada de l'home.

  - terme: ancella
    original: "ancella"
    traduccio: "serventa"
    notes: >
      Del llatí 'ancilla', serventa. Leopardi l'usa metafòricament per
      descriure Itàlia sotmesa a potències estrangeres.

  - terme: erinni
    original: "erinni"
    traduccio: "erínies"
    notes: >
      Les Fúries de la mitologia grega, deesses de la venjança. A l'Últim
      cant de Safo, representen les forces hostils del destí.

  - terme: Parca
    original: "Parca"
    traduccio: "Parca"
    notes: >
      Cadascuna de les tres deesses del destí (Cloto, Làquesis, Àtropos)
      que filen, mesuren i tallen el fil de la vida humana.

  - terme: pelegrino / peregrino
    original: "peregrino / pellegrino"
    traduccio: "pelegrí, vianant"
    notes: >
      Tant en sentit literal (caminant) com metafòric (l'home com a
      pelegrí a la terra). Mot recurrent a La ginestra.

  - terme: diletto
    original: "diletto"
    traduccio: "delit, plaer"
    notes: >
      Plaer, gaudi. En Leopardi, els 'diletti' són efímers i il·lusoris,
      sempre fugaços i associats a la joventut.

  - terme: ingegno
    original: "ingegno"
    traduccio: "enginy, intel·ligència"
    notes: >
      Capacitat intel·lectual i creativa. 'Alti ingegni' = grans esperits,
      intel·lectes superiors.

  - terme: nebbia / nubi
    original: "nebbia / nubi"
    traduccio: "boira / núvols"
    notes: >
      Imatges recurrents a Leopardi per representar la confusió, l'oblit,
      i la distància entre l'home i la veritat.

  - terme: colle / ermo colle
    original: "colle / ermo colle"
    traduccio: "turó, erm turó"
    notes: >
      El turó de L'Infinit és el Monte Tabor, proper a Recanati.
      'Ermo' (erm, solitari) és un dels adjectius més característics de Leopardi.

  - terme: natura
    original: "natura"
    traduccio: "natura"
    notes: >
      No simplement la naturalesa, sinó la força còsmica indiferent i cruel
      que governa l'univers. A La ginestra, natura és explícitament 'madrastra'
      de l'home.

  - terme: fastidio
    original: "fastidio"
    traduccio: "fàstic, tedi"
    notes: >
      Repugnància existencial. A 'Ad Angelo Mai', el fàstic cenyeix l'home
      des del bressol, substituint les antigues il·lusions.

  - terme: Vesevo / Vesuvio
    original: "Vesevo"
    traduccio: "Vesuvi"
    notes: >
      Forma poètica del Vesuvi. A La ginestra, el volcà simbolitza la
      potència destructora de la natura, indiferent a l'home.

  - terme: ginestra
    original: "ginestra"
    traduccio: "ginesta"
    notes: >
      La planta que creix als flancs del Vesuvi. Símbol de dignitat humil
      i de resistència sense supèrbia davant la força destructora de la natura.
