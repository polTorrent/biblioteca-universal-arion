termes:
  - original: "maya"
    transliteracio: "māyā"
    traduccio: "il·lusió còsmica"
    nota: "Concepte filosòfic hindú que designa la natura il·lusòria del món fenomènic. Tagore el conserva en cursiva a l'original anglès (poema 72)."
  - original: "Gitanjali"
    transliteracio: "gītāñjali"
    traduccio: "ofrenes de cançons"
    nota: "Del bengalí গীতাঞ্জলি: gīta (cançó) + añjali (ofrena amb les mans juntes). Títol del recull original en bengalí (1910)."
  - original: "Thou / thee / thy"
    transliteracio: null
    traduccio: "tu / a tu / el teu"
    nota: "Formes arcaiques angleses de segona persona singular. Tagore les empra per adreçar-se al diví, seguint la tradició bíblica anglesa. En català s'ha optat pel tutejament amb registre elevat."
  - original: "master"
    transliteracio: null
    traduccio: "mestre"
    nota: "Terme que al·ludeix al guru o al diví com a mestre espiritual, concepte central en la tradició devocional bengalí (bhakti)."
  - original: "deliverance"
    transliteracio: null
    traduccio: "alliberament"
    nota: "Referència al moksha (মোক্ষ), l'alliberament del cicle de renaixements en la filosofia hindú."
  - original: "King of kings"
    transliteracio: null
    traduccio: "Rei dels reis"
    nota: "Epítet diví present tant en la tradició hindú (referint-se a Brahman) com en la cristiana. Tagore l'empra amb ressonàncies universals."
  - original: "banyan tree"
    transliteracio: null
    traduccio: "figuera de Bengala"
    nota: "Ficus benghalensis, arbre sagrat a l'Índia, símbol de vida eterna i refugi. Molt present en la poesia i la iconografia bengalí."
  - original: "telling of beads"
    transliteracio: null
    traduccio: "comptar de grans"
    nota: "Referència al japa mala, el rosari hindú de 108 grans usat per a la recitació de mantres."
