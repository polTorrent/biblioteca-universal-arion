termes:
  - original: "Alföld"
    traduccio: "Gran Plana"
    nota: "La gran planura hongaresa, entre el Danubi i el Tisa"
  - original: "puszta"
    traduccio: "pusta"
    nota: "Estepa hongaresa; plana àrida amb vegetació escassa"
  - original: "csárda"
    traduccio: "hostal"
    nota: "Taverna o hostal tradicional hongarès a la pusta"
  - original: "betyár"
    traduccio: "bandoler"
    nota: "Bandits de la pusta, figures romàntiques al folklore hongarès"
  - original: "csikós"
    traduccio: "guarda de cavalls"
    nota: "Pastor de cavalls de la Gran Plana hongaresa"
  - original: "Kis-Kunság"
    traduccio: "Petita Cumània"
    nota: "Regió històrica de la Gran Plana, habitada pels cumans al s. XIII"
  - original: "Tisza"
    traduccio: "Tisa"
    nota: "Segon riu més llarg d'Hongria, afluent del Danubi"
  - original: "Duna"
    traduccio: "Danubi"
    nota: "El gran riu d'Europa Central"
  - original: "Máramaros"
    traduccio: "Màramures"
    nota: "Regió muntanyosa al nord-est d'Hongria (avui Romania/Ucraïna)"
  - original: "Kecskemét"
    traduccio: "Kecskemét"
    nota: "Ciutat de la Gran Plana, important centre de mercat"
  - original: "Demosthenes"
    traduccio: "Demòstenes"
    nota: "Orador atenenc (384-322 aC), símbol de l'eloqüència"
  - original: "Kánaán"
    traduccio: "Canaan"
    nota: "La Terra Promesa bíblica; al poema, metàfora de la justícia social"
