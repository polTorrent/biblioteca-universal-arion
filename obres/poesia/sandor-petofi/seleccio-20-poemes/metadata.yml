  descripcio: >
    Selecció de 20 poemes emblemàtics de Petőfi Sándor (1823-1849), poeta
    nacional hongarès i figura central de la Revolució de 1848. Inclou poemes
    revolucionaris (Nemzeti dal), elegies amoroses (Szeptember végén), odes al
    paisatge (Az Alföld, A Tisza) i reflexions sobre la poesia i la llibertat.
    Primera traducció al català d'aquest autor.
