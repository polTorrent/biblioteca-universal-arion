obra:
  titol: Els treballs i els dies
  titol_original: Ἔργα καὶ Ἡμέραι
  autor: Hesíode
  autor_original: Ἡσίοδος
  traductor: Biblioteca Arion
  any_original: c. 700 aC
  any_traduccio: 2026
  llengua_original: grec
  genere: poesia
  subgenere: poesia didàctica
  descripcio: >
    Poema didàctic sobre el treball agrícola, la justícia divina i la vida
    quotidiana a la Grècia arcaica. Hesíode s'adreça al seu germà Perses per
    ensenyar-li els valors del treball honest, intercalant mites (Prometeu,
    Pandora, les cinc races) amb consells pràctics sobre agricultura, navegació
    i vida social.
  temes:
    - treball
    - justícia
    - agricultura
    - mitologia grega
    - ètica
    - calendari agrícola
