glossari:
  - terme: "carmen"
    plural: "carmina"
    traduccio: "oda, cant, poema"
    nota: "Títol genèric de les composicions líriques d'Horaci"
  - terme: "Maecenas"
    traduccio: "Mecenes"
    nota: "Gai Cilni Mecenes, protector d'Horaci i patró de les arts sota August"
  - terme: "vates"
    traduccio: "poeta, profeta"
    nota: "Poeta inspirat pels déus; Horaci l'usa per dignificar la funció poètica"
  - terme: "carpe diem"
    traduccio: "aprofita el dia"
    nota: "Locució d'Odes I.11; tema central de la lírica horaciana"
  - terme: "aurea mediocritas"
    traduccio: "daurada mitjania"
    nota: "Ideal de vida equilibrada, tema d'Odes II.10"
  - terme: "lyra"
    plural: "lyrae"
    traduccio: "lira"
    nota: "Instrument simbòlic del poeta líric; sovint metonímia de la poesia"
  - terme: "barbiton"
    traduccio: "barbiton"
    nota: "Lira de cordes llargues i to greu, associada a la poesia lesbia (Alceu, Safo)"
  - terme: "Mors"
    traduccio: "Mort"
    nota: "Personificació; cf. 'Pallida Mors aequo pulsat pede' (I.4)"
  - terme: "Iuppiter"
    traduccio: "Júpiter"
    nota: "Déu suprem del panteó romà; apareix com a garant de l'ordre còsmic"
  - terme: "Apollo"
    traduccio: "Apol·lo"
    nota: "Déu de la poesia, la música i la profecia; protector d'August"
  - terme: "Venus"
    traduccio: "Venus"
    nota: "Deessa de l'amor; sovint com a Cytherea (nascuda a Citera)"
  - terme: "Bacchus"
    traduccio: "Bacus, Dionís"
    nota: "Déu del vi i la inspiració poètica"
  - terme: "Faunus"
    traduccio: "Faune"
    nota: "Déu pastoral romà, equivalent del Pan grec"
  - terme: "Nympha"
    plural: "Nymphae"
    traduccio: "nimfa"
    nota: "Divinitats menors de la naturalesa (fonts, boscos, muntanyes)"
  - terme: "Quirites"
    traduccio: "quirites, ciutadans romans"
    nota: "Denominació solemne dels ciutadans de Roma"
  - terme: "virtus"
    traduccio: "virtut, valor"
    nota: "Concepte central romà: coratge cívic i moral, excel·lència"
  - terme: "otium"
    traduccio: "oci, repòs"
    nota: "Lleure contemplatiu, sovint contraposat al negotium (activitat pública)"
  - terme: "fides"
    traduccio: "fe, fidelitat, lleialtat"
    nota: "Virtut fonamental de les relacions personals i cíviques romanes"
  - terme: "pietas"
    traduccio: "pietat"
    nota: "Devoció envers els déus, la pàtria i la família"
  - terme: "mos maiorum"
    traduccio: "costum dels avantpassats"
    nota: "Tradició moral romana; Horaci la invoca com a ideal de regeneració cívica"
  - terme: "monumentum"
    traduccio: "monument"
    nota: "Cf. 'Exegi monumentum aere perennius' (III.30): la poesia com a monument imperible"
  - terme: "aes perennius"
    traduccio: "més durador que el bronze"
    nota: "Expressió d'Odes III.30 sobre la immortalitat de l'obra poètica"
  - terme: "Alcaeus"
    traduccio: "Alceu"
    nota: "Poeta líric de Lesbos (s. VII-VI aC); model mètric principal d'Horaci"
  - terme: "Sappho"
    traduccio: "Safo"
    nota: "Poetessa de Lesbos; model per a l'estrofa sàfica usada per Horaci"
  - terme: "stropha Alcaica"
    traduccio: "estrofa alcaica"
    nota: "Metre líric grec adaptat per Horaci; el més freqüent a les Odes"
  - terme: "stropha Sapphica"
    traduccio: "estrofa sàfica"
    nota: "Metre líric de tres hendecasíl·labs sàfics i un adoni"
  - terme: "Tibur"
    traduccio: "Tíbur (actual Tívoli)"
    nota: "Ciutat del Laci on Horaci tenia una vil·la; lloc predilecte del poeta"
  - terme: "Sabinum"
    traduccio: "finca sabina"
    nota: "Propietat rural d'Horaci a la Sabina, regal de Mecenes"
  - terme: "Africus"
    traduccio: "Àfric (vent del sud-oest)"
    nota: "Vent tempestuós; recurrent en les imatges de tempesta marina"
  - terme: "Aquilo"
    traduccio: "Aquiló (vent del nord)"
    nota: "Vent fred del nord; sovint símbol d'adversitat"
  - terme: "Notus"
    traduccio: "Not (vent del sud)"
    nota: "Vent plujós del sud"
  - terme: "Favonius"
    traduccio: "Favoni (vent de ponent)"
    nota: "Vent suau de primavera; cf. 'Solvitur acris hiems grata vice veris et Favoni' (I.4)"
