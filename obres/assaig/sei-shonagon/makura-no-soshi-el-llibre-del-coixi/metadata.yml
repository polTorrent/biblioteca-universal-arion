context_historic: >
  Sei Shōnagon va servir com a dama de companyia (nyōbō) de l'emperadriu
  Teishi (定子) a la cort imperial de Heian-kyō (actual Kyoto) entre els anys
  993 i 1000 aproximadament. El Makura no Sōshi va ser escrit durant aquest
  període i poc després. L'obra és contemporània del Genji Monogatari de
  Murasaki Shikibu, l'altra gran escriptora del període Heian, amb qui Sei
  Shōnagon mantenia una cèlebre rivalitat literària. El títol «llibre del
  coixí» (makura no sōshi) fa referència als quaderns que es guardaven dins
  els coixins de fusta japonesos, on s'escrivien notes privades. L'obra va
  establir el gènere zuihitsu (assaig lliure) i és una font inestimable per
  comprendre l'estètica, els costums i la sensibilitat del Japó clàssic.
