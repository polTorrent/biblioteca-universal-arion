  descripcio: >
    El Makura no Sōshi (枕草子, El llibre del coixí) és una obra cabdal de la
    literatura japonesa clàssica, escrita per Sei Shōnagon, dama de la cort de
    l'emperadriu Teishi durant el període Heian. Considerat el primer exemple del
    gènere zuihitsu (随筆, «seguir el pinzell»), el text recull observacions,
    llistes, anècdotes cortesanes i reflexions estètiques amb una prosa elegant
    i plena d'enginy. Selecció de 30 seccions representatives.
