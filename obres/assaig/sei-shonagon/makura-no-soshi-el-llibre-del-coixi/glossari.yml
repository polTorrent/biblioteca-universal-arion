glossari:
  - terme: "をかし (okashi)"
    romanitzacio: "okashi"
    traduccio: "encantador, graciós, enginyós"
    nota: >
      Concepte estètic central del Makura no Sōshi. Expressa l'admiració
      per allò que és enginyós, elegant o visualment agradable. Contrasta
      amb l'aware de Murasaki Shikibu.
  - terme: "あはれ (aware)"
    romanitzacio: "aware"
    traduccio: "pathos, emoció profunda, tendresa"
    nota: >
      Sensibilitat davant la bellesa efímera i la melancolia de les coses.
      Sei Shōnagon l'usa menys que okashi, però apareix en passatges lírics.
  - terme: "つきづきし (tsukizukishi)"
    romanitzacio: "tsukizukishi"
    traduccio: "apropriat, escaient, harmoniós"
    nota: "Qualitat d'allò que s'ajusta perfectament al seu context o moment."
  - terme: "随筆 (zuihitsu)"
    romanitzacio: "zuihitsu"
    traduccio: "assaig lliure, 'seguir el pinzell'"
    nota: >
      Gènere literari japonès d'escrits miscel·lanis. El Makura no Sōshi
      n'és considerat l'obra fundacional.
  - terme: "めでたし (medetashi)"
    romanitzacio: "medetashi"
    traduccio: "admirable, esplèndid, magnífic"
    nota: "Expressa l'admiració suprema per quelcom d'excepcional bellesa o qualitat."
  - terme: "にくし (nikushi)"
    romanitzacio: "nikushi"
    traduccio: "odiós, irritant, desagradable"
    nota: "Adjectiu recurrent a les llistes de 'coses odioses' (nikuki mono)."
  - terme: "うつくし (utsukushi)"
    romanitzacio: "utsukushi"
    traduccio: "adorable, encisador (no 'bonic' en sentit modern)"
    nota: >
      En japonès clàssic, utsukushi expressa tendresa i desig de protecció
      davant allò petit i delicat, no bellesa en el sentit modern.
  - terme: "女房 (nyōbō)"
    romanitzacio: "nyōbō"
    traduccio: "dama de companyia, dama de la cort"
    nota: "Dones cultes que servien a la cort imperial com a acompanyants de les emperadrius."
  - terme: "あけぼの (akebono)"
    romanitzacio: "akebono"
    traduccio: "alba, primera claror del dia"
    nota: "Paraula icònica que obre el Makura no Sōshi: 'La primavera és l'alba'."
  - terme: "内裏 (dairi)"
    romanitzacio: "dairi"
    traduccio: "palau imperial interior"
    nota: "Recinte privat de l'emperador dins el gran palau (daidairi) de Heian-kyō."
