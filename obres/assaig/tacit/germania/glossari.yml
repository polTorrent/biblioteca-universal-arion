termes:
  - original: "framea"
    transliteracio: "framea"
    traduccio: "framea"
    definicio: "Llança germànica curta amb ferro estret i afilat, arma principal dels guerrers"
    context: "hastas vel ipsorum vocabulo frameas gerunt"

  - original: "barditus"
    transliteracio: "barditus"
    traduccio: "barditus"
    definicio: "Cant de guerra germànic que encén els ànims i presagia la sort del combat"
    context: "quorum relatu, quem barditum vocant, accendunt animos"

  - original: "princeps"
    transliteracio: "princeps"
    traduccio: "cabdill / príncep"
    definicio: "Cap tribal escollit per mèrits militars, que governa per exemple més que per imposició"
    context: "reges ex nobilitate, duces ex virtute sumunt"

  - original: "comitatus"
    transliteracio: "comitatus"
    traduccio: "seguici / comitiva"
    definicio: "Grup de guerrers joves que acompanyen i serveixen un cabdill amb lleialtat absoluta"
    context: "magnaque et comitum aemulatio"

  - original: "concilium"
    transliteracio: "concilium"
    traduccio: "assemblea"
    definicio: "Reunió pública on es decideixen afers de guerra, pau i justícia"
    context: "de minoribus rebus principes consultant; de maioribus omnes"

  - original: "pagus"
    transliteracio: "pagus"
    traduccio: "cantó / districte"
    definicio: "Divisió territorial bàsica dels pobles germànics"
    context: "centeni ex singulis pagis sunt"

  - original: "cuneus"
    transliteracio: "cuneus"
    traduccio: "cunya / falange en cunya"
    definicio: "Formació de combat triangular usada pels germànics"
    context: "acies per cuneos componitur"

  - original: "lucus"
    transliteracio: "lucus"
    traduccio: "bosc sagrat"
    definicio: "Espai forestal consagrat als déus, centre del culte germànic"
    context: "lucos ac nemora consecrant deorumque nominibus appellant"

  - original: "Nerthus"
    transliteracio: "Nerthus"
    traduccio: "Nerthus (Terra Mare)"
    definicio: "Deessa de la terra venerada en comú pels pobles germànics del nord"
    context: "in commune Nerthum, id est Terram matrem, colunt"

  - original: "Suebi"
    transliteracio: "Suebi"
    traduccio: "sueus"
    definicio: "Gran confederació de pobles germànics que ocupen la major part de Germània"
    context: "de Suebis dicendum est, quorum non una gens"

  - original: "auspicium"
    transliteracio: "auspicium"
    traduccio: "auspici"
    definicio: "Pràctica d'endevinació observant signes naturals, ocells o cavalls sagrats"
    context: "auspicia sortesque ut qui maxime observant"

  - original: "sortes"
    transliteracio: "sortes"
    traduccio: "sorts / bastonets endevinatoris"
    definicio: "Mètode de consulta oracular tallant bastonets marcats d'un arbre fruiter"
    context: "virgam frugiferae arbori decisam in surculos amputant"

  - original: "sagum"
    transliteracio: "sagum"
    traduccio: "mantell / capa curta"
    definicio: "Vestiment principal dels germànics, fermat amb fíbula o espina"
    context: "tegumen omnibus sagum fibula aut, si desit, spina consertum"

  - original: "dos"
    transliteracio: "dos"
    traduccio: "dot"
    definicio: "Regal nupcial que, entre els germànics, el marit ofereix a l'esposa (no a l'inrevés)"
    context: "dotem non uxor marito, sed uxori maritus offert"

  - original: "wergeld"
    transliteracio: "wergeld"
    traduccio: "compensació per homicidi"
    definicio: "Pagament en caps de bestiar per rescatar un homicidi i reconciliar famílies"
    context: "luitur enim etiam homicidium certo armentorum ac pecorum numero"

  - original: "Rhenus"
    transliteracio: "Rhenus"
    traduccio: "Rin"
    definicio: "Riu que marca la frontera occidental de Germània amb la Gàl·lia"
    context: "Germania omnis a Gallis Raetisque... Rheno... separatur"

  - original: "Danuvius"
    transliteracio: "Danuvius"
    traduccio: "Danubi"
    definicio: "Riu que marca la frontera meridional de Germània"
    context: "Danuvius molli et clementer edito montis Abnobae iugo effusus"

  - original: "Hercynia silva"
    transliteracio: "Hercynia silva"
    traduccio: "selva Hercínia"
    definicio: "Gran massa forestal del centre de Germània, frontera natural"
    context: "inter Hercyniam silvam Rhenumque et Moenum amnes"

  - original: "libertus"
    transliteracio: "libertus"
    traduccio: "llibert"
    definicio: "Esclau alliberat, amb estatus poc superior al dels esclaus entre els germànics"
    context: "liberti non multum supra servos sunt"

  - original: "glesum"
    transliteracio: "glesum"
    traduccio: "ambre / succí"
    definicio: "Resina fòssil recollida pels estis a les costes del Bàltic"
    context: "sucinum, quod ipsi glesum vocant, inter vada atque in ipso litore legunt"
