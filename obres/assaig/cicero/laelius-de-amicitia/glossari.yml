termes:
  - terme: "amicitia"
    transliteracio: "amikítia"
    traduccio: "amistat"
    context: >
      Concepte central de l'obra. Per a Ciceró, l'amicitia no és una simple
      relació afectiva sinó un vincle moral fonamentat en la virtut (virtus)
      i la benevolència mútua (benevolentia). Només pot existir entre homes bons
      (boni viri). Es defineix com «l'acord en tots els assumptes divins i humans
      amb benevolència i afecte» (§20).

  - terme: "virtus"
    transliteracio: "uírtus"
    traduccio: "virtut"
    context: >
      Qualitat moral fonamental que engloba coratge, excel·lència i rectitud.
      Per a Ciceró, és el fonament imprescindible de l'amistat vertadera:
      «sense virtut, l'amistat no pot existir de cap manera» (§20).
      Es distingeix de la concepció estoica estricta: Leli l'interpreta
      en sentit pràctic, no com a perfecció absoluta del savi.

  - terme: "benevolentia"
    transliteracio: "benebolèntia"
    traduccio: "benevolència"
    context: >
      Voluntat de bé envers l'altre, component essencial de l'amistat.
      Distingida del simple intercanvi de favors, és el sentiment desinteressat
      que uneix els amics. Sense benevolència, el nom d'amistat desapareix,
      però el de parentiu roman (§19).

  - terme: "caritas"
    transliteracio: "kàritas"
    traduccio: "afecte, estima"
    context: >
      Amor profund i desinteressat. Ciceró l'empra com a sinònim proper
      d'amor en el context de l'amistat. En la definició d'amicitia (§20),
      apareix al costat de benevolentia com a element constitutiu.

  - terme: "fides"
    transliteracio: "fídes"
    traduccio: "lleialtat, fidelitat"
    context: >
      Confiança mútua i compliment de la paraula donada. Ciceró la considera
      el fonament (fundamentum) de la fermesa i constància en l'amistat (§65).
      Sense fides, cap relació d'amistat pot ser estable.

  - terme: "constantia"
    transliteracio: "konstàntia"
    traduccio: "constància, fermesa"
    context: >
      Fermesa de caràcter que no vacil·la davant les adversitats ni les
      temptacions. Qualitat indispensable de l'amic vertader, que es manté
      lleial tant en la prosperitat com en la desgràcia (§64).

  - terme: "sapientia"
    transliteracio: "sapiènsia"
    traduccio: "saviesa"
    context: >
      Coneixement pràctic i teòric que permet viure rectament. Leli distingeix
      entre la saviesa estoica (inaccessible als mortals) i la saviesa pràctica
      dels homes bons com Fabrici, Curi o Cató. Segons la definició de Fanni,
      la saviesa de Leli consisteix a considerar que tot depèn d'un mateix
      i que les vicissituds humanes són inferiors a la virtut (§7).

  - terme: "liberalitas"
    transliteracio: "liberàlitas"
    traduccio: "generositat, liberalitat"
    context: >
      Disposició a donar sense esperar res a canvi. Qualitat dels homes bons
      que Ciceró oposa a la cupiditas (cobdícia). La generositat en l'amistat
      no és un càlcul d'intercanvi sinó una inclinació natural (§31).

  - terme: "aequitas"
    transliteracio: "èkuitas"
    traduccio: "equitat, justícia"
    context: >
      Sentit de la justícia i el tracte igualitari. En l'amistat, implica
      tractar com a igual qui és inferior en rang o fortuna (§69).
      Qualitat fonamental dels homes bons (boni viri).

  - terme: "verecundia"
    transliteracio: "berekúndia"
    traduccio: "respecte, pudor"
    context: >
      Sentiment de respecte i reverència envers l'amic. Ciceró adverteix
      que qui treu el respecte de l'amistat li treu el seu ornament més gran
      (§82). Implica no donar per fets els drets de l'amistat.

  - terme: "assentatio"
    transliteracio: "assentàtsio"
    traduccio: "adulació, llagoteria"
    context: >
      Acte de dir a l'altre allò que vol sentir, no la veritat. Ciceró
      la considera la plaga més gran de l'amistat (§91), oposada a la
      sinceritat (veritas). L'adulador destrueix el fonament de l'amistat
      perquè elimina la veritat, sense la qual el nom d'amistat no té valor.
