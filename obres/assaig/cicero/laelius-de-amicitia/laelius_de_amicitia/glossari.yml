termes:
  - original: "amicitia"
    traduccio: "amistat"
    nota: "Concepte central del diàleg. No sols vincle afectiu sinó acord total de voluntats, interessos i opinions entre homes virtuosos."

  - original: "virtus"
    traduccio: "virtut"
    nota: "Qualitat moral que, per a Ciceró, és condició necessària de l'amistat veritable. Inclou fermesa, integritat, justícia i generositat."

  - original: "benevolentia"
    traduccio: "benevolència"
    nota: "Bona voluntat, desig del bé de l'altre. Element constitutiu de l'amistat juntament amb la caritas."

  - original: "caritas"
    traduccio: "afecte / estima"
    nota: "Amor profund i desinteressat. Ciceró el distingeix del simple ús o utilitat."

  - original: "sapiens"
    traduccio: "savi"
    nota: "Terme discutit al diàleg. Leli prefereix un sentit pràctic (home de bé) enfront del teòric dels estoics."

  - original: "consensio"
    traduccio: "acord / consens"
    nota: "Harmonia total entre amics. La definició ciceroniana: 'omnium divinarum humanarumque rerum cum benevolentia et caritate consensio'."

  - original: "fides"
    traduccio: "fidelitat / lleialtat"
    nota: "Fonament de l'estabilitat en l'amistat. Implica confiança mútua i compliment de la paraula."

  - original: "officium"
    traduccio: "deure / obligació"
    nota: "Obligació moral i social. Element clau en la concepció romana de les relacions personals."

  - original: "assentatio"
    traduccio: "adulació / servilisme"
    nota: "Vici oposat a l'amistat veritable. Ciceró hi dedica llargament la part final del diàleg."

  - original: "constantia"
    traduccio: "constància / fermesa"
    nota: "Qualitat imprescindible de l'amic veritable: estabilitat de caràcter i coherència d'acció."

  - original: "res publica"
    traduccio: "república / cosa pública"
    nota: "L'estat romà i els seus interessos. L'amistat mai no pot anar contra la pàtria."

  - original: "augur"
    traduccio: "augur"
    nota: "Sacerdot romà que interpretava la voluntat dels déus. Escèvola l'augur és el narrador del marc."

  - original: "Laelius"
    traduccio: "Leli"
    nota: "Gaius Laelius Minor (c. 186–c. 115 aC), protagonista del diàleg, amic d'Escipió Emilià."

  - original: "Scipio Africanus Minor"
    traduccio: "Escipió l'Africà (el Menor)"
    nota: "Publius Cornelius Scipio Aemilianus (185–129 aC). La seva mort recent és el punt de partida del diàleg."

  - original: "Scaevola"
    traduccio: "Escèvola"
    nota: "Quintus Mucius Scaevola, augur i gendre de Leli. Interlocutor secundari."

  - original: "Fannius"
    traduccio: "Fanni"
    nota: "Gaius Fannius, gendre de Leli. Interlocutor secundari que inicia la petició sobre l'amistat."
