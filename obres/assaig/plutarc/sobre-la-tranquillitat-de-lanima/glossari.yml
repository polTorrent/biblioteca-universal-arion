termes:
  - original: "εὐθυμία"
    transliteracio: "euthymía"
    traduccio: "tranquil·litat d'ànim"
    nota: "Concepte central del tractat. Literalment 'bon ànim' (εὖ + θυμός). Demòcrit va ser el primer a usar-lo com a terme filosòfic per designar l'estat de serenitat interior."

  - original: "ἀλυπία"
    transliteracio: "alypía"
    traduccio: "absència de dolor / impertorbabilitat"
    nota: "Terme vinculat a l'ideal estoic d'evitar el patiment de l'ànima, distint de l'ataràxia epicúria."

  - original: "ἀταραξία"
    transliteracio: "ataraxía"
    traduccio: "impertorbabilitat"
    nota: "Terme epicuri per a l'absència de pertorbació. Plutarc el distingeix d'euthymía, que implica un estat actiu i positiu."

  - original: "λόγος"
    transliteracio: "lógos"
    traduccio: "raó / argument"
    nota: "La raó com a instrument per dominar les passions. Plutarc l'entén com la facultat entrenada que governa la part irracional de l'ànima."

  - original: "πάθος"
    transliteracio: "páthos"
    traduccio: "passió / emoció"
    nota: "Les emocions irracionals que pertorben l'ànima. Plutarc, seguint la tradició platònica, proposa dominar-les amb la raó, no eliminar-les."

  - original: "τύχη"
    transliteracio: "týche"
    traduccio: "fortuna / atzar"
    nota: "La sort o destí extern que no depèn de nosaltres. Plutarc aconsella preparar-se per acceptar-la amb serenitat."

  - original: "ἀπραξία"
    transliteracio: "apraxía"
    traduccio: "inactivitat / inacció"
    nota: "Plutarc rebutja la inacció com a camí cap a la tranquil·litat, contra Demòcrit que aconsellava no fer gaires coses."

  - original: "ῥᾳθυμία"
    transliteracio: "rhaithymía"
    traduccio: "indolència / deixadesa"
    nota: "La inacció peresosa, que Plutarc considera un fals remei per a la pertorbació de l'ànima."

  - original: "φρόνησις"
    transliteracio: "phrónesis"
    traduccio: "prudència / saviesa pràctica"
    nota: "La virtut intel·lectual que permet aplicar la raó correctament a la vida quotidiana."

  - original: "κυβεία"
    transliteracio: "kybeía"
    traduccio: "joc de daus"
    nota: "Metàfora platònica que Plutarc reprèn: la vida és com un joc de daus on no triem la tirada però sí com juguem les fitxes."

  - original: "ψυχή"
    transliteracio: "psyché"
    traduccio: "ànima"
    nota: "L'ànima en sentit platònic, amb parts racional i irracional. Plutarc situa la font de la tranquil·litat en la part racional."

  - original: "ἀρετή"
    transliteracio: "areté"
    traduccio: "virtut / excel·lència"
    nota: "L'excel·lència moral que, segons Plutarc, és la base veritable de la felicitat, per sobre de riquesa o poder."

  - original: "φθόνος"
    transliteracio: "phthónos"
    traduccio: "enveja"
    nota: "Una de les passions que Plutarc identifica com a principal obstacle per a la tranquil·litat."

  - original: "δεισιδαιμονία"
    transliteracio: "deisidaimonía"
    traduccio: "superstició"
    nota: "Plutarc la considera una font de pertorbació constant, tema que desenvolupa en un tractat específic (Περὶ δεισιδαιμονίας)."

  - original: "Πάκκιος"
    transliteracio: "Pàkki"
    traduccio: "Pacci"
    nota: "Destinatari del tractat, amic romà de Plutarc que li havia demanat un escrit sobre la tranquil·litat d'ànim."

  - original: "Μοῖραι"
    transliteracio: "Moîrai"
    traduccio: "destins"
    nota: "Les forces del destí. Plutarc, citant Empèdocles, descriu dues menes de destins (bons i dolents) que governen la vida humana."

  - original: "δαίμων"
    transliteracio: "daímon"
    traduccio: "dimoni / esperit guia"
    nota: "Esperit que acompanya cada persona des del naixement. Plutarc, contra Menandre, segueix Empèdocles en afirmar que n'hi ha de bons i de dolents."
