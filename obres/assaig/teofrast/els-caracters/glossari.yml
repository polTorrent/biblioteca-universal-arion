termes:
  - original: εἰρωνεία
    transliteracio: eirōneía
    traduccio: ironia
    definicio: "Dissimulació que consisteix a fingir ignorància o inferioritat; terme fonamental de la retòrica i l'ètica gregues."

  - original: κολακεία
    transliteracio: kolakeía
    traduccio: adulació
    definicio: "Tracte servil i falaguera per obtenir favor; comportament considerat vergonyós però útil per a l'adulador."

  - original: ἀδολεσχία
    transliteracio: adoleskhía
    traduccio: xerrameca
    definicio: "Narració llarga i irreflexiva; loquacitat buida sense sentit del temps ni del lloc."

  - original: ἀγροικία
    transliteracio: agroikía
    traduccio: rusticitat
    definicio: "Ignorància barroera pròpia de qui no ha adquirit els costums de la ciutat."

  - original: ἀρέσκεια
    transliteracio: aréskeía
    traduccio: complaença
    definicio: "Desig excessiu de plaure, sense buscar el bé veritable."

  - original: ἀπόνοια
    transliteracio: apónoia
    traduccio: desvergonyiment
    definicio: "Tolerància d'actes vergonyosos; descarat que accepta qualsevol baixesa."

  - original: λαλιά
    transliteracio: laliá
    traduccio: loquacitat
    definicio: "Incontinència verbal; incapacitat de callar."

  - original: λογοποιία
    transliteracio: logopoiía
    traduccio: fabricació de rumors
    definicio: "Invenció i difusió de notícies falses."

  - original: ἀναισχυντία
    transliteracio: anaiskhuntía
    traduccio: desvergonya
    definicio: "Menyspreu de la reputació per un guany vergonyós."

  - original: μικρολογία
    transliteracio: mikrología
    traduccio: mesquinesa
    definicio: "Estalvi excessiu que sobrepassa tota mesura raonable."

  - original: βδελυρία
    transliteracio: bdelurḯa
    traduccio: grolleria
    definicio: "Broma evident i vergonyosa; indecència deliberada."

  - original: ἀκαιρία
    transliteracio: akairía
    traduccio: inoportunitat
    definicio: "Incapacitat de trobar el moment adequat; molèstia causada per una intervenció fora de temps."

  - original: περιεργία
    transliteracio: periergía
    traduccio: entremetiment
    definicio: "Zel excessiu que porta a intervenir on no es demana."

  - original: ἀναισθησία
    transliteracio: anaisthēsía
    traduccio: estupidesa
    definicio: "Lentitud de l'ànima; torpesa mental en paraules i accions."

  - original: αὐθάδεια
    transliteracio: authádeia
    traduccio: arrogància
    definicio: "Duresa en el tracte; manca de cortesia i empatia."

  - original: δεισιδαιμονία
    transliteracio: deisidaimonía
    traduccio: superstició
    definicio: "Por excessiva envers allò diví; religiositat supersticiosa."

  - original: μεμψιμοιρία
    transliteracio: mempsĭmoiría
    traduccio: queixa
    definicio: "Retret injustificat contra allò que s'ha rebut; insatisfacció crònica."

  - original: ἀπιστία
    transliteracio: apistía
    traduccio: desconfiança
    definicio: "Sospita generalitzada d'injustícia envers tothom."

  - original: δυσχέρεια
    transliteracio: duskhéreia
    traduccio: desídia
    definicio: "Negligència del cos que causa molèstia als altres."

  - original: ἀηδία
    transliteracio: aēdía
    traduccio: desagradabilitat
    definicio: "Tracte molest sense causar dany; pesadesa."

  - original: μικροφιλοτιμία
    transliteracio: mikrophilotimía
    traduccio: vanitat mesquina
    definicio: "Desig d'honor de poca volada; ambició ridícula."

  - original: ἀνελευθερία
    transliteracio: aneleuthería
    traduccio: avarícia
    definicio: "Manca de generositat quan implica despesa."

  - original: ἀλαζονεία
    transliteracio: alazoneia
    traduccio: fanfarroneria
    definicio: "Ostentació de béns i mèrits que no es posseeixen."

  - original: ὑπερηφανία
    transliteracio: hyperēphanía
    traduccio: supèrbia
    definicio: "Menyspreu envers tots excepte un mateix."

  - original: δειλία
    transliteracio: deilía
    traduccio: covardia
    definicio: "Retirada de l'ànima per por; feblesa davant el perill."

  - original: ὀλιγαρχία
    transliteracio: oligarkhía
    traduccio: esperit oligàrquic
    definicio: "Desig de poder concentrat; menysteniment del govern popular."

  - original: ὀψιμαθία
    transliteracio: opsimathía
    traduccio: aprenentatge tardà
    definicio: "Afany d'educació inapropiat per l'edat avançada."

  - original: κακολογία
    transliteracio: kakología
    traduccio: maledicència
    definicio: "Inclinació a parlar malament dels altres; difamació."

  - original: φιλοπονηρία
    transliteracio: philoponēría
    traduccio: amor a la maldat
    definicio: "Desig de maldat; complicitat amb els malfactors."

  - original: αἰσχροκέρδεια
    transliteracio: aiskhrокérdeia
    traduccio: avarícia sòrdida
    definicio: "Desig de guany per mitjans vergonyosos; cobdícia mesquina."

  - original: στοά
    transliteracio: stoá
    traduccio: Stoa
    definicio: "Pòrtic cobert de la ciutat; lloc de reunió i debat filosòfic."

  - original: ἀγορά
    transliteracio: agorá
    traduccio: àgora
    definicio: "Plaça central d'Atenes; lloc de mercat, reunió política i vida social."

  - original: κόρδαξ
    transliteracio: kórdax
    traduccio: còrdax
    definicio: "Dansa obscena pròpia de la comèdia; ballar-la fora d'escena era considerat indecent."

  - original: πρυτάνεις
    transliteracio: prytáneis
    traduccio: prítans
    definicio: "Membres del consell executiu d'Atenes, que presidien l'assemblea per torns."

  - original: τριηραρχία
    transliteracio: triērarkhía
    traduccio: trierarquia
    definicio: "Liturgia consistent a equipar i mantenir una trirrem; obligació dels ciutadans rics."

  - original: ἔρανος
    transliteracio: éranos
    traduccio: col·lecta
    definicio: "Contribució voluntària entre amics o membres d'un grup; préstec sense interès."
