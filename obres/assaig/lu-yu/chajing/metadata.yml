  llengua_original: "xinès"
  descripcio: "Primer tractat sistemàtic sobre el te, considerat el text fundacional de la cultura del te. Dividit en deu capítols, cobreix l'origen, els estris, l'elaboració, els atuells, la cocció, la beguda, les fonts històriques, les regions productores, les simplificacions i la representació visual del te."
