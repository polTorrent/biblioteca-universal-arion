termes:
  - original: "Kunst-Werk"
    traduccio: "obra d'art"
    nota: "Rilke usa el compost amb guionet per emfatitzar la dualitat entre ofici (Kunst) i creació (Werk)"

  - original: "Einsamkeit"
    traduccio: "solitud"
    nota: "Concepte central en Rilke: no és aïllament sinó espai interior necessari per a la creació"

  - original: "Notwendigkeit"
    traduccio: "necessitat"
    nota: "Criteri fonamental rilkeà: l'art autèntic neix de la necessitat interior, no de l'elecció"

  - original: "Geschlecht"
    traduccio: "sexualitat / gènere"
    nota: "Rilke l'entén en sentit ampli i pur, més enllà del masculí; lligat a la força creadora"

  - original: "Ironie"
    traduccio: "ironia"
    nota: "Rilke la considera un instrument legítim si és congènita, però perillosa si és superficial"

  - original: "Geduld"
    traduccio: "paciència"
    nota: "Virtut essencial del creador: madurar com un arbre sense forçar els temps"

  - original: "Schaffen"
    traduccio: "crear / creació"
    nota: "El procés creatiu com a acte vital, inseparable de la vida mateixa"

  - original: "das Unsagbare"
    traduccio: "l'inefable"
    nota: "Allò que no es pot dir amb paraules; per a Rilke, l'essència de l'experiència artística"

  - original: "Versenkung"
    traduccio: "immersió interior"
    nota: "L'acte de submergir-se en un mateix per trobar la font de la creació"

  - original: "Liebe"
    traduccio: "amor"
    nota: "En Rilke, no possessió sinó respecte a l'alteritat i creixement mutu en solitud"

  - original: "Traurigkeit"
    traduccio: "tristesa"
    nota: "Les tristeses com a processos transformadors que cal viure, no evitar"

  - original: "Gott"
    traduccio: "Déu"
    nota: "No el Déu dogmàtic sinó una força en devenir, quelcom que l'ésser humà ajuda a construir"

  - original: "Urtrieb"
    traduccio: "impuls primordial"
    nota: "La força creadora originària, anterior a la raó"

  - original: "Kindheit"
    traduccio: "infantesa"
    nota: "Font inesgotable de material poètic i de riquesa interior"

  - original: "Dichter"
    traduccio: "poeta"
    nota: "El poeta com a vident i receptor, no com a fabricant de versos"

  - original: "Entwicklung"
    traduccio: "desenvolupament"
    nota: "El creixement orgànic interior que no pot ser accelerat ni forçat"

  - original: "Brunst"
    traduccio: "ardor / zel"
    nota: "Desig sexual intens; Rilke hi contraposa el concepte més ampli de Geschlecht"

  - original: "Demut"
    traduccio: "humilitat"
    nota: "Actitud necessària davant el procés creatiu i davant la vida"

  - original: "Natur"
    traduccio: "natura"
    nota: "Font d'aprenentatge i model de maduració orgànica per al poeta"

  - original: "Ewigkeit"
    traduccio: "eternitat"
    nota: "Horitzó temporal de l'art autèntic, contraposat a les modes i el temporal"
