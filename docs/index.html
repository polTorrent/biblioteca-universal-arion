<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Arion — Dashboard</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --red: #f85149; --yellow: #d29922;
            --purple: #bc8cff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
        h1 { font-size: 1.5em; margin-bottom: 20px; }
        h1 span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .card h2 { font-size: 0.85em; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card .value { font-size: 2em; font-weight: 700; }
        .card .sub { font-size: 0.85em; color: var(--text2); margin-top: 4px; }
        .green { color: var(--green); }
        .red { color: var(--red); }
        .yellow { color: var(--yellow); }
        .purple { color: var(--purple); }
        .blue { color: var(--accent); }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-dot.inactive { background: var(--red); }
        .tasks { margin-top: 16px; }
        .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
        .task-item .type { display: inline-block; background: var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.75em; margin-right: 8px; }
        .task-item .instruction { font-size: 0.9em; margin-top: 4px; color: var(--text2); }
        footer { text-align: center; color: var(--text2); font-size: 0.8em; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    </style>
</head>
<body>
    <h1>📚 <span>Biblioteca Arion</span> — Dashboard</h1>
    
    <div class="grid" id="stats">
        <div class="card">
            <h2>💰 DIEM Balance</h2>
            <div class="value blue" id="diem">—</div>
            <div class="sub" id="diem-remaining">Carregant...</div>
        </div>
        <div class="card">
            <h2>⚙️ Worker</h2>
            <div class="value" id="worker-status"><span class="status-dot inactive"></span>INACTIU</div>
            <div class="sub" id="worker-uptime">—</div>
        </div>
        <div class="card">
            <h2>📖 Obres Validades</h2>
            <div class="value green" id="validated">—</div>
            <div class="sub" id="validation-progress">—</div>
            <div class="progress-bar"><div class="fill green" id="validation-bar" style="width:0%"></div></div>
        </div>
        <div class="card">
            <h2>📋 Cua de Tasques</h2>
            <div class="value" id="tasks-pending">—</div>
            <div class="sub" id="tasks-detail">—</div>
        </div>
        <div class="card">
            <h2>🔧 Pendents Fix</h2>
            <div class="value yellow" id="needs-fix">—</div>
            <div class="sub">Obres que necessiten correcció</div>
        </div>
        <div class="card">
            <h2>📊 Tasques Avui</h2>
            <div class="value purple" id="done-today">—</div>
            <div class="sub" id="failed-count">—</div>
        </div>
    </div>

    <div class="tasks">
        <h2 style="margin-bottom:12px;color:var(--text2);">Cua Pendents</h2>
        <div id="task-list"></div>
    </div>

    <footer>
        Biblioteca Universal Arion v2.0 · Última actualització: <span id="last-update">—</span>
    </footer>

    <script>
        const API = "sistema/state";
        
        async function loadState() {
            try {
                // Heartbeat state
                const hbRes = await fetch(`${API}/heartbeat_state.json`);
                if (hbRes.ok) {
                    const hb = await hbRes.json();
                    document.getElementById("last-update").textContent = 
                        new Date(hb.timestamp).toLocaleString("ca-ES");
                    
                    const ws = document.getElementById("worker-status");
                    if (hb.worker_active) {
                        ws.innerHTML = '<span class="status-dot active pulse"></span>ACTIU';
                        ws.className = "value green";
                    } else {
                        ws.innerHTML = '<span class="status-dot inactive"></span>INACTIU';
                        ws.className = "value red";
                    }
                }
                
                // Worker heartbeat
                const whRes = await fetch(`${API}/worker_heartbeat.json`);
                if (whRes.ok) {
                    const wh = await whRes.json();
                    const mins = Math.floor(wh.uptime_seconds / 60);
                    document.getElementById("worker-uptime").textContent = 
                        `Mode: ${wh.mode} · Uptime: ${mins}min · Tasques: ${wh.tasks_completed}`;
                }
                
                // DIEM
                const diemEl = document.getElementById("diem");
                if (diemEl.textContent === "—") {
                    // Will be filled by the backend
                }
                
            } catch(e) { console.warn("State load error:", e); }
        }
        
        // Auto-refresh cada 60s
        loadState();
        setInterval(loadState, 60000);
        
        document.getElementById("last-update").textContent = new Date().toLocaleString("ca-ES");
    </script>
</body>
</html>
