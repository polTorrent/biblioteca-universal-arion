# Configuració de models Venice AI per a Biblioteca Universal Arion
# Estratègia: models diferents segons la tasca

# Models disponibles a Venice AI (models superior marcats amb *)
# Models econòmics: zai-org-glm-5, deepseek-v3.2, qwen3-5-9b
# Models superiors: claude-opus-4-7, openai-gpt-55-pro, gemini-3-1-pro-preview

# ==============================================================================
# TASQUES RUTINÀRIES (econòmiques)
# ==============================================================================

# Model per defecte per a Hermes/operacions generals
[default]
model = zai-org-glm-5
reason = Econòmic, ràpid, adequat per a tasques rutinàries

# Fetch d'obres (obtenir textos fonts)
[fetch]
model = deepseek-v3.2
reason = Adequat per a tasques de parseig i extracció de text

# Metadata i glossaris
[metadata]
model = qwen3-5-9b
reason = Adequat per a tasques estructurades i extracció de dades

# ==============================================================================
# TRADUCCIONS (qualitat alta)
# ==============================================================================

# Traduccions literàries i filosòfiques
[translate]
model = claude-opus-4-7
reason = Millor comprensió lingüística i nuanced understanding

# Supervisió i revisió de qualitat
[supervision]
model = openai-gpt-55-pro
reason = Raonament profund per a detecció d'al·lucinacions i errors subtils

# Revisió final abans de publicar
[final_review]
model = gemini-3-1-pro-preview
reason = Visió completa i detecció d'inconsistències

# ==============================================================================
# TASQUES ESPECIALS
# ==============================================================================

# Correcció d'errors (.needs_fix)
[fix]
model = claude-opus-4-7
reason = Qualitat màxima per a correccions complexes

# Tests i validació
[tests]
model = zai-org-glm-5
reason = Adequat per a tasques automatitzades de validació

# ==============================================================================
# CONFIGURACIÓ DE COSTOS
# ==============================================================================

# DIEM per tasca (aproximat, ajustar segons ús real)
# GLM-5: ~0.1 DIEM per traducció curta
# Claude Opus 4-7: ~2-5 DIEM per traducció llarga
# GPT-5.5 Pro: ~3-8 DIEM per supervisió completa

# Pressupost DIEM diari:
# - Manteniment rutinari: 1-2 DIEM
# - Traduccions noves: 5-10 DIEM (si saldo > 10)
# - Supervisió qualitat: 2-5 DIEM (si saldo > 15)
# - Revisió final: 1-3 DIEM (si saldo > 20)