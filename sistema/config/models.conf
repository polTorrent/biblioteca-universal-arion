# =============================================================================
# models.conf — Configuració centralitzada de models per a Biblioteca Arion
# =============================================================================
# Format: <grup>:<tipus> = <model> [timeout=<segons>]
# El worker llegeix aquest fitxer per seleccionar el model adequat.

# --- ADMINISTRACIÓ ---
admin:metadata     = zai-org-glm-5       timeout=120
admin:glossari     = zai-org-glm-5       timeout=120
admin:web          = zai-org-glm-5       timeout=120
admin:test         = zai-org-glm-5       timeout=120
admin:default      = zai-org-glm-5       timeout=120

# --- TRADUCCIÓ ---
translate:filosofia  = claude-opus-4-7       timeout=300
translate:poesia     = claude-opus-4-7       timeout=300
translate:teatre     = claude-opus-4-7       timeout=300
translate:narrativa  = claude-sonnet-4-6     timeout=300
translate:assaig     = claude-sonnet-4-6     timeout=300
translate:oriental   = claude-sonnet-4-6     timeout=300
translate:default    = claude-opus-4-7       timeout=300

# --- FETCH ---
fetch:default      = deepseek-v3.2        timeout=180

# --- REVISIÓ (models lleugers — no cal opus per revisar) ---
review:default     = zai-org-glm-5       timeout=120
supervisio:default = zai-org-glm-5       timeout=120
validacio:default  = zai-org-glm-5       timeout=120

# --- MODELS PER GÈNERE (usat per traduir_venice.py) ---
genre:filosofia = claude-opus-4-7
genre:poesia    = claude-opus-4-7
genre:teatre    = claude-opus-4-7
genre:narrativa = claude-sonnet-4-6
genre:assaig    = claude-sonnet-4-6
genre:oriental  = claude-sonnet-4-6
