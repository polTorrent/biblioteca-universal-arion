# =============================================================================
# models.conf — Configuració centralitzada de models per a Biblioteca Arion
# =============================================================================
# Format: <grup>:<tipus> = <model> [timeout=<segons>]
# El worker llegeix aquest fitxer per seleccionar el model adequat.

# --- ADMINISTRACIÓ (models econòmics — no cal opus per tasques admin) ---
admin:metadata     = zai-org-glm-5           timeout=120
admin:glossari     = zai-org-glm-5           timeout=120
admin:web          = zai-org-glm-5           timeout=120
admin:test         = zai-org-glm-5           timeout=120
admin:default      = claude-sonnet-4-6       timeout=120

# --- TRADUCCIÓ ---
# thinking=on: activa reasoning (més costós, millor per matís lèxic)
# thinking=off: resposta directa (més ràpida, més barata)
translate:filosofia  = claude-opus-4-7       timeout=600  thinking=on
translate:poesia     = claude-opus-4-7       timeout=600  thinking=on
translate:teatre     = claude-opus-4-7       timeout=600  thinking=on
translate:narrativa  = claude-sonnet-4-6     timeout=600  thinking=off
translate:assaig     = claude-sonnet-4-6     timeout=600  thinking=off
translate:oriental   = qwen3-235b-a22b-instruct-2507  timeout=600  thinking=on
translate:default    = claude-opus-4-7       timeout=600  thinking=on

# --- FETCH ---
fetch:default      = deepseek-v4-flash        timeout=180  thinking=off

# --- REVISIÓ (models lleugers — no cal opus per revisar) ---
review:default     = claude-sonnet-4-6       timeout=120  thinking=off
supervisio:default = claude-sonnet-4-6       timeout=120  thinking=off
validacio:default  = claude-sonnet-4-6       timeout=120  thinking=off

# --- MODELS PER GÈNERE (usat per traduir_venice.py) ---
genre:filosofia = claude-opus-4-7
genre:poesia    = claude-opus-4-7
genre:teatre    = claude-opus-4-7
genre:narrativa = claude-sonnet-4-6
genre:assaig    = claude-sonnet-4-6
genre:oriental  = qwen3-235b-a22b-instruct-2507
