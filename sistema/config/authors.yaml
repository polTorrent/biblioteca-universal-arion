# authors.yaml — Mapa canònic d'autors de la Biblioteca Universal Arion
# Cada entrada: slug → nom canònic + àlies (noms alternatius que l'IA pot generar)
# Tots els scripts han d'usar author_resolver.resolve() per obtenir el slug correcte.
#
# Regles:
#   - slug: nom de directori sota obres/<categoria>/<slug>/
#   - nom: nom preferit per mostrar
#   - aliases: llista de variants que es resolguen a aquest slug
#   - Si un autor no està aquí, author_resolver farà fallback al slugify automàtic
#     però WARNearà perquè s'afegeixi al mapa.

