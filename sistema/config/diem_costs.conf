# =============================================================================
# diem_costs.conf — Costos estimats per tipus de tasca (en DIEM)
# =============================================================================
# Format: <tipus_tasca> = <cost_estimat>
# El worker consulta aquest fitxer per decidir si pot executar una tasca
# sense excedir el pressupost disponible (DIEM actual - DIEM_RESERVE).
#
# Valors conservadors basats en observació:
#   - Opus amb thinking: 1.5-3.0 DIEM per traducció llarga
#   - Sonnet sense thinking: 0.3-0.8 DIEM per tasca
#   - GLM-5 (admin): ~0.1 DIEM
#   - DeepSeek flash: ~0.05 DIEM
# =============================================================================

# --- Traducció (costós) ---
translate:filosofia  = 2.0
translate:poesia     = 2.0
translate:teatre     = 2.0
translate:narrativa  = 1.0
translate:assaig     = 1.0
translate:oriental   = 1.5
translate:default    = 2.0

# --- Fix (variable segons complexitat) ---
fix-translate        = 1.5
fix-complex          = 1.5
fix-simple           = 0.5
fix-natural          = 0.5
fix-llengua          = 0.3
fix-fetch            = 0.1
fix-default          = 0.5

# --- Revisió / Supervisió ---
review:default       = 0.4
supervisio:default   = 0.4
validacio:default    = 0.3

# --- Administració (econòmic) ---
admin:metadata       = 0.1
admin:glossari       = 0.1
admin:web            = 0.2
admin:test           = 0.1
admin:default        = 0.3

# --- Fetch ---
fetch:default        = 0.05

# --- Auditories / Publicació ---
audit                = 0.2
publish              = 0.3
